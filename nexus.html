   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;
  const { el, fmt, toast } = UI;
  const DateUtil = Store.DateUtil;

  const TYPES = [
    { value: "fuerza", label: "🏋️ Fuerza" },
    { value: "cardio", label: "🏃 Cardio" },
    { value: "hiit", label: "⚡ HIIT" },
    { value: "yoga", label: "🧘 Yoga / Movilidad" },
    { value: "deporte", label: "⚽ Deporte" },
    { value: "otro", label: "💪 Otro" }
  ];
  const TYPE_ICON = { fuerza: "🏋️", cardio: "🏃", hiit: "⚡", yoga: "🧘", deporte: "⚽", otro: "💪" };

  function workouts() { return Store.get().workouts; }

  function add() {
    const body = UI.form([
      { name: "name", label: "Nombre de la sesión", placeholder: "Pecho y tríceps", required: true },
      { type: "row", fields: [
        { name: "type", label: "Tipo", type: "select", options: TYPES, value: "fuerza" },
        { name: "date", label: "Fecha", type: "date", value: DateUtil.todayKey(), required: true }
      ]},
      { type: "row", fields: [
        { name: "duration", label: "Duración (min)", type: "number", min: 0, placeholder: "45", required: true },
        { name: "calories", label: "Calorías (aprox)", type: "number", min: 0, placeholder: "350" }
      ]},
      { name: "volume", label: "Volumen / distancia (opcional)", placeholder: "5200 kg · o · 5 km" },
      { name: "notes", label: "Notas", type: "textarea", placeholder: "Sensaciones, PRs, etc." }
    ], (data) => {
      const dur = Number(data.duration) || 0;
      if (dur <= 0) { Audio.play("error"); toast({ icon: "⚠️", msg: "Indica la duración" }); return; }
      workouts().push({ id: Store.uid(), name: data.name, type: data.type, date: data.date, duration: dur, calories: Number(data.calories) || 0, volume: data.volume, notes: data.notes });
      Store.commit();
      Audio.play("complete");
      const xp = Math.min(30, 10 + Math.round(dur / 5));
      Gami.award(xp, "Entrenamiento registrado 💪");
      UI.closeModal();
      render(document.getElementById("view-workouts"));
      N.App && N.App.refreshTop();
    }, "Registrar entrenamiento");
    UI.openModal("Nuevo entrenamiento", body);
  }

  function remove(w) {
    const arr = workouts(); arr.splice(arr.indexOf(w), 1);
    Store.commit(); Audio.play("delete");
    render(document.getElementById("view-workouts"));
    N.App && N.App.refreshTop();
  }

  // ---------- stats ----------
  function streak() {
    const dates = new Set(workouts().map((w) => w.date));
    let s = 0, day = DateUtil.todayKey();
    if (!dates.has(day)) day = DateUtil.addDays(day, -1);
    while (dates.has(day)) { s++; day = DateUtil.addDays(day, -1); }
    return s;
  }
  function weekMinutes() {
    const days = DateUtil.lastNDays(7);
    return { labels: days.map((d) => DateUtil.weekday(d)), values: days.map((d) => workouts().filter((w) => w.date === d).reduce((s, w) => s + w.duration, 0)) };
  }
  function stats() {
    const arr = workouts();
    const mk = DateUtil.monthKey();
    const monthSessions = arr.filter((w) => w.date.slice(0, 7) === mk);
    return {
      total: arr.length,
      monthCount: monthSessions.length,
      monthMinutes: monthSessions.reduce((s, w) => s + w.duration, 0),
      monthCalories: monthSessions.reduce((s, w) => s + w.calories, 0),
      streak: streak()
    };
  }

  function render(container) {
    container.innerHTML = "";
    const st = stats();

    container.appendChild(el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [el("span", { class: "ico", text: "⚡" }), "Entrenamientos"]),
        el("p", { class: "view-desc", text: "Registra tus sesiones y observa tu progreso físico." })
      ]),
      el("button", { class: "btn primary", onclick: add, html: "＋ Registrar sesión" })
    ]));

    container.appendChild(el("div", { class: "grid cols-4 mb-16" }, [
      kpi("Racha", st.streak + (st.streak === 1 ? " día" : " días"), "🔥 constancia", "warn"),
      kpi("Este mes", st.monthCount + "", "sesiones", "accent"),
      kpi("Minutos", fmt.num(st.monthMinutes), "este mes", "accent"),
      kpi("Calorías", fmt.num(st.monthCalories), "quemadas", "good")
    ]));

    // gráfica minutos por día
    const chartCard = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Minutos entrenados · últimos 7 días"])])
    ]);
    const cv = el("canvas");
    chartCard.appendChild(el("div", { class: "chart-box" }, [cv]));
    container.appendChild(chartCard);
    setTimeout(() => Charts.bars(cv, { labels: weekMinutes().labels, series: [{ values: weekMinutes().values, color: "--accent-2" }] }, { height: 170 }), 30);

    // historial
    const arr = workouts().slice().sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
    const listCard = el("div", { class: "card" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Historial"])])
    ]);
    if (!arr.length) {
      listCard.appendChild(el("div", { class: "empty" }, [el("span", { class: "big", text: "⚡" }), el("div", { text: "Sin entrenamientos. ¡Registra el primero!" })]));
    } else {
      arr.slice(0, 20).forEach((w) => {
        listCard.appendChild(el("div", { class: "item" }, [
          el("div", { style: "font-size:22px", text: TYPE_ICON[w.type] || "💪" }),
          el("div", { class: "item-main" }, [
            el("div", { class: "item-title", text: w.name }),
            el("div", { class: "item-meta" }, [
              el("span", { text: DateUtil.label(w.date) }),
              el("span", { class: "chip accent", text: w.duration + " min" }),
              w.calories ? el("span", { class: "chip", text: w.calories + " kcal" }) : null,
              w.volume ? el("span", { class: "text-faint fs-12", text: w.volume }) : null
            ])
          ]),
          el("button", { class: "icon-btn", html: "🗑️", title: "Eliminar", onclick: () => remove(w) })
        ]));
      });
    }
    container.appendChild(listCard);
  }

  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  N.Workouts = { render, stats, weekMinutes, streak };
})();


/* ===== assets/js/modules/goals.js ===== */
/* =====================================================================
   NEXUS · Módulo Metas
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;
  const { el, fmt, toast } = UI;
  const DateUtil = Store.DateUtil;

  function goals() { return Store.get().goals; }

  function pct(g) { return g.target > 0 ? Math.min(100, Math.round((g.current / g.target) * 100)) : 0; }

  function addOrEdit(existing) {
    const body = UI.form([
      { name: "title", label: "Meta", value: existing ? existing.title : "", placeholder: "Leer 12 libros", required: true },
      { type: "row", fields: [
        { name: "current", label: "Progreso actual", type: "number", min: 0, value: existing ? existing.current : 0 },
        { name: "target", label: "Objetivo", type: "number", min: 0, value: existing ? existing.target : "", placeholder: "12", required: true }
      ]},
      { type: "row", fields: [
        { name: "unit", label: "Unidad", value: existing ? existing.unit || "" : "", placeholder: "libros" },
        { name: "deadline", label: "Fecha límite", type: "date", value: existing ? existing.deadline || "" : "" }
      ]},
      { name: "milestones", label: "Hitos (uno por línea)", type: "textarea", value: existing ? existing.milestones.map((m) => m.t).join("\n") : "", placeholder: "Elegir libros\nLeer 3\nLeer 6" }
    ], (data) => {
      const ms = (data.milestones || "").split("\n").map((s) => s.trim()).filter(Boolean).map((t) => ({ t, done: false }));
      if (existing) {
        existing.title = data.title; existing.current = Number(data.current) || 0; existing.target = Number(data.target) || 0;
        existing.unit = data.unit; existing.deadline = data.deadline;
        existing.milestones = ms.map((nm) => existing.milestones.find((om) => om.t === nm.t) || nm);
        toast({ icon: "✏️", msg: "Meta actualizada" });
      } else {
        goals().push({ id: Store.uid(), title: data.title, current: Number(data.current) || 0, target: Number(data.target) || 0, unit: data.unit, deadline: data.deadline, milestones: ms, created: DateUtil.todayKey() });
        Audio.play("add");
        toast({ icon: "◉", title: "Nueva meta", msg: data.title });
        Gami.award(6, "Meta creada");
      }
      Store.commit();
      UI.closeModal();
      render(document.getElementById("view-goals"));
      N.App && N.App.refreshTop();
    }, existing ? "Guardar" : "Crear meta",
      (inputs) => N.CalExport.formRow(inputs.title, inputs.deadline, "Meta en NEXUS"));
    UI.openModal(existing ? "Editar meta" : "Nueva meta", body);
  }

  function adjust(g, delta) {
    const before = pct(g);
    g.current = Math.max(0, g.current + delta);
    if (g.target && g.current > g.target) g.current = g.target;
    const after = pct(g);
    if (delta > 0) {
      Audio.play("coin");
      Gami.award(4, "Avance en meta");
      if (after >= 100 && before < 100) {
        Audio.play("achieve");
        Gami.award(40, "🎉 ¡Meta completada!");
        Gami.burst();
        toast({ level: true, icon: "🏆", title: "¡Meta lograda!", msg: g.title });
      }
    } else {
      Store.commit();
    }
    render(document.getElementById("view-goals"));
    N.App && N.App.refreshTop();
  }

  function toggleMs(g, m) {
    m.done = !m.done;
    Audio.play(m.done ? "coin" : "tap");
    Store.commit();
    render(document.getElementById("view-goals"));
  }

  function remove(g) {
    UI.confirmBox("Eliminar meta", `¿Eliminar "${g.title}"?`, () => {
      const arr = goals(); arr.splice(arr.indexOf(g), 1);
      Store.commit(); Audio.play("delete");
      render(document.getElementById("view-goals"));
    }, "Eliminar");
  }

  // ---------- stats ----------
  function stats() {
    const arr = goals();
    const completed = arr.filter((g) => pct(g) >= 100).length;
    const avg = arr.length ? Math.round(arr.reduce((s, g) => s + pct(g), 0) / arr.length) : 0;
    return { total: arr.length, completed, active: arr.length - completed, avg };
  }

  function deadlineInfo(g) {
    if (!g.deadline) return null;
    const diff = DateUtil.diffDays(g.deadline, DateUtil.todayKey());
    if (diff < 0) return { text: "Plazo vencido", cls: "bad" };
    if (diff === 0) return { text: "Vence hoy", cls: "warn" };
    return { text: `${diff} día${diff === 1 ? "" : "s"} restantes`, cls: diff <= 7 ? "warn" : "" };
  }

  function render(container) {
    container.innerHTML = "";
    const st = stats();

    container.appendChild(el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [el("span", { class: "ico", text: "◉" }), "Metas"]),
        el("p", { class: "view-desc", text: "Define objetivos, sigue tu progreso y celebra cada logro." })
      ]),
      el("button", { class: "btn primary", onclick: () => addOrEdit(null), html: "＋ Nueva meta" })
    ]));

    container.appendChild(el("div", { class: "grid cols-3 mb-16" }, [
      kpi("Activas", st.active + "", "en progreso", "accent"),
      kpi("Completadas", st.completed + "", "logradas", "good"),
      kpi("Progreso medio", fmt.pct(st.avg), "global", st.avg >= 60 ? "good" : "warn")
    ]));

    const arr = goals();
    if (!arr.length) {
      container.appendChild(el("div", { class: "card" }, [el("div", { class: "empty" }, [el("span", { class: "big", text: "◉" }), el("div", { text: "Sin metas todavía. ¡Define la primera!" })])]));
      return;
    }

    const grid = el("div", { class: "grid cols-2" });
    arr.forEach((g) => grid.appendChild(goalCard(g)));
    container.appendChild(grid);
  }

  function goalCard(g) {
    const p = pct(g);
    const done = p >= 100;
    const dl = deadlineInfo(g);
    const msDone = g.milestones.filter((m) => m.done).length;

    const overdue = dl && dl.cls === "bad" && !done;
    const ring = el("canvas");
    const ringWrap = el("div", { class: "ring-wrap" }, [ring, el("div", { class: "ring-val", text: p + "%" })]);
    setTimeout(() => Charts.ring(ring, p, { size: 84, color: done ? "--good" : "--accent" }), 30);

    const card = el("div", { class: "card" + (overdue ? " overdue" : "") }, [
      el("div", { class: "flex items-center gap-12" }, [
        ringWrap,
        el("div", { class: "item-main" }, [
          el("div", { class: "item-title", text: (done ? "🏆 " : "") + g.title }),
          el("div", { class: "item-meta" }, [
            el("span", { class: "chip accent", text: `${fmt.num(g.current)} / ${fmt.num(g.target)} ${g.unit || ""}`.trim() }),
            dl ? el("span", { class: "chip " + dl.cls, text: "⏳ " + dl.text }) : null
          ])
        ]),
        g.deadline ? el("button", { class: "icon-btn", html: "📅", title: "Añadir a Google Calendar", onclick: () => N.CalExport.open({ title: "Meta: " + g.title, details: "Meta en NEXUS · " + fmt.num(g.current) + "/" + fmt.num(g.target) + " " + (g.unit || ""), dateKey: g.deadline }) }) : null,
        el("button", { class: "icon-btn", html: "✏️", title: "Editar", onclick: () => addOrEdit(g) }),
        el("button", { class: "icon-btn", html: "🗑️", title: "Eliminar", onclick: () => remove(g) })
      ]),
      el("div", { class: "flex gap-8 mt-16" }, [
        el("button", { class: "btn sm ghost", html: "－1", onclick: () => adjust(g, -1) }),
        el("button", { class: "btn sm primary", html: "＋1", onclick: () => adjust(g, 1) }),
        el("button", { class: "btn sm", html: "＋5", onclick: () => adjust(g, 5) })
      ])
    ]);

    if (g.milestones.length) {
      const wrap = el("div", { class: "mt-16" });
      wrap.appendChild(el("div", { class: "fs-12 text-dim", style: "margin-bottom:6px", text: `Hitos ${msDone}/${g.milestones.length}` }));
      g.milestones.forEach((m) => {
        wrap.appendChild(el("div", { class: "flex items-center gap-8", style: "cursor:pointer;padding:2px 0", onclick: () => toggleMs(g, m) }, [
          el("span", { style: "font-size:14px;color:" + (m.done ? "var(--good)" : "var(--txt-faint)"), text: m.done ? "☑" : "☐" }),
          el("span", { class: "fs-13", style: m.done ? "text-decoration:line-through;color:var(--txt-faint)" : "", text: m.t })
        ]));
      });
      card.appendChild(wrap);
    }
    return card;
  }

  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  N.Goals = { render, stats, pct };
})();


/* ===== assets/js/modules/focus.js ===== */
/* =====================================================================
   NEXUS · Módulo Foco / Pomodoro
   Temporizador de trabajo/descanso configurable, con ciclos, anillo,
   XP, sonido y notificación al terminar cada fase.
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami } = N;
  const { el, fmt } = UI;
  const DateUtil = Store.DateUtil;

  // ---------- estado del temporizador (vive entre renders) ----------
  let mode = "work";           // "work" | "break" | "long"
  let running = false;
  let remaining = null;        // segundos restantes
  let endAt = 0;               // timestamp objetivo cuando corre
  let cyclesDone = 0;          // sesiones de trabajo en el set actual
  let handle = null;
  let focusLabel = "";         // en qué te enfocas (no persistente)

  function cfg() { return Store.get().focus; }
  function secondsFor(m) {
    const c = cfg();
    return (m === "work" ? c.work : m === "long" ? c.longBreak : c.break) * 60;
  }
  function ensureRemaining() { if (remaining == null) remaining = secondsFor(mode); }
  function modeInfo(m) {
    return m === "work" ? { label: "Enfoque", color: "--accent", ico: "◷" }
      : m === "long" ? { label: "Descanso largo", color: "--good", ico: "☕" }
      : { label: "Descanso", color: "--good", ico: "🌿" };
  }
  function fmtTime(s) {
    s = Math.max(0, Math.round(s));
    return String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
  }
  function cssVar(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim() || "#00e5ff"; }

  // ---------- controles ----------
  function start() {
    ensureRemaining();
    if (running) return;
    running = true;
    endAt = Date.now() + remaining * 1000;
    Audio.play("toggleOn");
    clearInterval(handle);
    handle = setInterval(tick, 250);
    paint();
  }
  function pause() {
    if (!running) return;
    remaining = Math.max(0, Math.round((endAt - Date.now()) / 1000));
    running = false;
    clearInterval(handle);
    Audio.play("tap");
    paint();
  }
  function reset() {
    running = false; clearInterval(handle);
    remaining = secondsFor(mode);
    Audio.play("tap");
    paint();
  }
  function skip() {
    running = false; clearInterval(handle);
    Audio.play("tap");
    nextPhase(false);
  }
  function tick() {
    remaining = Math.max(0, Math.round((endAt - Date.now()) / 1000));
    if (remaining <= 0) { complete(); return; }
    paint();
  }

  function complete() {
    running = false; clearInterval(handle);
    if (mode === "work") {
      // registrar sesión
      const c = cfg();
      const today = DateUtil.todayKey();
      c.sessionsCompleted = (c.sessionsCompleted || 0) + 1;
      c.focusLog[today] = (c.focusLog[today] || 0) + c.work;
      c.sessionsLog[today] = (c.sessionsLog[today] || 0) + 1;
      Store.markActive();
      Store.commit(true);
      cyclesDone++;
      Audio.play("levelup");
      Gami.award(20, "Sesión de foco completada 🎯");
      Gami.burst();
      if (N.Notify) N.Notify.send("¡Sesión completada! 🎯", "Buen trabajo. Toca un descanso.", { tag: "nexus-focus" });
      nextPhase(true);
    } else {
      Audio.play("complete");
      if (N.Notify) N.Notify.send("Descanso terminado ☕", "Hora de volver al enfoque.", { tag: "nexus-focus" });
      nextPhase(true);
    }
    N.App && N.App.refreshTop();
  }

  // pasa a la siguiente fase; autostart=true la inicia automáticamente
  function nextPhase(autostart) {
    if (mode === "work") {
      const c = cfg();
      mode = (cyclesDone % (c.longEvery || 4) === 0) ? "long" : "break";
    } else {
      mode = "work";
    }
    remaining = secondsFor(mode);
    render(document.getElementById("view-focus"));
    if (autostart) start();
  }

  function setMode(m) {
    if (running) return;
    mode = m; remaining = secondsFor(m); paint();
  }

  // ---------- pintar estado en el DOM ----------
  function paint() {
    ensureRemaining();
    const info = modeInfo(mode);
    const t = document.getElementById("focus-time");
    if (!t) return; // la vista no está montada
    t.textContent = fmtTime(remaining);
    const ml = document.getElementById("focus-mode");
    if (ml) { ml.textContent = info.ico + "  " + info.label; ml.style.color = cssVar(info.color); }
    const btn = document.getElementById("focus-start");
    if (btn) btn.innerHTML = running ? "⏸ Pausar" : (remaining < secondsFor(mode) ? "▶ Reanudar" : "▶ Iniciar");
    const ring = document.getElementById("focus-ring");
    if (ring) drawRing(ring, remaining / secondsFor(mode), info.color);
    // pestañas de modo
    ["work", "break", "long"].forEach((m) => {
      const b = document.getElementById("fmode-" + m);
      if (b) b.classList.toggle("on", m === mode);
    });
  }

  function drawRing(cv, pct, color) {
    const dpr = window.devicePixelRatio || 1;
    const size = 240;
    cv.width = size * dpr; cv.height = size * dpr;
    cv.style.width = size + "px"; cv.style.height = size + "px";
    const ctx = cv.getContext("2d"); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const cx = size / 2, cy = size / 2, r = size / 2 - 16;
    ctx.clearRect(0, 0, size, size);
    ctx.lineWidth = 14; ctx.lineCap = "round";
    ctx.strokeStyle = cssVar("--border");
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    pct = Math.max(0, Math.min(1, pct));
    if (pct > 0) {
      const g = ctx.createLinearGradient(0, 0, size, size);
      g.addColorStop(0, cssVar(color)); g.addColorStop(1, cssVar("--accent-2"));
      ctx.strokeStyle = g; ctx.shadowColor = cssVar(color); ctx.shadowBlur = 18;
      ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct); ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  // ---------- stats ----------
  function todayStats() {
    const c = cfg();
    const today = DateUtil.todayKey();
    return { sessions: c.sessionsLog[today] || 0, minutes: c.focusLog[today] || 0, total: c.sessionsCompleted || 0 };
  }

  // ---------- render ----------
  function render(container) {
    if (!container) return;
    ensureRemaining();
    const c = cfg();
    const st = todayStats();
    container.innerHTML = "";

    container.appendChild(el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [el("span", { class: "ico", text: "◷" }), "Foco"]),
        el("p", { class: "view-desc", text: "Técnica Pomodoro: concéntrate por bloques, descansa y gana XP." })
      ])
    ]));

    // KPIs
    container.appendChild(el("div", { class: "grid cols-3 mb-16" }, [
      kpi("Sesiones hoy", st.sessions + "", "completadas", "accent"),
      kpi("Minutos hoy", fmt.num(st.minutes), "enfocado", "good"),
      kpi("Total sesiones", fmt.num(st.total), "histórico", "accent")
    ]));

    const grid = el("div", { class: "grid cols-2 mb-16" });

    // ---- Tarjeta del temporizador ----
    const timerCard = el("div", { class: "card pomo" });
    // selector de modo
    const seg = el("div", { class: "seg", style: "align-self:center" }, [
      segBtn("work", "Enfoque"), segBtn("break", "Descanso"), segBtn("long", "Largo")
    ]);
    timerCard.appendChild(seg);

    const ring = el("canvas", { id: "focus-ring" });
    const timeWrap = el("div", { class: "pomo-ring" }, [
      ring,
      el("div", { class: "pomo-center" }, [
        el("div", { class: "pomo-mode", id: "focus-mode" }),
        el("div", { class: "pomo-time", id: "focus-time", text: fmtTime(remaining) })
      ])
    ]);
    timerCard.appendChild(timeWrap);

    const labelInput = el("input", { class: "input", id: "focus-label", placeholder: "¿En qué te enfocas? (opcional)", value: focusLabel, style: "text-align:center;max-width:320px;margin:0 auto" });
    labelInput.addEventListener("input", () => { focusLabel = labelInput.value; });
    timerCard.appendChild(el("div", { style: "margin:14px 0" }, [labelInput]));

    const controls = el("div", { class: "flex gap-8", style: "justify-content:center" }, [
      el("button", { class: "btn primary", id: "focus-start", onclick: () => (running ? pause() : start()) }),
      el("button", { class: "btn", id: "focus-reset", html: "↺ Reiniciar", onclick: reset }),
      el("button", { class: "btn ghost", id: "focus-skip", html: "⏭ Saltar", onclick: skip })
    ]);
    timerCard.appendChild(controls);
    grid.appendChild(timerCard);

    // ---- Tarjeta de configuración + progreso ----
    const side = el("div", { class: "card" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Ajustes del temporizador"])]),
      durField("Enfoque (min)", "work", c.work),
      durField("Descanso (min)", "break", c.break),
      durField("Descanso largo (min)", "longBreak", c.longBreak),
      durField("Largo cada N sesiones", "longEvery", c.longEvery, 1, 12),
      el("div", { class: "card-title mt-16", style: "margin-bottom:10px" }, [el("span", { class: "dot" }), "Foco · últimos 7 días"]),
    ]);
    const spark = el("canvas", { id: "focus-spark" });
    side.appendChild(el("div", { class: "chart-box" }, [spark]));
    grid.appendChild(side);

    container.appendChild(grid);

    // consejo
    container.appendChild(el("div", { class: "insight info" }, [
      el("span", { class: "ico", text: "💡" }),
      el("div", { class: "txt", html: "Consejo: elige una sola tarea, silencia distracciones y trabaja hasta que suene la alarma. Cada sesión completa suma <b>+20 XP</b>." })
    ]));

    paint();
    const days = DateUtil.lastNDays(7);
    setTimeout(() => N.Charts.bars(spark, { labels: days.map((d) => DateUtil.weekday(d)), series: [{ values: days.map((d) => c.focusLog[d] || 0), color: "--accent" }] }, { height: 150 }), 30);
  }

  function segBtn(m, label) {
    const b = el("button", { id: "fmode-" + m, text: label, onclick: () => { setMode(m); Audio.play("tab"); } });
    if (m === mode) b.classList.add("on");
    return b;
  }
  function durField(label, key, val, min, max) {
    const inp = el("input", { class: "input", type: "number", min: min || 1, max: max || 180, value: val });
    inp.addEventListener("change", () => {
      let v = parseInt(inp.value, 10);
      if (isNaN(v) || v < (min || 1)) v = min || 1;
      if (v > (max || 180)) v = max || 180;
      inp.value = v;
      cfg()[key] = v;
      Store.commit(true);
      if (!running) { remaining = secondsFor(mode); paint(); }
    });
    return el("div", { class: "field" }, [el("label", { text: label }), inp]);
  }
  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  N.Focus = { render, todayStats };
})();


/* ===== assets/js/notifications.js ===== */
/* =====================================================================
   NEXUS · Notifications — Notification API + recordatorios de pendientes
   Con degradación elegante a toasts si no hay permiso/soporte.
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI } = N;
  const DateUtil = Store.DateUtil;

  function supported() { return typeof window !== "undefined" && "Notification" in window; }
  function permission() { return supported() ? Notification.permission : "unsupported"; }
  function enabled() { return !!Store.get().settings.notifications; }

  // Pide permiso y activa las notificaciones
  function enable() {
    const fileProto = typeof location !== "undefined" && location.protocol === "file:";
    if (!supported()) {
      Store.get().settings.notifications = true; Store.commit(true);
      UI.toast({ icon: "🔔", title: "No disponible", msg: "Tu navegador no soporta notificaciones del sistema. Usaré avisos dentro de la app." });
      return Promise.resolve("in-app");
    }
    // ya bloqueadas antes: el navegador no volverá a preguntar
    if (Notification.permission === "denied") {
      Store.get().settings.notifications = true; Store.commit(true);
      UI.toast({ icon: "🔕", title: "Notificaciones bloqueadas", msg: "Reactívalas: toca el 🔒 junto a la dirección → Permisos → Notificaciones → Permitir, y recarga. (Solo en la versión web).", duration: 8000 });
      return Promise.resolve("denied");
    }
    if (fileProto) {
      UI.toast({ icon: "🌐", title: "Usa la versión web", msg: "Las notificaciones del sistema solo funcionan en https://dolarz1.github.io/NEXUS/, no abriendo el archivo local. Mientras, activo avisos dentro de la app.", duration: 8000 });
    }
    return Notification.requestPermission().then((perm) => {
      Store.get().settings.notifications = true; Store.commit(true);
      if (perm === "granted") {
        send("NEXUS activado 🔔", "Te avisaré de tus pendientes y sesiones de foco.");
        UI.toast({ icon: "🔔", title: "Notificaciones activadas", msg: "Recibirás recordatorios." });
      } else if (perm === "denied") {
        UI.toast({ icon: "🔕", title: "Permiso denegado", msg: "Puedes permitirlo desde el 🔒 junto a la dirección. Mientras, usaré avisos dentro de la app.", duration: 8000 });
      } else {
        UI.toast({ icon: "🔔", title: "Pendiente", msg: "Usaré avisos dentro de la app." });
      }
      return perm;
    }).catch(() => "error");
  }

  function disable() {
    Store.get().settings.notifications = false;
    Store.commit(true);
    UI.toast({ icon: "🔕", msg: "Notificaciones desactivadas" });
  }

  // Envía una notificación del sistema; si no se puede, cae a toast
  function send(title, body, opts) {
    opts = opts || {};
    if (enabled() && supported() && Notification.permission === "granted") {
      try {
        const n = new Notification(title, {
          body: body || "",
          icon: opts.icon,
          tag: opts.tag || "nexus",
          silent: false
        });
        if (opts.onClick) n.onclick = () => { window.focus(); opts.onClick(); n.close(); };
        setTimeout(() => { try { n.close(); } catch (e) {} }, opts.timeout || 8000);
        return true;
      } catch (e) { /* cae a toast */ }
    }
    // fallback visual
    UI.toast({ icon: opts.emoji || "🔔", title: title, msg: body || "" });
    return false;
  }

  // Revisa pendientes del día y avisa una vez al día
  function checkReminders(force) {
    if (!enabled()) return;
    const s = Store.get();
    const today = DateUtil.todayKey();
    if (!force && s.notifyMeta.lastReminder === today) return;

    const hp = N.Habits ? N.Habits.todayProgress() : { done: 0, total: 0 };
    const ts = N.Tasks ? N.Tasks.stats() : { pending: 0, overdue: 0 };
    const pendingHabits = hp.total - hp.done;
    const parts = [];
    if (pendingHabits > 0) parts.push(`${pendingHabits} hábito${pendingHabits === 1 ? "" : "s"} por completar`);
    if (ts.overdue > 0) parts.push(`${ts.overdue} tarea${ts.overdue === 1 ? "" : "s"} vencida${ts.overdue === 1 ? "" : "s"}`);
    else if (ts.pending > 0) parts.push(`${ts.pending} tarea${ts.pending === 1 ? "" : "s"} pendiente${ts.pending === 1 ? "" : "s"}`);

    if (!parts.length) return;
    s.notifyMeta.lastReminder = today;
    Store.commit(true);
    send("Tu día en NEXUS 📋", "Tienes " + parts.join(" y ") + ".", { tag: "nexus-daily" });
  }

  let interval = null;
  function init() {
    // primer chequeo al abrir (poco después del arranque)
    setTimeout(() => checkReminders(), 4000);
    // y luego periódicamente
    if (interval) clearInterval(interval);
    interval = setInterval(() => checkReminders(), 30 * 60 * 1000); // cada 30 min
  }

  N.Notify = { supported, permission, enabled, enable, disable, send, checkReminders, init };
})();


/* ===== assets/js/calexport.js ===== */
/* =====================================================================
   NEXUS · CalExport — añadir eventos a Google Calendar o descargar .ics
   Sin login ni configuración: crea el evento en el calendario del usuario
   y deja que Google/su app se encargue de los recordatorios/alertas.
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { UI, Audio, Store } = N;
  const { el, toast } = UI;
  const DateUtil = Store.DateUtil;

  function ymd(key) { return key.replace(/-/g, ""); }               // "2026-07-09" -> "20260709"
  function nextDay(key) { return ymd(DateUtil.addDays(key, 1)); }   // fin exclusivo (evento de día completo)
  function stampUTC() { return new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d+/, ""); } // 20260709T101500Z

  // URL para crear el evento en Google Calendar (evento de día completo)
  function googleUrl(title, details, dateKey, recur) {
    const p = new URLSearchParams({
      action: "TEMPLATE",
      text: title || "Recordatorio",
      dates: ymd(dateKey) + "/" + nextDay(dateKey),
      details: (details || "") + "\n\nCreado desde NEXUS"
    });
    if (recur) p.set("recur", recur); // p.ej. RRULE:FREQ=DAILY
    return "https://calendar.google.com/calendar/render?" + p.toString();
  }

  function escICS(s) { return String(s || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n"); }

  // Genera y descarga un archivo .ics (Apple, Outlook, etc.) con alarma a las 9:00
  function downloadIcs(title, details, dateKey, recur) {
    const lines = [
      "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//NEXUS//ES", "CALSCALE:GREGORIAN",
      "BEGIN:VEVENT",
      "UID:" + Store.uid() + "@nexus",
      "DTSTAMP:" + stampUTC(),
      "DTSTART;VALUE=DATE:" + ymd(dateKey),
      "DTEND;VALUE=DATE:" + nextDay(dateKey),
      "SUMMARY:" + escICS(title),
      "DESCRIPTION:" + escICS((details || "") + " — NEXUS")
    ];
    if (recur) lines.push(recur.replace(/^RRULE:/, "RRULE:")); // p.ej. "RRULE:FREQ=DAILY"
    lines.push(
      "BEGIN:VALARM", "ACTION:DISPLAY", "DESCRIPTION:" + escICS(title),
      "TRIGGER:PT9H",   // recordatorio a las 09:00 del día
      "END:VALARM",
      "END:VEVENT", "END:VCALENDAR"
    );
    const ics = lines.join("\r\n");
    try {
      const blob = new Blob([ics], { type: "text/calendar" });
      const url = URL.createObjectURL(blob);
      const a = el("a", { href: url, download: (title || "evento").replace(/[^\w\-]+/g, "_").slice(0, 40) + ".ics" });
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
      toast({ icon: "📆", title: "Archivo .ics descargado", msg: "Ábrelo para añadirlo a tu calendario." });
    } catch (e) {
      toast({ icon: "⚠️", msg: "No se pudo generar el .ics" });
    }
  }

  // Modal con las dos opciones (item.recur opcional, p.ej. "RRULE:FREQ=DAILY")
  function open(item) {
    const title = item.title || "Recordatorio";
    const details = item.details || "";
    const dateKey = item.dateKey;
    const recur = item.recur || null;
    if (!dateKey) { toast({ icon: "⚠️", msg: "Este elemento no tiene fecha." }); return; }
    const dLabel = DateUtil.parse(dateKey).toLocaleDateString("es-MX", { day: "numeric", month: "long", year: "numeric" });
    const when = recur ? ("🔁 Cada día, desde el " + dLabel) : DateUtil.parse(dateKey).toLocaleDateString("es-MX", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

    const body = el("div", {}, [
      el("div", { class: "insight info", style: "margin-bottom:14px" }, [
        el("span", { class: "ico", text: "📅" }),
        el("div", { class: "txt", html: "<b>" + title + "</b><br>" + when + "<br><span style='color:var(--txt-faint)'>Recordatorio " + (recur ? "diario" : "de día completo") + " (alarma 09:00).</span>" })
      ]),
      el("button", {
        class: "btn primary block mb-16", html: "🗓️ Añadir a Google Calendar",
        onclick: () => {
          Audio.play("coin");
          window.open(googleUrl(title, details, dateKey, recur), "_blank", "noopener");
          UI.closeModal();
        }
      }),
      el("button", {
        class: "btn block", html: "📆 Descargar .ics (Apple, Outlook, Samsung…)",
        onclick: () => { Audio.play("tap"); downloadIcs(title, details, dateKey, recur); UI.closeModal(); }
      }),
      el("p", { class: "fs-12 text-faint mt-16", text: "Tu app de calendario se encargará de la alerta, incluso con NEXUS cerrado." })
    ]);
    UI.openModal("Añadir recordatorio", body);
  }

  // Fila para insertar dentro de un formulario: lee el título y la fecha en vivo
  function formRow(titleInput, dateInput, detailText) {
    const run = (fn) => {
      const t = (titleInput && titleInput.value || "").trim();
      const d = dateInput && dateInput.value;
      if (!d) { toast({ icon: "⚠️", msg: "Primero elige una fecha arriba." }); return; }
      fn(t || "Recordatorio", detailText || "", d);
    };
    return el("div", { style: "margin:2px 0 8px;padding:12px;border:1px dashed var(--border-strong);border-radius:12px" }, [
      el("div", { class: "fs-12 text-dim", style: "margin-bottom:8px", text: "📅 Añadir recordatorio a tu calendario (usa la fecha de arriba):" }),
      el("div", { class: "row" }, [
        el("button", { type: "button", class: "btn sm", html: "🗓️ Google", onclick: () => run((t, de, d) => { Audio.play("coin"); window.open(googleUrl(t, de, d), "_blank", "noopener"); }) }),
        el("button", { type: "button", class: "btn sm", html: "📆 .ics", onclick: () => run((t, de, d) => { Audio.play("tap"); downloadIcs(t, de, d); }) })
      ])
    ]);
  }

  N.CalExport = { open, googleUrl, downloadIcs, formRow };
})();


/* ===== assets/js/settings.js ===== */
/* =====================================================================
   NEXUS · Settings — exportar/importar datos y notificaciones
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio } = N;
  const { el, toast } = UI;

  // monedas disponibles (código + locale para formato correcto)
  const CURRENCIES = [
    { code: "MXN", locale: "es-MX", label: "🇲🇽 Peso mexicano (MXN)" },
    { code: "USD", locale: "en-US", label: "🇺🇸 Dólar estadounidense (USD)" }
  ];

  // ---------- tema ----------
  function themeRow() {
    const cur = Store.get().settings.theme || "dark";
    const seg = el("div", { class: "seg", style: "flex-wrap:wrap" });
    [["light", "☀️ Claro"], ["gray", "◐ Gris"], ["dark", "🌙 Oscuro"], ["purple", "🟣 Morado"]].forEach(([val, label]) => {
      const b = el("button", { text: label, onclick: () => { if (N.App) N.App.applyTheme(val); Audio.play("tap"); open(); } });
      if (val === cur) b.classList.add("on");
      seg.appendChild(b);
    });
    return el("div", { class: "set-row", style: "flex-direction:column;align-items:stretch;gap:10px" }, [
      el("div", {}, [
        el("div", { class: "set-title", text: "🎨 Tema" }),
        el("div", { class: "set-desc", text: "Elige entre claro, gris u oscuro." })
      ]),
      seg
    ]);
  }

  // ---------- sonido ----------
  function soundRow() {
    const on = Audio.isEnabled();
    const toggle = el("button", { class: "switch" + (on ? " on" : ""), role: "switch", "aria-checked": on ? "true" : "false" }, [el("span", { class: "knob" })]);
    toggle.addEventListener("click", () => { Audio.toggle(); open(); });
    return el("div", { class: "set-row" }, [
      el("div", {}, [
        el("div", { class: "set-title", text: "🔊 Sonidos" }),
        el("div", { class: "set-desc", text: on ? "Activados" : "Silenciados" })
      ]),
      toggle
    ]);
  }

  function currencyRow() {
    const s = Store.get().settings;
    const sel = el("select", { class: "select", style: "max-width:230px" });
    CURRENCIES.forEach((c) => {
      const o = el("option", { value: c.code, text: c.label });
      if (c.code === (s.currency || "MXN")) o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener("change", () => {
      const c = CURRENCIES.find((x) => x.code === sel.value) || CURRENCIES[0];
      s.currency = c.code; s.locale = c.locale;
      Store.commit(true);
      Audio.play("coin");
      toast({ icon: "💱", title: "Moneda actualizada", msg: "Ahora en " + c.code });
      if (N.App) { N.App.refreshTop(); N.App.renderCurrent(); }
    });
    return el("div", { class: "set-row" }, [
      el("div", {}, [
        el("div", { class: "set-title", text: "💱 Moneda" }),
        el("div", { class: "set-desc", text: "Cambia y alterna la moneda de tus finanzas." })
      ]),
      sel
    ]);
  }

  // ---------- exportar ----------
  function exportData() {
    try {
      const data = Store.serialize();
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = el("a", { href: url, download: "nexus-backup-" + Store.DateUtil.todayKey() + ".json" });
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
      Audio.play("money");
      toast({ icon: "💾", title: "Datos exportados", msg: "Se descargó tu copia de seguridad." });
    } catch (e) {
      Audio.play("error");
      toast({ icon: "⚠️", title: "Error al exportar", msg: String(e.message || e) });
    }
  }

  // ---------- importar ----------
  function importData(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        Store.import(obj);
        Audio.play("complete");
        toast({ icon: "📥", title: "Datos importados", msg: "Tu información se restauró correctamente." });
        UI.closeModal();
        if (N.App) { N.App.refreshTop(); N.App.renderCurrent(); }
      } catch (e) {
        Audio.play("error");
        toast({ icon: "⚠️", title: "Archivo no válido", msg: "No se pudo leer el respaldo." });
      }
    };
    reader.onerror = () => { Audio.play("error"); toast({ icon: "⚠️", msg: "No se pudo abrir el archivo" }); };
    reader.readAsText(file);
  }

  // ---------- notificaciones ----------
  function notifRow() {
    const Notify = N.Notify;
    const on = Notify && Notify.enabled();
    const perm = Notify ? Notify.permission() : "unsupported";
    const status = !Notify || perm === "unsupported" ? "No soportadas por el navegador"
      : on && perm === "granted" ? "Activadas ✓"
      : on ? "Activadas (avisos dentro de la app)"
      : "Desactivadas";

    const toggle = el("button", { class: "switch" + (on ? " on" : "") , role: "switch", "aria-checked": on ? "true" : "false" }, [el("span", { class: "knob" })]);
    toggle.addEventListener("click", () => {
      if (Notify && Notify.enabled()) { Notify.disable(); }
      else if (Notify) { Notify.enable().then(() => open()); return; }
      open(); // re-render del modal
    });

    return el("div", { class: "set-row" }, [
      el("div", {}, [
        el("div", { class: "set-title", text: "🔔 Notificaciones y recordatorios" }),
        el("div", { class: "set-desc", text: status })
      ]),
      toggle
    ]);
  }

  // ---------- modal principal ----------
  function open() {
    const body = el("div", {}, [
      // Apariencia
      themeRow(),
      // Sonido
      soundRow(),
      // Moneda
      currencyRow(),
      // Notificaciones
      notifRow(),

      // Exportar / importar
      el("div", { class: "set-row" }, [
        el("div", {}, [
          el("div", { class: "set-title", text: "💾 Copia de seguridad" }),
          el("div", { class: "set-desc", text: "Descarga o restaura todos tus datos (JSON)." })
        ])
      ]),
      el("div", { class: "row" }, [
        el("button", { class: "btn primary", html: "⬇ Exportar", onclick: exportData }),
        (function () {
          const label = el("label", { class: "btn", style: "cursor:pointer;justify-content:center", html: "⬆ Importar" });
          const inp = el("input", { type: "file", accept: "application/json,.json", style: "display:none" });
          inp.addEventListener("change", () => { if (inp.files && inp.files[0]) importData(inp.files[0]); });
          label.appendChild(inp);
          return label;
        })()
      ]),

      // Zona de peligro
      el("div", { class: "set-row", style: "margin-top:14px;border-top:1px solid var(--border);padding-top:16px" }, [
        el("div", {}, [
          el("div", { class: "set-title", text: "⚠️ Reiniciar datos" }),
          el("div", { class: "set-desc", text: "Borra todo de forma permanente." })
        ]),
        el("button", { class: "btn danger", html: "Borrar todo", onclick: () => {
          UI.confirmBox("Reiniciar datos", "Se borrarán TODOS tus datos. Esta acción no se puede deshacer.", () => {
            Store.reset(); Audio.play("delete");
            toast({ icon: "♻️", msg: "Datos reiniciados" });
            UI.closeModal();
            if (N.App) { N.App.refreshTop(); N.App.renderCurrent(); }
          }, "Borrar todo");
        } })
      ])
    ]);
    UI.openModal("Ajustes", body);
  }

  N.Settings = { open, exportData, importData };
})();


/* ===== assets/js/app.js ===== */
/* =====================================================================
   NEXUS · App — orquestador principal
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, Audio, UI, Gami } = N;
  const { $, $$ } = UI;

  const VIEWS = {
    dashboard: N.Dashboard,
    habits: N.Habits,
    finance: N.Finance,
    tasks: N.Tasks,
    workouts: N.Workouts,
    goals: N.Goals,
    focus: N.Focus
  };
  let current = "dashboard";

  // ---------- Temas ----------
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    Store.get().settings.theme = theme;
    Store.commit(true);
  }

  // ---------- Barra superior ----------
  function refreshTop() {
    const s = Store.get();
    const lp = Gami.levelProgress();
    $("#level-badge").textContent = lp.level;
    $("#rank-name").textContent = Gami.rankName(lp.level);
    $("#xp-text").textContent = `${UI.fmt.num(lp.into)} / ${UI.fmt.num(lp.span)} XP`;
    $("#xp-fill").style.width = lp.pct + "%";
    $("#streak-days").textContent = Gami.globalStreak();
  }

  // ---------- Router ----------
  function switchView(name, silent) {
    if (!VIEWS[name]) return;
    current = name;
    $$(".tab").forEach((t) => t.classList.toggle("is-active", t.dataset.view === name));
    $$(".view").forEach((v) => v.classList.toggle("is-active", v.id === "view-" + name));
    if (!silent) Audio.play("tab");
    renderCurrent();
  }

  function renderCurrent() {
    const container = document.getElementById("view-" + current);
    if (container && VIEWS[current]) VIEWS[current].render(container);
    refreshTop();
  }

  // ---------- Eventos ----------
  function bind() {
    // gesto inicial desbloquea audio
    document.body.addEventListener("pointerdown", () => Audio.unlock(), { once: true });

    $("#tabs").addEventListener("click", (e) => {
      const tab = e.target.closest(".tab");
      if (tab) switchView(tab.dataset.view);
    });

    const setBtn = $("#settings-btn");
    if (setBtn) setBtn.addEventListener("click", () => { Audio.play("tap"); if (N.Settings) N.Settings.open(); });

    $("#modal-close").addEventListener("click", UI.closeModal);
    $("#modal-overlay").addEventListener("click", (e) => { if (e.target.id === "modal-overlay") UI.closeModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") UI.closeModal(); });

    // redibujar gráficas al cambiar tamaño
    let rt = null;
    window.addEventListener("resize", () => { clearTimeout(rt); rt = setTimeout(renderCurrent, 250); });
  }

  // ---------- Init ----------
  function init() {
    const s = Store.get();
    applyTheme(s.settings.theme || "dark");
    bind();
    Gami.checkAchievements();
    if (N.Notify) N.Notify.init();
    switchView("dashboard", true);

    // mostrar la app cuanto antes y ocultar el arranque
    $("#app").hidden = false;
    setTimeout(() => {
      const boot = $("#boot-screen");
      if (boot) {
        boot.classList.add("hide");
        setTimeout(() => boot.remove(), 350);
      }
    }, 450);
  }

  // ---------- Service Worker (PWA) ----------
  // Solo en http/https (no en file://). Habilita instalación y uso offline.
  function registerSW() {
    try {
      if (typeof location !== "undefined" && /^https?:$/.test(location.protocol) &&
          typeof navigator !== "undefined" && "serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      }
    } catch (e) {}
  }

  N.App = { refreshTop, switchView, renderCurrent, applyTheme };

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
  registerSW();
})();

  </script>
</body>
