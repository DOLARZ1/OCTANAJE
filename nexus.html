/* ===== assets/js/modules/habits.js ===== */
/* =====================================================================
   NEXUS · Módulo Hábitos
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;
  const { el, fmt, toast } = UI;
  const DateUtil = Store.DateUtil;

  const ICONS = ["✦", "💧", "📚", "🏃", "🧘", "🥗", "😴", "💊", "🎯", "🎨", "🎸", "☀️", "🚭", "🧠"];

  function habits() { return Store.get().habits; }

  // racha de un hábito
  function streak(h) {
    let s = 0, day = DateUtil.todayKey();
    if (!h.history[day]) day = DateUtil.addDays(day, -1);
    while (h.history[day]) { s++; day = DateUtil.addDays(day, -1); }
    return s;
  }
  function bestStreak(h) {
    const dates = Object.keys(h.history).filter((k) => h.history[k]).sort();
    let best = 0, cur = 0, prev = null;
    dates.forEach((d) => {
      if (prev && DateUtil.diffDays(d, prev) === 1) cur++; else cur = 1;
      if (cur > best) best = cur;
      prev = d;
    });
    return best;
  }
  function doneToday(h) { return !!h.history[DateUtil.todayKey()]; }
  function completion30(h) {
    const days = DateUtil.lastNDays(30);
    const done = days.filter((d) => h.history[d]).length;
    return Math.round((done / 30) * 100);
  }

  function toggle(h) {
    const today = DateUtil.todayKey();
    if (h.history[today]) {
      delete h.history[today];
      Audio.play("tap");
      Gami.remove(12);
      Store.commit();
    } else {
      h.history[today] = true;
      Audio.play("complete");
      const bonus = streak(h) >= 7 ? 6 : 0;
      Gami.award(12 + bonus, bonus ? "Hábito + racha 🔥" : "Hábito completado");
    }
    render(document.getElementById("view-habits"));
    N.App && N.App.refreshTop();
  }

  function addOrEdit(existing) {
    const body = UI.form([
      { name: "name", label: "Nombre del hábito", value: existing ? existing.name : "", placeholder: "Beber 2L de agua", required: true },
      { name: "icon", label: "Ícono", type: "select", value: existing ? existing.icon : "✦", options: ICONS },
      { name: "target", label: "Meta diaria (opcional, texto)", value: existing ? existing.target || "" : "", placeholder: "Ej: 8 vasos" }
    ], (data) => {
      if (existing) {
        existing.name = data.name; existing.icon = data.icon; existing.target = data.target;
        toast({ icon: "✏️", msg: "Hábito actualizado" });
      } else {
        habits().push({ id: Store.uid(), name: data.name, icon: data.icon, target: data.target, history: {}, created: DateUtil.todayKey() });
        Audio.play("add");
        toast({ icon: "✦", title: "Nuevo hábito", msg: data.name });
        Gami.award(5, "Nuevo hábito creado");
      }
      Store.commit();
      UI.closeModal();
      render(document.getElementById("view-habits"));
      N.App && N.App.refreshTop();
    }, existing ? "Guardar cambios" : "Crear hábito");
    UI.openModal(existing ? "Editar hábito" : "Nuevo hábito", body);
  }

  function remove(h) {
    UI.confirmBox("Eliminar hábito", `¿Eliminar "${h.name}"? Se perderá su historial.`, () => {
      const arr = habits();
      arr.splice(arr.indexOf(h), 1);
      Store.commit();
      Audio.play("delete");
      render(document.getElementById("view-habits"));
    }, "Eliminar");
  }

  // ---------- stats para dashboard ----------
  function todayProgress() {
    const arr = habits();
    if (!arr.length) return { done: 0, total: 0, pct: 0 };
    const done = arr.filter(doneToday).length;
    return { done, total: arr.length, pct: Math.round((done / arr.length) * 100) };
  }
  function weeklySeries() {
    const days = DateUtil.lastNDays(7);
    return {
      labels: days.map((d) => DateUtil.weekday(d)),
      values: days.map((d) => habits().filter((h) => h.history[d]).length)
    };
  }

  function render(container) {
    const arr = habits();
    const prog = todayProgress();
    container.innerHTML = "";

    const head = el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [el("span", { class: "ico", text: "✦" }), "Hábitos"]),
        el("p", { class: "view-desc", text: "Construye rutinas, mantén tu racha y suma XP cada día." })
      ]),
      el("button", { class: "btn primary", onclick: () => addOrEdit(null) }, [el("span", { text: "＋" }), "Nuevo hábito"])
    ]);
    container.appendChild(head);

    // resumen del día
    const summary = el("div", { class: "grid cols-3 mb-16" }, [
      statCard("Hoy", `${prog.done}/${prog.total}`, "completados", "accent"),
      statCard("Cumplimiento", fmt.pct(prog.pct), "del día", prog.pct >= 100 ? "good" : "warn"),
      statCard("Hábitos activos", arr.length + "", "en seguimiento", "accent")
    ]);
    container.appendChild(summary);

    // gráfica semanal
    const chartCard = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Hábitos completados · últimos 7 días"])])
    ]);
    const cv = el("canvas");
    const box = el("div", { class: "chart-box" }, [cv]);
    chartCard.appendChild(box);
    container.appendChild(chartCard);
    setTimeout(() => Charts.bars(cv, { labels: weeklySeries().labels, series: [{ values: weeklySeries().values, color: "--accent" }] }, { height: 170 }), 30);

    // lista
    if (!arr.length) {
      container.appendChild(el("div", { class: "card" }, [
        el("div", { class: "empty" }, [el("span", { class: "big", text: "✦" }), el("div", { text: "Aún no tienes hábitos. ¡Crea el primero!" })])
      ]));
      return;
    }

    const list = el("div", { class: "grid cols-2" });
    arr.forEach((h) => list.appendChild(habitCard(h)));
    container.appendChild(list);
  }

  function statCard(label, val, sub, cls) {
    return el("div", { class: "card" }, [
      el("div", { class: "kpi" }, [
        el("div", { class: "kpi-lbl", text: label }),
        el("div", { class: "kpi-val " + (cls || ""), text: val }),
        el("div", { class: "kpi-sub", text: sub })
      ])
    ]);
  }

  function habitCard(h) {
    const st = streak(h);
    const done = doneToday(h);
    const comp = completion30(h);

    // heatmap 30 días
    const heat = el("div", { class: "heat mt-8" });
    DateUtil.lastNDays(35).forEach((d) => {
      const cell = el("i", { title: DateUtil.label(d) });
      if (h.history[d]) cell.classList.add("l3");
      heat.appendChild(cell);
    });

    const card = el("div", { class: "card" }, [
      el("div", { class: "flex items-center gap-12" }, [
        el("button", {
          class: "check" + (done ? " on" : ""),
          title: done ? "Marcar como no hecho" : "Marcar hecho hoy",
          onclick: () => toggle(h),
          html: done ? "✓" : ""
        }),
        el("div", { class: "item-main" }, [
          el("div", { class: "item-title" }, [el("span", { text: h.icon + " " }), h.name]),
          el("div", { class: "item-meta" }, [
            el("span", { class: "chip warn", html: "🔥 " + st + " día" + (st === 1 ? "" : "s") }),
            el("span", { class: "chip", text: "Récord " + bestStreak(h) }),
            h.target ? el("span", { class: "text-faint fs-12", text: h.target }) : null
          ])
        ]),
        el("div", { class: "flex gap-8" }, [
          el("button", { class: "icon-btn", title: "Editar", onclick: () => addOrEdit(h), html: "✏️" }),
          el("button", { class: "icon-btn", title: "Eliminar", onclick: () => remove(h), html: "🗑️" })
        ])
      ]),
      el("div", { class: "flex items-center justify-between mt-16", style: "margin-bottom:6px" }, [
        el("span", { class: "fs-12 text-dim", text: "Cumplimiento 30 días" }),
        el("span", { class: "fs-12 fw-700 text-accent", text: fmt.pct(comp) })
      ]),
      el("div", { class: "progress" + (comp >= 70 ? " good" : "") }, [el("span", { style: `width:${comp}%` })]),
      heat
    ]);
    return card;
  }

  N.Habits = { render, todayProgress, weeklySeries, streak };
})();


/* ===== assets/js/modules/finance.js ===== */
/* =====================================================================
   NEXUS · Módulo Finanzas con IA
   Motor de análisis por reglas: detecta patrones, sobregasto, tasa de
   ahorro, proyecciones y genera recomendaciones personalizadas.
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;
  const { el, fmt, toast } = UI;
  const DateUtil = Store.DateUtil;

  const EXPENSE_CATS = ["Comida", "Transporte", "Vivienda", "Servicios", "Ocio", "Salud", "Compras", "Educación", "Suscripciones", "Otros"];
  const INCOME_CATS = ["Salario", "Freelance", "Inversiones", "Regalo", "Ventas", "Otros"];
  const CAT_ICON = { Comida: "🍔", Transporte: "🚗", Vivienda: "🏠", Servicios: "💡", Ocio: "🎮", Salud: "🩺", Compras: "🛍️", Educación: "📖", Suscripciones: "📺", Otros: "•", Salario: "💼", Freelance: "💻", Inversiones: "📈", Regalo: "🎁", Ventas: "🏷️" };

  function fin() { return Store.get().finance; }
  function txs() { return fin().transactions; }

  function inMonth(t, mk) { return t.date.slice(0, 7) === (mk || DateUtil.monthKey()); }
  function sum(list) { return list.reduce((s, t) => s + t.amount, 0); }

  function monthIncome(mk) { return sum(txs().filter((t) => t.type === "income" && inMonth(t, mk))); }
  function monthExpense(mk) { return sum(txs().filter((t) => t.type === "expense" && inMonth(t, mk))); }
  function monthBalance(mk) { return monthIncome(mk) - monthExpense(mk); }

  function expenseByCategory(mk) {
    const map = {};
    txs().filter((t) => t.type === "expense" && inMonth(t, mk)).forEach((t) => { map[t.category] = (map[t.category] || 0) + t.amount; });
    return Object.keys(map).map((k) => ({ label: k, value: map[k] })).sort((a, b) => b.value - a.value);
  }

  function last6Months() {
    const out = [];
    const now = new Date();
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const mk = DateUtil.monthKey(d);
      out.push({ mk, label: d.toLocaleDateString("es", { month: "short" }), income: monthIncome(mk), expense: monthExpense(mk) });
    }
    return out;
  }

  // ---------------------------------------------------------------
  //  MOTOR DE IA — genera insights a partir de los datos
  // ---------------------------------------------------------------
  function analyze() {
    const insights = [];
    const inc = monthIncome(), exp = monthExpense(), bal = inc - exp;
    const f = fin();
    const cats = expenseByCategory();
    const months = last6Months();
    const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
    const today = new Date().getDate();

    if (inc === 0 && exp === 0) {
      insights.push({ type: "info", icon: "🤖", txt: "Registra tus ingresos y gastos y analizaré tus finanzas al instante: tasa de ahorro, sobregastos, proyecciones y recomendaciones." });
      return { insights, score: null };
    }

    // 1) Tasa de ahorro
    if (inc > 0) {
      const rate = (bal / inc) * 100;
      if (rate >= 20) insights.push({ type: "good", icon: "💎", txt: `Excelente: ahorras el <b>${Math.round(rate)}%</b> de tus ingresos este mes. Estás por encima de la regla del 20%.` });
      else if (rate >= 0) insights.push({ type: "warn", icon: "📊", txt: `Tu tasa de ahorro es del <b>${Math.round(rate)}%</b>. Apunta al 20% (regla 50/30/20): recorta gastos no esenciales unos ${fmt.money(inc * 0.2 - bal)}.` });
      else insights.push({ type: "bad", icon: "🚨", txt: `Alerta: gastas <b>${fmt.money(-bal)}</b> más de lo que ingresas. Revisa las categorías más altas para equilibrar tu mes.` });
    }

    // 2) Categoría dominante
    if (cats.length && exp > 0) {
      const top = cats[0];
      const share = (top.value / exp) * 100;
      if (share > 40) insights.push({ type: "warn", icon: CAT_ICON[top.label] || "⚠️", txt: `<b>${top.label}</b> concentra el <b>${Math.round(share)}%</b> de tus gastos (${fmt.money(top.value)}). Es tu mayor oportunidad de ahorro.` });
      else insights.push({ type: "info", icon: CAT_ICON[top.label] || "📌", txt: `Tu mayor gasto es <b>${top.label}</b> con ${fmt.money(top.value)} (${Math.round(share)}%). Gasto bien distribuido.` });
    }

    // 3) Proyección fin de mes (ritmo de gasto)
    if (exp > 0 && today > 2) {
      const dailyRate = exp / today;
      const projected = dailyRate * daysInMonth;
      if (f.budget > 0) {
        if (projected > f.budget) insights.push({ type: "bad", icon: "📈", txt: `A este ritmo gastarás ~<b>${fmt.money(projected)}</b> este mes, superando tu presupuesto de ${fmt.money(f.budget)} en ${fmt.money(projected - f.budget)}.` });
        else insights.push({ type: "good", icon: "✅", txt: `Vas bien: proyección de ~<b>${fmt.money(projected)}</b>, dentro de tu presupuesto de ${fmt.money(f.budget)}.` });
      } else {
        insights.push({ type: "info", icon: "🔮", txt: `Según tu ritmo, cerrarás el mes con ~<b>${fmt.money(projected)}</b> en gastos. Define un presupuesto para recibir alertas.` });
      }
    }

    // 4) Tendencia vs mes anterior
    if (months.length >= 2) {
      const prev = months[months.length - 2], cur = months[months.length - 1];
      if (prev.expense > 0) {
        const chg = ((cur.expense - prev.expense) / prev.expense) * 100;
        if (chg > 15) insights.push({ type: "warn", icon: "⬆️", txt: `Tus gastos subieron un <b>${Math.round(chg)}%</b> respecto al mes pasado. Vigila el ritmo.` });
        else if (chg < -10) insights.push({ type: "good", icon: "⬇️", txt: `¡Bien! Redujiste tus gastos un <b>${Math.round(-chg)}%</b> frente al mes anterior.` });
      }
    }

    // 5) Suscripciones
    const subs = cats.find((c) => c.label === "Suscripciones");
    if (subs && subs.value > 0 && inc > 0 && subs.value / inc > 0.1) {
      insights.push({ type: "warn", icon: "📺", txt: `Gastas ${fmt.money(subs.value)} en suscripciones (${Math.round((subs.value / inc) * 100)}% de tus ingresos). Cancela las que no uses.` });
    }

    // 6) Meta de ahorro
    if (f.savingGoal > 0) {
      if (bal >= f.savingGoal) insights.push({ type: "good", icon: "🎯", txt: `¡Meta de ahorro cumplida! Guardaste ${fmt.money(bal)} de los ${fmt.money(f.savingGoal)} objetivo.` });
      else insights.push({ type: "info", icon: "🎯", txt: `Te faltan <b>${fmt.money(f.savingGoal - bal)}</b> para tu meta de ahorro mensual de ${fmt.money(f.savingGoal)}.` });
    }

    // 7) Fondo de emergencia (consejo educativo)
    if (bal > 0) {
      insights.push({ type: "info", icon: "🛡️", txt: `Consejo: destina parte de tus ${fmt.money(bal)} de balance a un fondo de emergencia (meta: 3-6 meses de gastos).` });
    }

    // ---- Salud financiera (score 0-100) ----
    let score = 50;
    if (inc > 0) {
      const rate = (bal / inc) * 100;
      score = 50 + Math.max(-40, Math.min(40, rate));            // ahorro
      if (cats.length && (cats[0].value / (exp || 1)) > 0.45) score -= 8; // concentración
      if (f.budget > 0 && exp <= f.budget) score += 8;
    }
    score = Math.round(Math.max(0, Math.min(100, score)));

    return { insights, score };
  }

  // ---------------------------------------------------------------
  //  Acciones
  // ---------------------------------------------------------------
  function addTx(type) {
    const cats = type === "income" ? INCOME_CATS : EXPENSE_CATS;
    const body = UI.form([
      { type: "row", fields: [
        { name: "amount", label: "Monto", type: "number", min: 0, step: "0.01", placeholder: "0.00", required: true },
        { name: "category", label: "Categoría", type: "select", options: cats, value: cats[0] }
      ]},
      { name: "note", label: "Nota (opcional)", placeholder: type === "income" ? "Pago de nómina" : "Supermercado" },
      { name: "date", label: "Fecha", type: "date", value: DateUtil.todayKey(), required: true }
    ], (data) => {
      if (!data.amount || data.amount <= 0) { Audio.play("error"); toast({ icon: "⚠️", msg: "Ingresa un monto válido" }); return; }
      txs().push({ id: Store.uid(), type, amount: Number(data.amount), category: data.category, note: data.note, date: data.date });
      Store.commit();
      Audio.play(type === "income" ? "money" : "coin");
      Gami.award(type === "income" ? 8 : 5, type === "income" ? "Ingreso registrado" : "Gasto registrado");
      UI.closeModal();
      render(document.getElementById("view-finance"));
      N.App && N.App.refreshTop();
    }, type === "income" ? "Registrar ingreso" : "Registrar gasto");
    UI.openModal(type === "income" ? "＋ Nuevo ingreso" : "－ Nuevo gasto", body);
  }

  function editBudget() {
    const f = fin();
    const body = UI.form([
      { name: "budget", label: "Presupuesto mensual de gasto", type: "number", min: 0, value: f.budget || "", placeholder: "1500" },
      { name: "savingGoal", label: "Meta de ahorro mensual", type: "number", min: 0, value: f.savingGoal || "", placeholder: "300" }
    ], (data) => {
      f.budget = Number(data.budget) || 0;
      f.savingGoal = Number(data.savingGoal) || 0;
      Store.commit();
      toast({ icon: "🎯", msg: "Objetivos actualizados" });
      UI.closeModal();
      render(document.getElementById("view-finance"));
    }, "Guardar objetivos");
    UI.openModal("Objetivos financieros", body);
  }

  function removeTx(t) {
    const arr = txs();
    arr.splice(arr.indexOf(t), 1);
    Store.commit();
    Audio.play("delete");
    render(document.getElementById("view-finance"));
    N.App && N.App.refreshTop();
  }

  // ---------------------------------------------------------------
  //  Render
  // ---------------------------------------------------------------
  function render(container) {
    container.innerHTML = "";
    const inc = monthIncome(), exp = monthExpense(), bal = inc - exp;
    const result = analyze();

    const head = el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [el("span", { class: "ico", text: "◈" }), "Finanzas IA"]),
        el("p", { class: "view-desc", text: "Registra tu dinero y recibe análisis inteligente en tiempo real." })
      ]),
      el("div", { class: "flex gap-8" }, [
        el("button", { class: "btn", onclick: editBudget, html: "🎯 Objetivos" }),
        el("button", { class: "btn ghost", onclick: () => addTx("expense"), html: "－ Gasto" }),
        el("button", { class: "btn primary", onclick: () => addTx("income"), html: "＋ Ingreso" })
      ])
    ]);
    container.appendChild(head);

    // KPIs
    container.appendChild(el("div", { class: "grid cols-4 mb-16" }, [
      kpi("Ingresos", fmt.money(inc), "este mes", "good"),
      kpi("Gastos", fmt.money(exp), "este mes", "bad"),
      kpi("Balance", fmt.money(bal), bal >= 0 ? "ahorro" : "déficit", bal >= 0 ? "good" : "bad"),
      kpi("Salud", result.score == null ? "—" : result.score + "/100", "financiera", healthClass(result.score))
    ]));

    // Panel IA
    const aiCard = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head" }, [
        el("div", { class: "card-title" }, [el("span", { class: "dot" }), "🤖 Asistente financiero IA"]),
        result.score != null ? el("span", { class: "chip " + healthChip(result.score), text: "Salud " + result.score + "/100" }) : null
      ])
    ]);
    result.insights.forEach((ins) => {
      aiCard.appendChild(el("div", { class: "insight " + ins.type }, [
        el("span", { class: "ico", text: ins.icon }),
        el("div", { class: "txt", html: ins.txt })
      ]));
    });
    container.appendChild(aiCard);

    // Gráficas
    const charts = el("div", { class: "grid cols-2 mb-16" });

    const trendCard = el("div", { class: "card" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Ingresos vs Gastos · 6 meses"])])
    ]);
    const cvTrend = el("canvas");
    trendCard.appendChild(el("div", { class: "chart-box" }, [cvTrend]));
    trendCard.appendChild(el("div", { class: "flex gap-12 mt-8 fs-12" }, [
      el("span", { class: "chip good", text: "● Ingresos" }), el("span", { class: "chip bad", text: "● Gastos" })
    ]));
    charts.appendChild(trendCard);

    const catCard = el("div", { class: "card" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Gastos por categoría"])])
    ]);
    const cvCat = el("canvas");
    catCard.appendChild(el("div", { class: "chart-box" }, [cvCat]));
    const cats = expenseByCategory();
    const legend = el("div", { class: "mt-8" });
    cats.slice(0, 5).forEach((c) => {
      legend.appendChild(el("div", { class: "flex items-center justify-between fs-12", style: "padding:3px 0" }, [
        el("span", { text: (CAT_ICON[c.label] || "•") + " " + c.label }),
        el("span", { class: "fw-700", text: fmt.money(c.value) })
      ]));
    });
    catCard.appendChild(legend);
    charts.appendChild(catCard);
    container.appendChild(charts);

    setTimeout(() => {
      const m = last6Months();
      Charts.bars(cvTrend, {
        labels: m.map((x) => x.label),
        series: [{ values: m.map((x) => x.income), color: "--good" }, { values: m.map((x) => x.expense), color: "--bad" }]
      }, { height: 190 });
      Charts.doughnut(cvCat, cats, { height: 190, centerLabel: fmt.money(exp), centerSub: "gasto mes" });
    }, 30);

    // Movimientos recientes
    const recent = txs().slice().sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id)).slice(0, 12);
    const listCard = el("div", { class: "card" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Movimientos recientes"])])
    ]);
    if (!recent.length) {
      listCard.appendChild(el("div", { class: "empty" }, [el("span", { class: "big", text: "◈" }), el("div", { text: "Sin movimientos todavía." })]));
    } else {
      recent.forEach((t) => {
        listCard.appendChild(el("div", { class: "item" }, [
          el("div", { style: "font-size:20px", text: CAT_ICON[t.category] || "•" }),
          el("div", { class: "item-main" }, [
            el("div", { class: "item-title", text: t.note || t.category }),
            el("div", { class: "item-meta" }, [
              el("span", { text: t.category }),
              el("span", { text: DateUtil.label(t.date) })
            ])
          ]),
          el("div", { class: "fw-700 " + (t.type === "income" ? "text-good" : "text-bad"), text: (t.type === "income" ? "+" : "−") + fmt.money(t.amount) }),
          el("button", { class: "icon-btn", html: "🗑️", title: "Eliminar", onclick: () => removeTx(t) })
        ]));
      });
    }
    container.appendChild(listCard);
  }

  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }),
      el("div", { class: "kpi-val " + (cls || ""), text: val }),
      el("div", { class: "kpi-sub", text: sub })
    ])]);
  }
  function healthClass(s) { if (s == null) return ""; return s >= 70 ? "good" : s >= 45 ? "warn" : "bad"; }
  function healthChip(s) { return s >= 70 ? "good" : s >= 45 ? "warn" : "bad"; }

  N.Finance = { render, monthIncome, monthExpense, monthBalance, expenseByCategory, last6Months, analyze };
})();


/* ===== assets/js/modules/tasks.js ===== */
/* =====================================================================
   NEXUS · Módulo Tareas
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;
  const { el, fmt, toast } = UI;
  const DateUtil = Store.DateUtil;

  const PRIO = { high: { label: "Alta", chip: "bad", xp: 15 }, medium: { label: "Media", chip: "warn", xp: 10 }, low: { label: "Baja", chip: "accent", xp: 6 } };

  function tasks() { return Store.get().tasks; }
  let filter = "active";

  function completeTask(t) {
    t.done = !t.done;
    if (t.done) {
      t.doneAt = DateUtil.todayKey();
      Audio.play("complete");
      Gami.award(PRIO[t.priority].xp, "Tarea completada");
    } else {
      Audio.play("tap");
      Gami.remove(PRIO[t.priority].xp);
      Store.commit();
    }
    render(document.getElementById("view-tasks"));
    N.App && N.App.refreshTop();
  }

  function toggleSub(t, sub) {
    sub.done = !sub.done;
    Audio.play(sub.done ? "coin" : "tap");
    // completar automáticamente si todas las subtareas están hechas
    if (t.subtasks.length && t.subtasks.every((s) => s.done) && !t.done) { completeTask(t); return; }
    Store.commit();
    render(document.getElementById("view-tasks"));
  }

  function addOrEdit(existing) {
    const body = UI.form([
      { name: "title", label: "Tarea", value: existing ? existing.title : "", placeholder: "Terminar informe mensual", required: true },
      { type: "row", fields: [
        { name: "priority", label: "Prioridad", type: "select", value: existing ? existing.priority : "medium", options: [
          { value: "high", label: "🔴 Alta" }, { value: "medium", label: "🟡 Media" }, { value: "low", label: "🔵 Baja" }
        ]},
        { name: "due", label: "Fecha límite", type: "date", value: existing ? existing.due || "" : "" }
      ]},
      { name: "subtasks", label: "Subtareas (una por línea)", type: "textarea", value: existing ? existing.subtasks.map((s) => s.t).join("\n") : "", placeholder: "Investigar\nRedactar\nRevisar" }
    ], (data) => {
      const subs = (data.subtasks || "").split("\n").map((s) => s.trim()).filter(Boolean).map((t) => ({ t, done: false }));
      if (existing) {
        existing.title = data.title; existing.priority = data.priority; existing.due = data.due;
        // preservar estado de subtareas existentes por texto
        existing.subtasks = subs.map((ns) => { const prev = existing.subtasks.find((os) => os.t === ns.t); return prev || ns; });
        toast({ icon: "✏️", msg: "Tarea actualizada" });
      } else {
        tasks().push({ id: Store.uid(), title: data.title, priority: data.priority, due: data.due, done: false, subtasks: subs, created: DateUtil.todayKey() });
        Audio.play("add");
        toast({ icon: "✓", title: "Nueva tarea", msg: data.title });
      }
      Store.commit();
      UI.closeModal();
      render(document.getElementById("view-tasks"));
    }, existing ? "Guardar" : "Crear tarea");
    UI.openModal(existing ? "Editar tarea" : "Nueva tarea", body);
  }

  function remove(t) {
    const arr = tasks(); arr.splice(arr.indexOf(t), 1);
    Store.commit(); Audio.play("delete");
    render(document.getElementById("view-tasks"));
    N.App && N.App.refreshTop();
  }

  // ---------- stats ----------
  function stats() {
    const arr = tasks();
    const done = arr.filter((t) => t.done).length;
    const pending = arr.length - done;
    const overdue = arr.filter((t) => !t.done && t.due && t.due < DateUtil.todayKey()).length;
    return { total: arr.length, done, pending, overdue, pct: arr.length ? Math.round((done / arr.length) * 100) : 0 };
  }
  function completed7() {
    const days = DateUtil.lastNDays(7);
    return { labels: days.map((d) => DateUtil.weekday(d)), values: days.map((d) => tasks().filter((t) => t.done && t.doneAt === d).length) };
  }

  function dueLabel(t) {
    if (!t.due) return null;
    const diff = DateUtil.diffDays(t.due, DateUtil.todayKey());
    if (diff < 0) return { text: "Vencida", cls: "bad" };
    if (diff === 0) return { text: "Hoy", cls: "warn" };
    if (diff === 1) return { text: "Mañana", cls: "warn" };
    return { text: DateUtil.label(t.due), cls: "" };
  }

  function render(container) {
    container.innerHTML = "";
    const st = stats();

    const head = el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [el("span", { class: "ico", text: "✓" }), "Tareas"]),
        el("p", { class: "view-desc", text: "Organiza tu día por prioridad y completa con subtareas." })
      ]),
      el("button", { class: "btn primary", onclick: () => addOrEdit(null), html: "＋ Nueva tarea" })
    ]);
    container.appendChild(head);

    container.appendChild(el("div", { class: "grid cols-4 mb-16" }, [
      kpi("Pendientes", st.pending + "", "por hacer", "accent"),
      kpi("Completadas", st.done + "", "en total", "good"),
      kpi("Vencidas", st.overdue + "", "atrasadas", st.overdue ? "bad" : ""),
      kpi("Progreso", fmt.pct(st.pct), "completado", st.pct >= 70 ? "good" : "warn")
    ]));

    // gráfica
    const chartCard = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Tareas completadas · últimos 7 días"])])
    ]);
    const cv = el("canvas");
    chartCard.appendChild(el("div", { class: "chart-box" }, [cv]));
    container.appendChild(chartCard);
    setTimeout(() => Charts.line(cv, completed7(), { height: 160, color: "--good" }), 30);

    // filtros
    const seg = el("div", { class: "seg mb-16" });
    [["active", "Activas"], ["all", "Todas"], ["done", "Hechas"]].forEach(([k, lb]) => {
      seg.appendChild(el("button", { class: filter === k ? "on" : "", text: lb, onclick: () => { filter = k; Audio.play("tab"); render(container); } }));
    });
    container.appendChild(seg);

    // lista
    let arr = tasks().slice();
    if (filter === "active") arr = arr.filter((t) => !t.done);
    if (filter === "done") arr = arr.filter((t) => t.done);
    const order = { high: 0, medium: 1, low: 2 };
    arr.sort((a, b) => (a.done - b.done) || (order[a.priority] - order[b.priority]) || ((a.due || "9999") .localeCompare(b.due || "9999")));

    const listCard = el("div", { class: "card" });
    if (!arr.length) {
      listCard.appendChild(el("div", { class: "empty" }, [el("span", { class: "big", text: "✓" }), el("div", { text: filter === "done" ? "Aún no completas tareas." : "Sin tareas. ¡Añade una!" })]));
    } else {
      arr.forEach((t) => listCard.appendChild(taskItem(t)));
    }
    container.appendChild(listCard);
  }

  function taskItem(t) {
    const p = PRIO[t.priority];
    const due = dueLabel(t);
    const subDone = t.subtasks.filter((s) => s.done).length;

    const item = el("div", { class: "item" + (t.done ? " done" : ""), style: "flex-direction:column;align-items:stretch" });
    const topRow = el("div", { class: "flex items-center gap-12" }, [
      el("button", { class: "check" + (t.done ? " on" : ""), html: t.done ? "✓" : "", onclick: () => completeTask(t) }),
      el("div", { class: "item-main" }, [
        el("div", { class: "item-title", text: t.title }),
        el("div", { class: "item-meta" }, [
          el("span", { class: "chip " + p.chip, text: p.label }),
          due ? el("span", { class: "chip " + due.cls, text: "📅 " + due.text }) : null,
          t.subtasks.length ? el("span", { class: "text-faint fs-12", text: `${subDone}/${t.subtasks.length} subtareas` }) : null
        ])
      ]),
      el("div", { class: "flex gap-8" }, [
        el("button", { class: "icon-btn", html: "✏️", title: "Editar", onclick: () => addOrEdit(t) }),
        el("button", { class: "icon-btn", html: "🗑️", title: "Eliminar", onclick: () => remove(t) })
      ])
    ]);
    item.appendChild(topRow);

    if (t.subtasks.length) {
      const subWrap = el("div", { style: "margin:10px 0 2px 42px;display:flex;flex-direction:column;gap:6px" });
      t.subtasks.forEach((s) => {
        subWrap.appendChild(el("div", { class: "flex items-center gap-8", style: "cursor:pointer", onclick: () => toggleSub(t, s) }, [
          el("span", { style: "font-size:14px;color:" + (s.done ? "var(--good)" : "var(--txt-faint)"), text: s.done ? "☑" : "☐" }),
          el("span", { class: "fs-13", style: s.done ? "text-decoration:line-through;color:var(--txt-faint)" : "", text: s.t })
        ]));
      });
      item.appendChild(subWrap);
      const pct = Math.round((subDone / t.subtasks.length) * 100);
      item.appendChild(el("div", { class: "progress", style: "margin-left:42px;width:calc(100% - 42px)" }, [el("span", { style: `width:${pct}%` })]));
    }
    return item;
  }

  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  N.Tasks = { render, stats, completed7 };
})();

(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;

  const DateUtil = Store.DateUtil;

  const TYPES = [
    { value: "fuerza", label: "🏋️ Fuerza" },
    { value: "cardio", label: "🏃 Cardio" },
    { value: "hiit", label: "⚡ HIIT" },
    { value: "yoga", label: "🧘 Yoga / Movilidad" },
    { value: "deporte", label: "⚽ Deporte" },
    { value: "otro", label: "💪 Otro" }
  ];
  const TYPE_ICON = { fuerza: "🏋️", cardio: "🏃", hiit: "⚡", yoga: "🧘", deporte: "⚽", otro: "💪" };

  function workouts() { return Store.get().workouts; }

  function add() {
    const body = UI.form([
      { name: "name", label: "Nombre de la sesión", placeholder: "Pecho y tríceps", required: true },
      { type: "row", fields: [
        { name: "type", label: "Tipo", type: "select", options: TYPES, value: "fuerza" },
        { name: "date", label: "Fecha", type: "date", value: DateUtil.todayKey(), required: true }
      ]},
      { type: "row", fields: [
        { name: "duration", label: "Duración (min)", type: "number", min: 0, placeholder: "45", required: true },
        { name: "calories", label: "Calorías (aprox)", type: "number", min: 0, placeholder: "350" }
      ]},
      { name: "volume", label: "Volumen / distancia (opcional)", placeholder: "5200 kg · o · 5 km" },
      { name: "notes", label: "Notas", type: "textarea", placeholder: "Sensaciones, PRs, etc." }
    ], (data) => {
      const dur = Number(data.duration) || 0;
      if (dur <= 0) { Audio.play("error"); toast({ icon: "⚠️", msg: "Indica la duración" }); return; }
      workouts().push({ id: Store.uid(), name: data.name, type: data.type, date: data.date, duration: dur, calories: Number(data.calories) || 0, volume: data.volume, notes: data.notes });
      Store.commit();
      Audio.play("complete");
      const xp = Math.min(30, 10 + Math.round(dur / 5));
      Gami.award(xp, "Entrenamiento registrado 💪");
      UI.closeModal();
      render(document.getElementById("view-workouts"));
      N.App && N.App.refreshTop();
    }, "Registrar entrenamiento");
    UI.openModal("Nuevo entrenamiento", body);
  }

  function remove(w) {
    const arr = workouts(); arr.splice(arr.indexOf(w), 1);
    Store.commit(); Audio.play("delete");
    render(document.getElementById("view-workouts"));
    N.App && N.App.refreshTop();
  }

  // ---------- stats ----------
  function streak() {
    const dates = new Set(workouts().map((w) => w.date));
    let s = 0, day = DateUtil.todayKey();
    if (!dates.has(day)) day = DateUtil.addDays(day, -1);
    while (dates.has(day)) { s++; day = DateUtil.addDays(day, -1); }
    return s;
  }
  function weekMinutes() {
    const days = DateUtil.lastNDays(7);
    return { labels: days.map((d) => DateUtil.weekday(d)), values: days.map((d) => workouts().filter((w) => w.date === d).reduce((s, w) => s + w.duration, 0)) };
  }
  function stats() {
    const arr = workouts();
    const mk = DateUtil.monthKey();
    const monthSessions = arr.filter((w) => w.date.slice(0, 7) === mk);
    return {
      total: arr.length,
      monthCount: monthSessions.length,
      monthMinutes: monthSessions.reduce((s, w) => s + w.duration, 0),
      monthCalories: monthSessions.reduce((s, w) => s + w.calories, 0),
      streak: streak()
    };
  }

  function render(container) {
    container.innerHTML = "";
    const st = stats();

    container.appendChild(el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [el("span", { class: "ico", text: "⚡" }), "Entrenamientos"]),
        el("p", { class: "view-desc", text: "Registra tus sesiones y observa tu progreso físico." })
      ]),
      el("button", { class: "btn primary", onclick: add, html: "＋ Registrar sesión" })
    ]));

    container.appendChild(el("div", { class: "grid cols-4 mb-16" }, [
      kpi("Racha", st.streak + (st.streak === 1 ? " día" : " días"), "🔥 constancia", "warn"),
      kpi("Este mes", st.monthCount + "", "sesiones", "accent"),
      kpi("Minutos", fmt.num(st.monthMinutes), "este mes", "accent"),
      kpi("Calorías", fmt.num(st.monthCalories), "quemadas", "good")
    ]));

    // gráfica minutos por día
    const chartCard = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Minutos entrenados · últimos 7 días"])])
    ]);
    const cv = el("canvas");
    chartCard.appendChild(el("div", { class: "chart-box" }, [cv]));
    container.appendChild(chartCard);
    setTimeout(() => Charts.bars(cv, { labels: weekMinutes().labels, series: [{ values: weekMinutes().values, color: "--accent-2" }] }, { height: 170 }), 30);

    // historial
    const arr = workouts().slice().sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
    const listCard = el("div", { class: "card" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Historial"])])
    ]);
    if (!arr.length) {
      listCard.appendChild(el("div", { class: "empty" }, [el("span", { class: "big", text: "⚡" }), el("div", { text: "Sin entrenamientos. ¡Registra el primero!" })]));
    } else {
      arr.slice(0, 20).forEach((w) => {
        listCard.appendChild(el("div", { class: "item" }, [
          el("div", { style: "font-size:22px", text: TYPE_ICON[w.type] || "💪" }),
          el("div", { class: "item-main" }, [
            el("div", { class: "item-title", text: w.name }),
            el("div", { class: "item-meta" }, [
              el("span", { text: DateUtil.label(w.date) }),
              el("span", { class: "chip accent", text: w.duration + " min" }),
              w.calories ? el("span", { class: "chip", text: w.calories + " kcal" }) : null,
              w.volume ? el("span", { class: "text-faint fs-12", text: w.volume }) : null
            ])
          ]),
          el("button", { class: "icon-btn", html: "🗑️", title: "Eliminar", onclick: () => remove(w) })
        ]));
      });
    }
    container.appendChild(listCard);
  }

  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  N.Workouts = { render, stats, weekMinutes, streak };
})();


/* ===== assets/js/modules/goals.js ===== */
/* =====================================================================
   NEXUS · Módulo Metas
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;
  const { el, fmt, toast } = UI;
  const DateUtil = Store.DateUtil;

  function goals() { return Store.get().goals; }

  function pct(g) { return g.target > 0 ? Math.min(100, Math.round((g.current / g.target) * 100)) : 0; }

  function addOrEdit(existing) {
    const body = UI.form([
      { name: "title", label: "Meta", value: existing ? existing.title : "", placeholder: "Leer 12 libros", required: true },
      { type: "row", fields: [
        { name: "current", label: "Progreso actual", type: "number", min: 0, value: existing ? existing.current : 0 },
        { name: "target", label: "Objetivo", type: "number", min: 0, value: existing ? existing.target : "", placeholder: "12", required: true }
      ]},
      { type: "row", fields: [
        { name: "unit", label: "Unidad", value: existing ? existing.unit || "" : "", placeholder: "libros" },
        { name: "deadline", label: "Fecha límite", type: "date", value: existing ? existing.deadline || "" : "" }
      ]},
      { name: "milestones", label: "Hitos (uno por línea)", type: "textarea", value: existing ? existing.milestones.map((m) => m.t).join("\n") : "", placeholder: "Elegir libros\nLeer 3\nLeer 6" }
    ], (data) => {
      const ms = (data.milestones || "").split("\n").map((s) => s.trim()).filter(Boolean).map((t) => ({ t, done: false }));
      if (existing) {
        existing.title = data.title; existing.current = Number(data.current) || 0; existing.target = Number(data.target) || 0;
        existing.unit = data.unit; existing.deadline = data.deadline;
        existing.milestones = ms.map((nm) => existing.milestones.find((om) => om.t === nm.t) || nm);
        toast({ icon: "✏️", msg: "Meta actualizada" });
      } else {
        goals().push({ id: Store.uid(), title: data.title, current: Number(data.current) || 0, target: Number(data.target) || 0, unit: data.unit, deadline: data.deadline, milestones: ms, created: DateUtil.todayKey() });
        Audio.play("add");
        toast({ icon: "◉", title: "Nueva meta", msg: data.title });
        Gami.award(6, "Meta creada");
      }
      Store.commit();
      UI.closeModal();
      render(document.getElementById("view-goals"));
      N.App && N.App.refreshTop();
    }, existing ? "Guardar" : "Crear meta");
    UI.openModal(existing ? "Editar meta" : "Nueva meta", body);
  }

  function adjust(g, delta) {
    const before = pct(g);
    g.current = Math.max(0, g.current + delta);
    if (g.target && g.current > g.target) g.current = g.target;
    const after = pct(g);
    if (delta > 0) {
      Audio.play("coin");
      Gami.award(4, "Avance en meta");
      if (after >= 100 && before < 100) {
        Audio.play("achieve");
        Gami.award(40, "🎉 ¡Meta completada!");
        Gami.burst();
        toast({ level: true, icon: "🏆", title: "¡Meta lograda!", msg: g.title });
      }
    } else {
      Store.commit();
    }
    render(document.getElementById("view-goals"));
    N.App && N.App.refreshTop();
  }

  function toggleMs(g, m) {
    m.done = !m.done;
    Audio.play(m.done ? "coin" : "tap");
    Store.commit();
    render(document.getElementById("view-goals"));
  }

  function remove(g) {
    UI.confirmBox("Eliminar meta", `¿Eliminar "${g.title}"?`, () => {
      const arr = goals(); arr.splice(arr.indexOf(g), 1);
      Store.commit(); Audio.play("delete");
      render(document.getElementById("view-goals"));
    }, "Eliminar");
  }

  // ---------- stats ----------
  function stats() {
    const arr = goals();
    const completed = arr.filter((g) => pct(g) >= 100).length;
    const avg = arr.length ? Math.round(arr.reduce((s, g) => s + pct(g), 0) / arr.length) : 0;
    return { total: arr.length, completed, active: arr.length - completed, avg };
  }

  function deadlineInfo(g) {
    if (!g.deadline) return null;
    const diff = DateUtil.diffDays(g.deadline, DateUtil.todayKey());
    if (diff < 0) return { text: "Plazo vencido", cls: "bad" };
    if (diff === 0) return { text: "Vence hoy", cls: "warn" };
    return { text: `${diff} día${diff === 1 ? "" : "s"} restantes`, cls: diff <= 7 ? "warn" : "" };
  }

  function render(container) {
    container.innerHTML = "";
    const st = stats();

    container.appendChild(el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [el("span", { class: "ico", text: "◉" }), "Metas"]),
        el("p", { class: "view-desc", text: "Define objetivos, sigue tu progreso y celebra cada logro." })
      ]),
      el("button", { class: "btn primary", onclick: () => addOrEdit(null), html: "＋ Nueva meta" })
    ]));

    container.appendChild(el("div", { class: "grid cols-3 mb-16" }, [
      kpi("Activas", st.active + "", "en progreso", "accent"),
      kpi("Completadas", st.completed + "", "logradas", "good"),
      kpi("Progreso medio", fmt.pct(st.avg), "global", st.avg >= 60 ? "good" : "warn")
    ]));

    const arr = goals();
    if (!arr.length) {
      container.appendChild(el("div", { class: "card" }, [el("div", { class: "empty" }, [el("span", { class: "big", text: "◉" }), el("div", { text: "Sin metas todavía. ¡Define la primera!" })])]));
      return;
    }

    const grid = el("div", { class: "grid cols-2" });
    arr.forEach((g) => grid.appendChild(goalCard(g)));
    container.appendChild(grid);
  }

  function goalCard(g) {
    const p = pct(g);
    const done = p >= 100;
    const dl = deadlineInfo(g);
    const msDone = g.milestones.filter((m) => m.done).length;

    const ring = el("canvas");
    const ringWrap = el("div", { class: "ring-wrap" }, [ring, el("div", { class: "ring-val", text: p + "%" })]);
    setTimeout(() => Charts.ring(ring, p, { size: 84, color: done ? "--good" : "--accent" }), 30);

    const card = el("div", { class: "card" }, [
      el("div", { class: "flex items-center gap-12" }, [
        ringWrap,
        el("div", { class: "item-main" }, [
          el("div", { class: "item-title", text: (done ? "🏆 " : "") + g.title }),
          el("div", { class: "item-meta" }, [
            el("span", { class: "chip accent", text: `${fmt.num(g.current)} / ${fmt.num(g.target)} ${g.unit || ""}`.trim() }),
            dl ? el("span", { class: "chip " + dl.cls, text: "⏳ " + dl.text }) : null
          ])
        ]),
        el("button", { class: "icon-btn", html: "✏️", title: "Editar", onclick: () => addOrEdit(g) }),
        el("button", { class: "icon-btn", html: "🗑️", title: "Eliminar", onclick: () => remove(g) })
      ]),
      el("div", { class: "flex gap-8 mt-16" }, [
        el("button", { class: "btn sm ghost", html: "－1", onclick: () => adjust(g, -1) }),
        el("button", { class: "btn sm primary", html: "＋1", onclick: () => adjust(g, 1) }),
        el("button", { class: "btn sm", html: "＋5", onclick: () => adjust(g, 5) })
      ])
    ]);

    if (g.milestones.length) {
      const wrap = el("div", { class: "mt-16" });
      wrap.appendChild(el("div", { class: "fs-12 text-dim", style: "margin-bottom:6px", text: `Hitos ${msDone}/${g.milestones.length}` }));
      g.milestones.forEach((m) => {
        wrap.appendChild(el("div", { class: "flex items-center gap-8", style: "cursor:pointer;padding:2px 0", onclick: () => toggleMs(g, m) }, [
          el("span", { style: "font-size:14px;color:" + (m.done ? "var(--good)" : "var(--txt-faint)"), text: m.done ? "☑" : "☐" }),
          el("span", { class: "fs-13", style: m.done ? "text-decoration:line-through;color:var(--txt-faint)" : "", text: m.t })
        ]));
      });
      card.appendChild(wrap);
    }
    return card;
  }

  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  N.Goals = { render, stats, pct };
})();


/* ===== assets/js/app.js ===== */
/* =====================================================================
   NEXUS · App — orquestador principal
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, Audio, UI, Gami } = N;
  const { $, $ } = UI;

  const VIEWS = {
    dashboard: N.Dashboard,
    habits: N.Habits,
    finance: N.Finance,
    tasks: N.Tasks,
    workouts: N.Workouts,
    goals: N.Goals
  };
  let current = "dashboard";

  // ---------- Temas ----------
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    Store.get().settings.theme = theme;
    Store.commit(true);
    $(".th-btn").forEach((b) => b.classList.toggle("is-active", b.dataset.themeSet === theme));
  }

  // ---------- Barra superior ----------
  function refreshTop() {
    const s = Store.get();
    const lp = Gami.levelProgress();
    $("#level-badge").textContent = lp.level;
    $("#rank-name").textContent = Gami.rankName(lp.level);
    $("#xp-text").textContent = `${UI.fmt.num(lp.into)} / ${UI.fmt.num(lp.span)} XP`;
    $("#xp-fill").style.width = lp.pct + "%";
    $("#streak-days").textContent = Gami.globalStreak();
  }

  // ---------- Router ----------
  function switchView(name, silent) {
    if (!VIEWS[name]) return;
    current = name;
    $(".tab").forEach((t) => t.classList.toggle("is-active", t.dataset.view === name));
    $(".view").forEach((v) => v.classList.toggle("is-active", v.id === "view-" + name));
    if (!silent) Audio.play("tab");
    renderCurrent();
  }

  function renderCurrent() {
    const container = document.getElementById("view-" + current);
    if (container && VIEWS[current]) VIEWS[current].render(container);
    refreshTop();
  }

  // ---------- Eventos ----------
  function bind() {
    // gesto inicial desbloquea audio
    document.body.addEventListener("pointerdown", () => Audio.unlock(), { once: true });

    $("#tabs").addEventListener("click", (e) => {
      const tab = e.target.closest(".tab");
      if (tab) switchView(tab.dataset.view);
    });

    $(".th-btn").forEach((b) => b.addEventListener("click", () => { applyTheme(b.dataset.themeSet); Audio.play("tap"); }));

    const soundBtn = $("#sound-toggle");
    soundBtn.addEventListener("click", () => {
      const on = Audio.toggle();
      soundBtn.textContent = on ? "🔊" : "🔇";
      UI.toast({ icon: on ? "🔊" : "🔇", msg: on ? "Sonidos activados" : "Sonidos silenciados" });
    });

    $("#modal-close").addEventListener("click", UI.closeModal);
    $("#modal-overlay").addEventListener("click", (e) => { if (e.target.id === "modal-overlay") UI.closeModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") UI.closeModal(); });

    $("#reset-data").addEventListener("click", () => {
      UI.confirmBox("Reiniciar datos", "Se borrarán TODOS tus datos (hábitos, finanzas, tareas, entrenamientos, metas y XP). Esta acción no se puede deshacer.", () => {
        Store.reset();
        Audio.play("delete");
        UI.toast({ icon: "♻️", msg: "Datos reiniciados" });
        renderCurrent();
      }, "Borrar todo");
    });

    // redibujar gráficas al cambiar tamaño
    let rt = null;
    window.addEventListener("resize", () => { clearTimeout(rt); rt = setTimeout(renderCurrent, 250); });
  }

  // ---------- Init ----------
  function init() {
    const s = Store.get();
    applyTheme(s.settings.theme || "dark");
    $("#sound-toggle").textContent = Audio.isEnabled() ? "🔊" : "🔇";
    bind();
    Gami.checkAchievements();
    switchView("dashboard", true);

    // ocultar boot
    setTimeout(() => {
      $("#boot-screen").classList.add("hide");
      $("#app").hidden = false;
      setTimeout(() => $("#boot-screen").remove(), 700);
    }, 1400);
  }

  N.App = { refreshTop, switchView, renderCurrent };

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();

  </script>
</body>
</html>
