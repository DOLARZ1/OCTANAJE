<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="OCTANAJE - Sistema futurista de productividad personal: hábitos, finanzas con IA, tareas, entrenamientos y metas." />
  <title>OCTANAJE · Productividad Futurista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Bruno+Ace&display=swap" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='100' y2='100'><stop offset='0' stop-color='%23ffd700'/><stop offset='.5' stop-color='%23ffffff'/><stop offset='1' stop-color='%23ff1a1a'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='%23060814'/><g fill='none' stroke='url(%23g)' stroke-width='4' stroke-linejoin='round' stroke-linecap='round'><polygon points='50,10 87,73 13,73'/><polygon points='50,33 66,60 34,60'/><line x1='50' y1='10' x2='50' y2='33'/><line x1='87' y1='73' x2='66' y2='60'/><line x1='13' y1='73' x2='34' y2='60'/></g></svg>" />
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#060814" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OCTANAJE" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
</head>
<body>
  <!-- Fondo animado -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- Pantalla de bienvenida -->
  <div id="boot-screen" class="boot-screen">
    <div class="boot-logo">
      <svg viewBox="0 0 100 100" width="64" height="64"><g fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"><polygon points="50,8 90,76 10,76"/><polygon points="50,34 68,64 32,64"/><line x1="50" y1="8" x2="50" y2="34"/><line x1="90" y1="76" x2="68" y2="64"/><line x1="10" y1="76" x2="32" y2="64"/></g></svg>
    </div>
    <div class="boot-title">OCTANAJE</div>
    <div class="boot-sub">Inicializando sistema…</div>
    <div class="boot-bar"><span></span></div>
  </div>

  <!-- Banner global de alarma de Enfoque: visible en cualquier pestaña
       mientras la alarma sigue sonando en bucle, hasta apagarla a mano. -->
  <div class="alarm-banner" id="alarm-banner" hidden>
    <span class="alarm-banner-ico">⏰</span>
    <div class="alarm-banner-txt">
      <div class="alarm-banner-title" id="alarm-banner-title">¡Tiempo terminado!</div>
      <div class="alarm-banner-sub">La alarma sonará hasta que la detengas.</div>
    </div>
    <button class="btn danger" id="alarm-banner-stop">⏹ Detener alarma</button>
  </div>

  <div class="app" id="app" hidden>
    <!-- ====================== TOPBAR ====================== -->
    <header class="topbar">
      <div class="brand">
        <button class="user-badge" id="user-badge" type="button" title="Tu foto y nickname">
          <span class="user-badge-pic">
            <img id="user-avatar-img" alt="" hidden />
            <span class="ph" id="user-avatar-placeholder">👤</span>
          </span>
          <span class="user-badge-name" id="user-badge-name">Perfil</span>
        </button>
        <span class="brand-hex">
          <svg viewBox="0 0 100 100" width="34" height="34"><g fill="none" stroke="currentColor" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"><polygon points="50,8 90,76 10,76"/><polygon points="50,34 68,64 32,64"/><line x1="50" y1="8" x2="50" y2="34"/><line x1="90" y1="76" x2="68" y2="64"/><line x1="10" y1="76" x2="32" y2="64"/></g></svg>
        </span>
        <div class="brand-text">
          <span class="brand-name">OCTANAJE</span>
          <span class="brand-tag">Salud y Disciplina</span>
        </div>
      </div>

      <div class="topbar-center">
        <div class="level-wrap" title="Tu nivel y experiencia">
          <div class="level-badge" id="level-badge">1</div>
          <div class="xp-block">
            <div class="xp-meta">
              <span id="rank-name">Iniciado</span>
              <span id="xp-text">0 / 100 XP</span>
            </div>
            <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
          </div>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="streak-chip" id="global-streak" title="Racha global de días activos">
          <span class="flame">🔥</span><span id="streak-days">0</span>
        </div>
        <div class="medal-badge medal-bronze" id="medal-badge" title="Medalla por racha"></div>

        <button class="icon-btn" id="settings-btn" title="Ajustes: tema, sonido, moneda, datos">⚙️</button>
      </div>
    </header>

    <!-- ====================== TABS ====================== -->
    <nav class="tabs" id="tabs" role="tablist">
      <button class="tab is-active" data-view="dashboard" role="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 9.6V20h14V9.6"/><path d="M10 20v-5h4v5"/></svg></span><span class="tab-lbl">Panel</span></button>
      <button class="tab" data-view="habits" role="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12.5" r="8"/><path d="M12 8v4.5l3.2 2"/><path d="M8 3.2 4.5 6"/><path d="M16 3.2 19.5 6"/></svg></span><span class="tab-lbl">Hábitos</span></button>
      <button class="tab" data-view="finance" role="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15.6 8.1c0-1.9-1.7-3-3.6-3s-3.6 1-3.6 2.9c0 3.9 7.2 2.6 7.2 6.6 0 1.9-1.7 3-3.6 3s-3.6-1.1-3.6-3"/><line x1="12" y1="3.3" x2="12" y2="20.7"/></svg></span><span class="tab-lbl">Finanzas</span></button>
      <button class="tab" data-view="tasks" role="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4.5" width="14" height="16" rx="2"/><path d="M9.5 3.4h5v2.6h-5z"/><path d="M8.1 10l1.3 1.3 2.3-2.4"/><path d="M8.1 15.4l1.3 1.3 2.3-2.4"/><line x1="14" y1="10" x2="16.4" y2="10"/><line x1="14" y1="15.4" x2="16.4" y2="15.4"/></svg></span><span class="tab-lbl">Tareas</span></button>
      <button class="tab" data-view="workouts" role="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="6.5" y1="12" x2="17.5" y2="12" stroke-width="2"/><rect x="2.6" y="8" width="3" height="8" rx="1.2"/><rect x="18.4" y="8" width="3" height="8" rx="1.2"/><rect x="5.8" y="9.8" width="2.2" height="4.4" rx="0.8"/><rect x="16" y="9.8" width="2.2" height="4.4" rx="0.8"/></svg></span><span class="tab-lbl">Entreno</span></button>
      <button class="tab" data-view="goals" role="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 4h8v3.5a4 4 0 0 1-8 0z"/><path d="M8 5.2H5.2v1.1a2.7 2.7 0 0 0 2.5 2.7"/><path d="M16 5.2h2.8v1.1a2.7 2.7 0 0 1-2.5 2.7"/><path d="M12 11.5V15"/><path d="M9 15h6l1 5H8z"/></svg></span><span class="tab-lbl">Metas</span></button>
      <button class="tab" data-view="focus" role="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 .6v1.4"/><path d="M3.6 4.4l1.2 1.1"/><path d="M20.4 4.4l-1.2 1.1"/></svg></span><span class="tab-lbl">Enfoque</span></button>
      <button class="tab" data-view="nutrition" role="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5.2"/><circle cx="12" cy="12" r="2.5"/><path d="M3 3.5v3.5M4.3 3.5v3.5M5.6 3.5v3.5"/><path d="M2.8 7h3"/><path d="M4.3 7v13.5"/><ellipse cx="20" cy="5.6" rx="1.7" ry="2.7"/><path d="M20 8.3v12.2"/></svg></span><span class="tab-lbl">Alimentación</span></button>
      <button class="tab" data-view="health" role="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20c-4.8-3.1-9-6.9-9-11.3C3 5.9 5.2 3.8 8 3.8c1.8 0 3.4.9 4 2.4.6-1.5 2.2-2.4 4-2.4 2.8 0 5 2.1 5 4.9 0 4.4-4.2 8.2-9 11.3z"/><path d="M3.6 11h3.4l1.7 3 2.3-6 1.7 3h3.2l1.5-2"/></svg></span><span class="tab-lbl">Salud</span></button>
      <button class="tab" data-view="sleep" role="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.2A8.4 8.4 0 1 1 9.3 3.6a7 7 0 0 0 10.7 10.6z"/><circle cx="17.3" cy="6.2" r=".6" fill="currentColor" stroke="none"/><circle cx="19.4" cy="9" r=".4" fill="currentColor" stroke="none"/></svg></span><span class="tab-lbl">Sueño</span></button>
      <button class="tab" data-view="fasting" role="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 2.8h11"/><path d="M6.5 21.2h11"/><path d="M7.2 2.8v3.4c0 2 1.6 3.2 3.4 4.3.6.4.6 1.1 0 1.5-1.8 1.1-3.4 2.3-3.4 4.3v3.4"/><path d="M16.8 2.8v3.4c0 2-1.6 3.2-3.4 4.3-.6.4-.6 1.1 0 1.5 1.8 1.1 3.4 2.3 3.4 4.3v3.4"/><path d="M8.6 6.4h6.8" opacity=".55"/></svg></span><span class="tab-lbl">Ayuno</span></button>
    </nav>

    <!-- ====================== VIEWS ====================== -->
    <main class="views" id="views">
      <section class="view is-active" id="view-dashboard" role="tabpanel"></section>
      <section class="view" id="view-habits" role="tabpanel"></section>
      <section class="view" id="view-finance" role="tabpanel"></section>
      <section class="view" id="view-tasks" role="tabpanel"></section>
      <section class="view" id="view-workouts" role="tabpanel"></section>
      <section class="view" id="view-goals" role="tabpanel"></section>
      <section class="view" id="view-focus" role="tabpanel"></section>
      <section class="view" id="view-nutrition" role="tabpanel"></section>
      <section class="view" id="view-health" role="tabpanel"></section>
      <section class="view" id="view-sleep" role="tabpanel"></section>
      <section class="view" id="view-fasting" role="tabpanel"></section>
    </main>

    <footer class="foot">
      <span>OCTANAJE · datos guardados localmente en tu navegador</span>
      <span class="text-faint">⚙️ Ajustes para exportar, importar o reiniciar</span>
    </footer>
  </div>

  <!-- Contenedor de notificaciones -->
  <div class="toast-stack" id="toast-stack" aria-live="polite"></div>

  <!-- Modal genérico -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="modal-title">Título</h3>
        <button class="icon-btn" id="modal-close" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ====================== SCRIPTS ====================== -->
  <script src="assets/js/store.js"></script>
  <script src="assets/js/audio.js"></script>
  <script src="assets/js/charts.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/foods.js"></script>
  <script src="assets/js/quotes.js"></script>
  <script src="assets/js/gamification.js"></script>
  <script src="assets/js/modules/dashboard.js"></script>
  <script src="assets/js/modules/habits.js"></script>
  <script src="assets/js/modules/finance.js"></script>
  <script src="assets/js/modules/tasks.js"></script>
  <script src="assets/js/modules/workouts.js"></script>
  <script src="assets/js/modules/goals.js"></script>
  <script src="assets/js/modules/focus.js"></script>
  <script src="assets/js/modules/nutrition.js"></script>
  <script src="assets/js/modules/health.js"></script>
  <script src="assets/js/modules/sleep.js"></script>
  <script src="assets/js/modules/fasting.js"></script>
  <script src="assets/js/notifications.js"></script>
  <script src="assets/js/calexport.js"></script>
  <script src="assets/js/settings.js"></script>
  <script src="assets/js/profile.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
