<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEXUS - Sistema futurista de productividad personal: hábitos, finanzas con IA, tareas, entrenamientos y metas." />
  <title>NEXUS · Productividad Futurista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>" />
</head>
<body>
  <!-- Fondo animado -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- Pantalla de bienvenida -->
  <div id="boot-screen" class="boot-screen">
    <div class="boot-logo">⬡</div>
    <div class="boot-title">NEXUS</div>
    <div class="boot-sub">Inicializando sistema…</div>
    <div class="boot-bar"><span></span></div>
  </div>

  <div class="app" id="app" hidden>
    <!-- ====================== TOPBAR ====================== -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-hex">⬡</span>
        <div class="brand-text">
          <span class="brand-name">NEXUS</span>
          <span class="brand-tag">personal OS</span>
        </div>
      </div>

      <div class="topbar-center">
        <div class="level-wrap" title="Tu nivel y experiencia">
          <div class="level-badge" id="level-badge">1</div>
          <div class="xp-block">
            <div class="xp-meta">
              <span id="rank-name">Iniciado</span>
              <span id="xp-text">0 / 100 XP</span>
            </div>
            <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
          </div>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="streak-chip" id="global-streak" title="Racha global de días activos">
          <span class="flame">🔥</span><span id="streak-days">0</span>
        </div>

        <div class="theme-switch" role="group" aria-label="Selector de tema">
          <button class="th-btn" data-theme-set="light" title="Tema claro">☀️</button>
          <button class="th-btn" data-theme-set="gray" title="Tema gris">◐</button>
          <button class="th-btn is-active" data-theme-set="dark" title="Tema oscuro">🌙</button>
        </div>

        <button class="icon-btn" id="sound-toggle" title="Activar / silenciar sonidos">🔊</button>
      </div>
    </header>

    <!-- ====================== TABS ====================== -->
    <nav class="tabs" id="tabs" role="tablist">
      <button class="tab is-active" data-view="dashboard" role="tab"><span class="tab-ico">◎</span><span class="tab-lbl">Panel</span></button>
      <button class="tab" data-view="habits" role="tab"><span class="tab-ico">✦</span><span class="tab-lbl">Hábitos</span></button>
      <button class="tab" data-view="finance" role="tab"><span class="tab-ico">◈</span><span class="tab-lbl">Finanzas IA</span></button>
      <button class="tab" data-view="tasks" role="tab"><span class="tab-ico">✓</span><span class="tab-lbl">Tareas</span></button>
      <button class="tab" data-view="workouts" role="tab"><span class="tab-ico">⚡</span><span class="tab-lbl">Entreno</span></button>
      <button class="tab" data-view="goals" role="tab"><span class="tab-ico">◉</span><span class="tab-lbl">Metas</span></button>
    </nav>

    <!-- ====================== VIEWS ====================== -->
    <main class="views" id="views">
      <section class="view is-active" id="view-dashboard" role="tabpanel"></section>
      <section class="view" id="view-habits" role="tabpanel"></section>
      <section class="view" id="view-finance" role="tabpanel"></section>
      <section class="view" id="view-tasks" role="tabpanel"></section>
      <section class="view" id="view-workouts" role="tabpanel"></section>
      <section class="view" id="view-goals" role="tabpanel"></section>
    </main>

    <footer class="foot">
      <span>NEXUS · datos guardados localmente en tu navegador</span>
      <button class="link-btn" id="reset-data">Reiniciar datos</button>
    </footer>
  </div>

  <!-- Contenedor de notificaciones -->
  <div class="toast-stack" id="toast-stack" aria-live="polite"></div>

  <!-- Modal genérico -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="modal-title">Título</h3>
        <button class="icon-btn" id="modal-close" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ====================== SCRIPTS ====================== -->
  <script src="assets/js/store.js"></script>
  <script src="assets/js/audio.js"></script>
  <script src="assets/js/charts.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/gamification.js"></script>
  <script src="assets/js/modules/dashboard.js"></script>
  <script src="assets/js/modules/habits.js"></script>
  <script src="assets/js/modules/finance.js"></script>
  <script src="assets/js/modules/tasks.js"></script>
  <script src="assets/js/modules/workouts.js"></script>
  <script src="assets/js/modules/goals.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
