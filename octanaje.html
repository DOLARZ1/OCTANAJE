      "<div class='kpi'><div class='n'>" + totalKcal + "</div><div class='l'>Calorías</div></div>" +
      "</div>" +
      "<div class='types'><b>Por tipo:</b> " + typeChips + "</div>" +
      "<table><thead><tr><th>Fecha</th><th>Sesión</th><th>Tipo</th><th style='text-align:center'>Duración</th><th style='text-align:center'>Kcal</th><th>Ejercicios / Notas</th></tr></thead><tbody>" + rows + "</tbody></table>" +
      "<div class='ft'>Generado por OCTANAJE · " + new Date().toLocaleString("es-MX") + "</div>" +
      "</body></html>";

    // Imprimir mediante un iframe oculto (no lo bloquean los popups)
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;right:0;bottom:0;width:0;height:0;border:0;";
    document.body.appendChild(iframe);
    const doc = iframe.contentWindow.document;
    doc.open(); doc.write(html); doc.close();
    Audio.play("tap");
    toast({ icon: "📄", title: "Generando PDF…", msg: "Elige \"Guardar como PDF\"." });
    setTimeout(function () {
      try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch (e) {}
      setTimeout(function () { iframe.remove(); }, 1500);
    }, 500);
  }

  // Sección dinámica de ejercicios (nombre + series × reps, con botón ＋)
  function buildExerciseSection() {
    const list = el("div", { class: "ex-list" });
    function addRow(ex) {
      const nameI = el("input", { class: "input ex-name", placeholder: "Ejercicio (ej. Sentadilla)" });
      const setsI = el("input", { class: "input", type: "number", min: 0, placeholder: "Series" });
      const repsI = el("input", { class: "input", type: "number", min: 0, placeholder: "Reps" });
      if (ex) { nameI.value = ex.name || ""; setsI.value = ex.sets || ""; repsI.value = ex.reps || ""; }
      const row = el("div", { class: "ex-row" }, [
        nameI,
        el("div", { class: "ex-sr" }, [setsI, el("span", { class: "ex-x", text: "×" }), repsI]),
        el("button", { class: "icon-btn", type: "button", title: "Quitar ejercicio", html: "✕", onclick: () => { if (list.children.length > 1) row.remove(); else { nameI.value = ""; setsI.value = ""; repsI.value = ""; } } })
      ]);
      row._get = () => ({ name: nameI.value.trim(), sets: Number(setsI.value) || 0, reps: Number(repsI.value) || 0 });
      list.appendChild(row);
    }
    addRow(null);
    const node = el("div", { class: "field" }, [
      el("label", { text: "Ejercicios (opcional)" }),
      list,
      el("button", { class: "btn sm", type: "button", html: "＋ Agregar ejercicio", onclick: () => addRow(null) })
    ]);
    return { node: node, getData: () => Array.from(list.children).map((r) => r._get()).filter((x) => x.name) };
  }

  function add() {
    const ex = buildExerciseSection();
    const body = UI.form([
      { name: "name", label: "Nombre de la sesión", placeholder: "Pecho y tríceps", required: true },
      { name: "type", label: "Tipo", type: "select", value: "fuerza", options: TYPES.map((t) => ({ value: t.value, label: t.icon + " " + t.name })) },
      { type: "row", fields: [
        { name: "date", label: "Fecha", type: "date", value: DateUtil.todayKey(), required: true },
        { name: "duration", label: "Duración (min)", type: "number", min: 0, placeholder: "45", required: true }
      ]},
      { type: "row", fields: [
        { name: "calories", label: "Calorías (aprox)", type: "number", min: 0, placeholder: "350" },
        { name: "volume", label: "Volumen / distancia", placeholder: "5000 kg · 5 km" }
      ]},
      { name: "notes", label: "Notas", type: "textarea", placeholder: "Sensaciones, PRs, etc." }
    ], (data) => {
      const dur = Number(data.duration) || 0;
      if (dur <= 0) { Audio.play("error"); toast({ icon: "⚠️", msg: "Indica la duración" }); return; }
      const xp = Math.min(30, 10 + Math.round(dur / 5));
      workouts().push({ id: Store.uid(), name: data.name, type: data.type, date: data.date, duration: dur, calories: Number(data.calories) || 0, volume: data.volume, notes: data.notes, exercises: ex.getData(), xpEarned: xp });
      Store.commit();
      Audio.play("complete");
      Gami.award(xp, "Entrenamiento registrado 💪");
      UI.closeModal();
      render(document.getElementById("view-workouts"));
      N.App && N.App.refreshTop();
    }, "Registrar entrenamiento", () => ex.node);
    UI.openModal("Nuevo entrenamiento", body);
  }

  function remove(w) {
    UI.confirmBox("Eliminar entrenamiento", `¿Eliminar "${w.name}"?`, () => {
      const arr = workouts(); arr.splice(arr.indexOf(w), 1);
      Audio.play("delete");
      const xp = w.xpEarned != null ? w.xpEarned : Math.min(30, 10 + Math.round((w.duration || 0) / 5));
      if (xp) Gami.remove(xp); else Store.commit(); // devolver la XP ganada
      render(document.getElementById("view-workouts"));
      N.App && N.App.refreshTop();
    }, "Eliminar");
  }

  // ---------- stats ----------
  function streak() {
    const dates = new Set(workouts().map((w) => w.date));
    let s = 0, day = DateUtil.todayKey();
    if (!dates.has(day)) day = DateUtil.addDays(day, -1);
    while (dates.has(day)) { s++; day = DateUtil.addDays(day, -1); }
    return s;
  }
  function weekMinutes() {
    const days = DateUtil.lastNDays(7);
    return { labels: days.map((d) => DateUtil.weekday(d)), values: days.map((d) => workouts().filter((w) => w.date === d).reduce((s, w) => s + w.duration, 0)) };
  }
  function stats() {
    const arr = workouts();
    const mk = DateUtil.monthKey();
    const monthSessions = arr.filter((w) => w.date.slice(0, 7) === mk);
    return {
      total: arr.length,
      monthCount: monthSessions.length,
      monthMinutes: monthSessions.reduce((s, w) => s + w.duration, 0),
      monthCalories: monthSessions.reduce((s, w) => s + w.calories, 0),
      streak: streak()
    };
  }

  function render(container) {
    container.innerHTML = "";
    const st = stats();

    container.appendChild(el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [N.Icons.node("dumbbell"), "Entrenamientos"]),
        el("p", { class: "view-desc", text: "Registra tus sesiones y observa tu progreso físico." })
      ]),
      el("div", { class: "flex gap-8" }, [
        el("button", { class: "btn", onclick: openPdfModal, html: "📄 PDF" }),
        el("button", { class: "btn primary", onclick: add, html: "＋ Registrar sesión" })
      ])
    ]));

    container.appendChild(el("div", { class: "grid cols-4 mb-16" }, [
      kpi("Racha", st.streak + (st.streak === 1 ? " día" : " días"), "🔥 constancia", "warn"),
      kpi("Este mes", st.monthCount + "", "sesiones", "accent"),
      kpi("Minutos", fmt.num(st.monthMinutes), "este mes", "accent"),
      kpi("Calorías", fmt.num(st.monthCalories), "quemadas", "good")
    ]));

    // gráfica minutos por día
    const chartCard = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Minutos entrenados · últimos 7 días"])])
    ]);
    const cv = el("canvas");
    chartCard.appendChild(el("div", { class: "chart-box" }, [cv]));
    container.appendChild(chartCard);
    setTimeout(() => Charts.bars(cv, { labels: weekMinutes().labels, series: [{ values: weekMinutes().values, color: "--accent-2" }] }, { height: 170 }), 30);

    // historial
    const arr = workouts().slice().sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
    const listCard = el("div", { class: "card" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Historial"])])
    ]);
    if (!arr.length) {
      listCard.appendChild(el("div", { class: "empty" }, [el("span", { class: "big", text: "⚡" }), el("div", { text: "Sin entrenamientos. ¡Registra el primero!" })]));
    } else {
      arr.slice(0, 20).forEach((w) => {
        const item = el("div", { class: "item", style: "flex-direction:column;align-items:stretch" });
        item.appendChild(el("div", { class: "flex items-center gap-12" }, [
          typeIconNode(w.type),
          el("div", { class: "item-main" }, [
            el("div", { class: "item-title", text: w.name }),
            el("div", { class: "item-meta" }, [
              el("span", { text: DateUtil.label(w.date) }),
              el("span", { class: "chip accent", text: w.duration + " min" }),
              w.calories ? el("span", { class: "chip", text: w.calories + " kcal" }) : null,
              w.volume ? el("span", { class: "text-faint fs-12", text: w.volume }) : null
            ])
          ]),
          el("button", { class: "icon-btn", html: "🗑️", title: "Eliminar", onclick: () => remove(w) })
        ]));
        if (w.exercises && w.exercises.length) {
          const exWrap = el("div", { style: "display:flex;flex-wrap:wrap;gap:6px;margin-top:10px" });
          w.exercises.forEach((e) => exWrap.appendChild(el("span", { class: "chip", text: e.name + ((e.sets || e.reps) ? "  " + (e.sets || "?") + "×" + (e.reps || "?") : "") })));
          item.appendChild(exWrap);
        }
        if (w.notes) item.appendChild(el("div", { class: "fs-12 text-dim", style: "margin-top:8px", text: "📝 " + w.notes }));
        listCard.appendChild(item);
      });
    }
    container.appendChild(listCard);
  }

  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  N.Workouts = { render, stats, weekMinutes, streak };
})();


/* ===== assets/js/modules/goals.js ===== */
/* =====================================================================
   OCTANAJE · Módulo Metas
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;
  const { el, fmt, toast } = UI;
  const DateUtil = Store.DateUtil;

  function goals() { return Store.get().goals; }

  function pct(g) { return g.target > 0 ? Math.min(100, Math.round((g.current / g.target) * 100)) : 0; }

  function addOrEdit(existing) {
    const body = UI.form([
      { name: "title", label: "Meta", value: existing ? existing.title : "", placeholder: "Leer 12 libros", required: true },
      { type: "row", fields: [
        { name: "current", label: "Progreso actual", type: "number", min: 0, value: existing ? existing.current : 0 },
        { name: "target", label: "Objetivo", type: "number", min: 0, value: existing ? existing.target : "", placeholder: "12", required: true }
      ]},
      { type: "row", fields: [
        { name: "unit", label: "Unidad", value: existing ? existing.unit || "" : "", placeholder: "libros" },
        { name: "deadline", label: "Fecha límite", type: "date", value: existing ? existing.deadline || "" : "" }
      ]},
      { name: "milestones", label: "Hitos (uno por línea)", type: "textarea", value: existing ? existing.milestones.map((m) => m.t).join("\n") : "", placeholder: "Elegir libros\nLeer 3\nLeer 6" }
    ], (data) => {
      const ms = (data.milestones || "").split("\n").map((s) => s.trim()).filter(Boolean).map((t) => ({ t, done: false }));
      if (existing) {
        existing.title = data.title; existing.current = Number(data.current) || 0; existing.target = Number(data.target) || 0;
        existing.unit = data.unit; existing.deadline = data.deadline;
        existing.milestones = ms.map((nm) => existing.milestones.find((om) => om.t === nm.t) || nm);
        toast({ icon: "✏️", msg: "Meta actualizada" });
      } else {
        goals().push({ id: Store.uid(), title: data.title, current: Number(data.current) || 0, target: Number(data.target) || 0, unit: data.unit, deadline: data.deadline, milestones: ms, created: DateUtil.todayKey(), xpEarned: 6 });
        Audio.play("add");
        toast({ icon: "◉", title: "Nueva meta", msg: data.title });
        Gami.award(6, "Meta creada");
      }
      Store.commit();
      UI.closeModal();
      render(document.getElementById("view-goals"));
      N.App && N.App.refreshTop();
    }, existing ? "Guardar" : "Crear meta",
      (inputs) => N.CalExport.formRow(inputs.title, inputs.deadline, "Meta en OCTANAJE"));
    UI.openModal(existing ? "Editar meta" : "Nueva meta", body);
  }

  function adjust(g, delta) {
    const before = pct(g);
    g.current = Math.max(0, g.current + delta);
    if (g.target && g.current > g.target) g.current = g.target;
    const after = pct(g);
    if (delta > 0) {
      Audio.play("coin");
      g.xpEarned = (g.xpEarned || 0) + 4;
      Gami.award(4, "Avance en meta");
      if (after >= 100 && before < 100) {
        g.xpEarned = (g.xpEarned || 0) + 40;
        Audio.play("achieve");
        Gami.award(40, "🎉 ¡Meta completada!");
        Gami.burst();
        toast({ level: true, icon: "🏆", title: "¡Meta lograda!", msg: g.title });
      }
    } else {
      Store.commit();
    }
    render(document.getElementById("view-goals"));
    N.App && N.App.refreshTop();
  }

  function toggleMs(g, m) {
    m.done = !m.done;
    Audio.play(m.done ? "coin" : "tap");
    Store.commit();
    render(document.getElementById("view-goals"));
  }

  function remove(g) {
    UI.confirmBox("Eliminar meta", `¿Eliminar "${g.title}"?`, () => {
      const arr = goals(); arr.splice(arr.indexOf(g), 1);
      Audio.play("delete");
      if (g.xpEarned) Gami.remove(g.xpEarned); else Store.commit(); // devolver la XP ganada
      render(document.getElementById("view-goals"));
      N.App && N.App.refreshTop();
    }, "Eliminar");
  }

  // ---------- stats ----------
  function stats() {
    const arr = goals();
    const completed = arr.filter((g) => pct(g) >= 100).length;
    const avg = arr.length ? Math.round(arr.reduce((s, g) => s + pct(g), 0) / arr.length) : 0;
    return { total: arr.length, completed, active: arr.length - completed, avg };
  }

  function deadlineInfo(g) {
    if (!g.deadline) return null;
    const diff = DateUtil.diffDays(g.deadline, DateUtil.todayKey());
    if (diff < 0) return { text: "Plazo vencido", cls: "bad" };
    if (diff === 0) return { text: "Vence hoy", cls: "warn" };
    return { text: `${diff} día${diff === 1 ? "" : "s"} restantes`, cls: diff <= 7 ? "warn" : "" };
  }

  function render(container) {
    container.innerHTML = "";
    const st = stats();

    container.appendChild(el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [N.Icons.node("trophy"), "Metas"]),
        el("p", { class: "view-desc", text: "Define objetivos, sigue tu progreso y celebra cada logro." })
      ]),
      el("button", { class: "btn primary", onclick: () => addOrEdit(null), html: "＋ Nueva meta" })
    ]));

    container.appendChild(el("div", { class: "grid cols-3 mb-16" }, [
      kpi("Activas", st.active + "", "en progreso", "accent"),
      kpi("Completadas", st.completed + "", "logradas", "good"),
      kpi("Progreso medio", fmt.pct(st.avg), "global", st.avg >= 60 ? "good" : "warn")
    ]));

    const arr = goals();
    if (!arr.length) {
      container.appendChild(el("div", { class: "card" }, [el("div", { class: "empty" }, [el("span", { class: "big", text: "◉" }), el("div", { text: "Sin metas todavía. ¡Define la primera!" })])]));
      return;
    }

    const grid = el("div", { class: "grid cols-2" });
    arr.forEach((g) => grid.appendChild(goalCard(g)));
    container.appendChild(grid);
  }

  function goalCard(g) {
    const p = pct(g);
    const done = p >= 100;
    const dl = deadlineInfo(g);
    const msDone = g.milestones.filter((m) => m.done).length;

    const overdue = dl && dl.cls === "bad" && !done;
    const ring = el("canvas");
    const ringWrap = el("div", { class: "ring-wrap" }, [ring, el("div", { class: "ring-val", text: p + "%" })]);
    setTimeout(() => Charts.ring(ring, p, { size: 84, color: done ? "--good" : "--accent" }), 30);

    const card = el("div", { class: "card" + (overdue ? " overdue" : "") }, [
      el("div", { class: "flex items-center gap-12" }, [
        ringWrap,
        el("div", { class: "item-main" }, [
          el("div", { class: "item-title", text: (done ? "🏆 " : "") + g.title }),
          el("div", { class: "item-meta" }, [
            el("span", { class: "chip accent", text: `${fmt.num(g.current)} / ${fmt.num(g.target)} ${g.unit || ""}`.trim() }),
            dl ? el("span", { class: "chip " + dl.cls, text: "⏳ " + dl.text }) : null
          ])
        ]),
        g.deadline ? el("button", { class: "icon-btn", html: "📅", title: "Añadir a Google Calendar", onclick: () => N.CalExport.open({ title: "Meta: " + g.title, details: "Meta en OCTANAJE · " + fmt.num(g.current) + "/" + fmt.num(g.target) + " " + (g.unit || ""), dateKey: g.deadline }) }) : null,
        el("button", { class: "icon-btn", html: "✏️", title: "Editar", onclick: () => addOrEdit(g) }),
        el("button", { class: "icon-btn", html: "🗑️", title: "Eliminar", onclick: () => remove(g) })
      ]),
      el("div", { class: "flex gap-8 mt-16" }, [
        el("button", { class: "btn sm ghost", html: "－1", onclick: () => adjust(g, -1) }),
        el("button", { class: "btn sm primary", html: "＋1", onclick: () => adjust(g, 1) }),
        el("button", { class: "btn sm", html: "＋5", onclick: () => adjust(g, 5) })
      ])
    ]);

    if (g.milestones.length) {
      const wrap = el("div", { class: "mt-16" });
      wrap.appendChild(el("div", { class: "fs-12 text-dim", style: "margin-bottom:6px", text: `Hitos ${msDone}/${g.milestones.length}` }));
      g.milestones.forEach((m) => {
        wrap.appendChild(el("div", { class: "flex items-center gap-8", style: "cursor:pointer;padding:2px 0", onclick: () => toggleMs(g, m) }, [
          el("span", { style: "font-size:14px;color:" + (m.done ? "var(--good)" : "var(--txt-faint)"), text: m.done ? "☑" : "☐" }),
          el("span", { class: "fs-13", style: m.done ? "text-decoration:line-through;color:var(--txt-faint)" : "", text: m.t })
        ]));
      });
      card.appendChild(wrap);
    }
    return card;
  }

  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  N.Goals = { render, stats, pct };
})();


/* ===== assets/js/modules/focus.js ===== */
/* =====================================================================
   OCTANAJE · Módulo Foco / Pomodoro
   Temporizador de trabajo/descanso configurable, con ciclos, anillo,
   XP, sonido y notificación al terminar cada fase.
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami } = N;
  const { el, fmt } = UI;
  const DateUtil = Store.DateUtil;

  // ---------- estado del temporizador (vive entre renders) ----------
  let mode = "work";           // "work" | "break" | "long"
  let running = false;
  let remaining = null;        // segundos restantes
  let endAt = 0;               // timestamp objetivo cuando corre
  let cyclesDone = 0;          // sesiones de trabajo en el set actual
  let handle = null;
  let focusLabel = "";         // en qué te enfocas (no persistente)

  function cfg() { return Store.get().focus; }
  function secondsFor(m) {
    const c = cfg();
    return (m === "work" ? c.work : m === "long" ? c.longBreak : c.break) * 60;
  }
  function ensureRemaining() { if (remaining == null) remaining = secondsFor(mode); }
  function modeInfo(m) {
    return m === "work" ? { label: "Enfoque", color: "--accent", ico: "◷" }
      : m === "long" ? { label: "Descanso largo", color: "--good", ico: "☕" }
      : { label: "Descanso", color: "--good", ico: "🌿" };
  }
  function fmtTime(s) {
    s = Math.max(0, Math.round(s));
    return String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
  }
  function cssVar(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim() || "#00e5ff"; }

  // ---------- Wake Lock: mantiene la pantalla ENCENDIDA mientras corre
  // una sesión, para que el navegador no congele el temporizador y la
  // alarma suene exactamente al terminar (evita el "apagado parcial").
  // Se libera solo al pausar/terminar, o si el propio sistema la quita.
  let wakeLock = null;
  async function requestWakeLock() {
    try {
      if (typeof navigator !== "undefined" && navigator.wakeLock && navigator.wakeLock.request) {
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => { wakeLock = null; });
      }
    } catch (e) { wakeLock = null; } // no soportado o permiso denegado: seguimos sin bloquear pantalla
  }
  function releaseWakeLock() {
    try { if (wakeLock) wakeLock.release(); } catch (e) {}
    wakeLock = null;
  }
  // si el sistema quitó el wake lock al ocultar la pestaña, lo recuperamos al volver
  if (typeof document !== "undefined" && document.addEventListener) {
    document.addEventListener("visibilitychange", () => {
      if (running && !document.hidden && !wakeLock) requestWakeLock();
    });
  }

  // ---------- controles ----------
  function start() {
    ensureRemaining();
    if (running) return;
    running = true;
    endAt = Date.now() + remaining * 1000;
    Audio.play("toggleOn");
    requestWakeLock();
    startTicking();
    paint();
  }
  function pause() {
    if (!running) return;
    remaining = Math.max(0, Math.round((endAt - Date.now()) / 1000));
    running = false;
    stopTicking();
    releaseWakeLock();
    Audio.play("tap");
    paint();
  }
  // el temporizador solo necesita actualizar la pantalla una vez por
  // segundo (no 4x/seg); además se pausa por completo mientras la app
  // está en segundo plano (pantalla apagada/otra app) para no gastar
  // batería redibujando un canvas con brillo sin que nadie lo vea. Al
  // volver, se resincroniza contra endAt (que no se ve afectado).
  function startTicking() {
    clearInterval(handle);
    if (typeof document !== "undefined" && document.hidden) return; // se activará al volver a estar visible
    handle = setInterval(tick, 1000);
  }
  function stopTicking() { clearInterval(handle); handle = null; }
  if (typeof document !== "undefined" && document.addEventListener) {
    document.addEventListener("visibilitychange", () => {
      if (!running) return;
      if (document.hidden) { clearInterval(handle); handle = null; }
      else { tick(); startTicking(); } // resincroniza de inmediato al volver
    });
  }
  function reset() {
    running = false; stopTicking(); releaseWakeLock();
    remaining = secondsFor(mode);
    Audio.play("tap");
    paint();
  }
  function skip() {
    running = false; stopTicking(); releaseWakeLock();
    Audio.play("tap");
    nextPhase(false);
  }
  // vibración corta como respaldo del sonido (útil si el volumen está bajo
  // o en silencio); no falla si el dispositivo/navegador no la soporta
  function buzz(pattern) {
    try { if (typeof navigator !== "undefined" && navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
  }
  function tick() {
    remaining = Math.max(0, Math.round((endAt - Date.now()) / 1000));
    if (remaining <= 0) { complete(); return; }
    paint();
  }

  function complete() {
    running = false; stopTicking(); releaseWakeLock();
    buzz([300, 150, 300, 150, 300]); // vibración larga de respaldo, además del sonido
    if (mode === "work") {
      // registrar sesión
      const c = cfg();
      const today = DateUtil.todayKey();
      c.sessionsCompleted = (c.sessionsCompleted || 0) + 1;
      c.focusLog[today] = (c.focusLog[today] || 0) + c.work;
      c.sessionsLog[today] = (c.sessionsLog[today] || 0) + 1;
      Store.markActive();
      Store.commit(true);
      cyclesDone++;
      Audio.play(alarmSoundName());
      Gami.award(20, "Sesión de foco completada 🎯");
      Gami.burst();
      if (N.Notify) N.Notify.send("¡Sesión completada! 🎯", "Buen trabajo. Toca un descanso.", { tag: "nexus-focus" });
      nextPhase(true);
    } else {
      Audio.play(alarmSoundName());
      if (N.Notify) N.Notify.send("Descanso terminado ☕", "Hora de volver al enfoque.", { tag: "nexus-focus" });
      nextPhase(true);
    }
    N.App && N.App.refreshTop();
  }
  // sonido de alarma configurable (guardado en Ajustes del temporizador)
  function alarmSoundName() { return cfg().alarmSound || "alarmLoud"; }

  // pasa a la siguiente fase; autostart=true la inicia automáticamente
  function nextPhase(autostart) {
    if (mode === "work") {
      const c = cfg();
      mode = (cyclesDone % (c.longEvery || 4) === 0) ? "long" : "break";
    } else {
      mode = "work";
    }
    remaining = secondsFor(mode);
    render(document.getElementById("view-focus"));
    if (autostart) start();
  }

  function setMode(m) {
    if (running) return;
    mode = m; remaining = secondsFor(m); paint();
  }

  // ---------- pintar estado en el DOM ----------
  function paint() {
    ensureRemaining();
    const info = modeInfo(mode);
    const t = document.getElementById("focus-time");
    if (!t) return; // la vista no está montada
    t.textContent = fmtTime(remaining);
    const ml = document.getElementById("focus-mode");
    if (ml) { ml.textContent = info.ico + "  " + info.label; ml.style.color = cssVar(info.color); }
    const btn = document.getElementById("focus-start");
    if (btn) btn.innerHTML = running ? "⏸ Pausar" : (remaining < secondsFor(mode) ? "▶ Reanudar" : "▶ Iniciar");
    const ring = document.getElementById("focus-ring");
    if (ring) drawRing(ring, remaining / secondsFor(mode), info.color);
    // pestañas de modo
    ["work", "break", "long"].forEach((m) => {
      const b = document.getElementById("fmode-" + m);
      if (b) b.classList.toggle("on", m === mode);
    });
  }

  function drawRing(cv, pct, color) {
    const dpr = window.devicePixelRatio || 1;
    const size = 240;
    cv.width = size * dpr; cv.height = size * dpr;
    cv.style.width = size + "px"; cv.style.height = size + "px";
    const ctx = cv.getContext("2d"); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const cx = size / 2, cy = size / 2, r = size / 2 - 16;
    ctx.clearRect(0, 0, size, size);
    ctx.lineWidth = 14; ctx.lineCap = "round";
    ctx.strokeStyle = cssVar("--border");
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    pct = Math.max(0, Math.min(1, pct));
    if (pct > 0) {
      const g = ctx.createLinearGradient(0, 0, size, size);
      g.addColorStop(0, cssVar(color)); g.addColorStop(1, cssVar("--accent-2"));
      ctx.strokeStyle = g; ctx.shadowColor = cssVar(color); ctx.shadowBlur = 18;
      ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct); ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  // ---------- stats ----------
  function todayStats() {
    const c = cfg();
    const today = DateUtil.todayKey();
    return { sessions: c.sessionsLog[today] || 0, minutes: c.focusLog[today] || 0, total: c.sessionsCompleted || 0 };
  }

  // ---------- render ----------
  function render(container) {
    if (!container) return;
    ensureRemaining();
    const c = cfg();
    const st = todayStats();
    container.innerHTML = "";

    container.appendChild(el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [N.Icons.node("bulb"), "Enfoque"]),
        el("p", { class: "view-desc", text: "Técnica Pomodoro: concéntrate por bloques, descansa y gana XP." })
      ])
    ]));

    // KPIs
    container.appendChild(el("div", { class: "grid cols-3 mb-16" }, [
      kpi("Sesiones hoy", st.sessions + "", "completadas", "accent"),
      kpi("Minutos hoy", fmt.num(st.minutes), "enfocado", "good"),
      kpi("Total sesiones", fmt.num(st.total), "histórico", "accent")
    ]));

    const grid = el("div", { class: "grid cols-2 mb-16" });

    // ---- Tarjeta del temporizador ----
    const timerCard = el("div", { class: "card pomo" });
    // selector de modo
    const seg = el("div", { class: "seg", style: "align-self:center" }, [
      segBtn("work", "Enfoque"), segBtn("break", "Descanso"), segBtn("long", "Largo")
    ]);
    timerCard.appendChild(seg);

    const ring = el("canvas", { id: "focus-ring" });
    const timeWrap = el("div", { class: "pomo-ring" }, [
      ring,
      el("div", { class: "pomo-center" }, [
        el("div", { class: "pomo-mode", id: "focus-mode" }),
        el("div", { class: "pomo-time", id: "focus-time", text: fmtTime(remaining) })
      ])
    ]);
    timerCard.appendChild(timeWrap);

    const labelInput = el("input", { class: "input", id: "focus-label", placeholder: "¿En qué te enfocas? (opcional)", value: focusLabel, style: "text-align:center;max-width:320px;margin:0 auto" });
    labelInput.addEventListener("input", () => { focusLabel = labelInput.value; });
    timerCard.appendChild(el("div", { style: "margin:14px 0" }, [labelInput]));

    const controls = el("div", { class: "flex gap-8", style: "justify-content:center" }, [
      el("button", { class: "btn primary", id: "focus-start", onclick: () => (running ? pause() : start()) }),
      el("button", { class: "btn", id: "focus-reset", html: "↺ Reiniciar", onclick: reset }),
      el("button", { class: "btn ghost", id: "focus-skip", html: "⏭ Saltar", onclick: skip })
    ]);
    timerCard.appendChild(controls);
    grid.appendChild(timerCard);

    // ---- Tarjeta de configuración + progreso ----
    const side = el("div", { class: "card" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Ajustes del temporizador"])]),
      durField("Enfoque (min)", "work", c.work),
      durField("Descanso (min)", "break", c.break),
      durField("Descanso largo (min)", "longBreak", c.longBreak),
      durField("Largo cada N sesiones", "longEvery", c.longEvery, 1, 12),
      alarmField(c),
      el("p", { class: "fs-12 text-faint mt-8", text: "La pantalla se mantiene encendida durante una sesión activa para que la alarma suene puntual (se apaga sola al pausar/terminar)." }),
      el("div", { class: "card-title mt-16", style: "margin-bottom:10px" }, [el("span", { class: "dot" }), "Foco · últimos 7 días"]),
    ]);
    const spark = el("canvas", { id: "focus-spark" });
    side.appendChild(el("div", { class: "chart-box" }, [spark]));
    grid.appendChild(side);

    container.appendChild(grid);

    // consejo
    container.appendChild(el("div", { class: "insight info" }, [
      el("span", { class: "ico", text: "💡" }),
      el("div", { class: "txt", html: "Consejo: elige una sola tarea, silencia distracciones y trabaja hasta que suene la alarma. Cada sesión completa suma <b>+20 XP</b>." })
    ]));

    // aclaración de funcionamiento (letras pequeñas, al final de la vista)
    // para evitar confundir estas limitaciones con un mal funcionamiento
    container.appendChild(el("p", {
      class: "fs-12 text-faint mt-16",
      style: "line-height:1.6",
      html:
        "ℹ️ <b>Cómo funciona la alarma:</b> mientras una sesión está activa, OCTANAJE mantiene la pantalla encendida (Wake Lock) para que la cuenta no se congele y la alarma suene puntual. " +
        "Esto solo aplica si la app permanece visible en la pantalla, aunque esté \"en reposo\"/atenuada. " +
        "Si bloqueas el teléfono manualmente, cambias a otra app, o el sistema cierra la pestaña en segundo plano para ahorrar batería, el temporizador puede pausarse y la alarma sonará hasta que vuelvas a abrir la app — esto lo controla el sistema operativo, no OCTANAJE. " +
        "Revisa también que el volumen del dispositivo no esté en silencio y que el sonido esté activado en Ajustes; probamos varias alarmas (Timbre/Sirena/Campana) y una vibración de respaldo para que sea difícil pasarlas por alto. " +
        "Para recordatorios críticos que deban sonar con el teléfono bloqueado o la app cerrada, usa el botón \"Añadir a Google Calendar\" (Hábitos/Tareas/Metas) o \"Configurar horario\" en Ajustes: esos sí usan la alarma nativa de tu calendario/sistema."
    }));

    paint();
    const days = DateUtil.lastNDays(7);
    setTimeout(() => N.Charts.bars(spark, { labels: days.map((d) => DateUtil.weekday(d)), series: [{ values: days.map((d) => c.focusLog[d] || 0), color: "--accent" }] }, { height: 150 }), 30);
  }

  function segBtn(m, label) {
    const b = el("button", { id: "fmode-" + m, text: label, onclick: () => { setMode(m); Audio.play("tab"); } });
    if (m === mode) b.classList.add("on");
    return b;
  }
  const ALARM_SOUNDS = [
    { value: "alarmLoud", label: "🔔 Timbre fuerte (recomendado)" },
    { value: "sirenLoud", label: "🚨 Sirena" },
    { value: "bellLoud", label: "🛎️ Campana" },
    { value: "levelup", label: "🎵 Melodía suave (menos fuerte)" }
  ];
  function alarmField(c) {
    const sel = el("select", { class: "input" }, ALARM_SOUNDS.map((s) => {
      const o = el("option", { value: s.value, text: s.label });
      if ((c.alarmSound || "alarmLoud") === s.value) o.setAttribute("selected", "");
      return o;
    }));
    sel.addEventListener("change", () => { cfg().alarmSound = sel.value; Store.commit(true); Audio.play(sel.value); });
    const testBtn = el("button", { class: "btn sm", style: "margin-top:6px", html: "🔊 Probar sonido", onclick: () => Audio.play(cfg().alarmSound || "alarmLoud") });
    return el("div", { class: "field" }, [el("label", { text: "Sonido de alarma al terminar" }), sel, testBtn]);
  }
  function durField(label, key, val, min, max) {
    const inp = el("input", { class: "input", type: "number", min: min || 1, max: max || 180, value: val });
    inp.addEventListener("change", () => {
      let v = parseInt(inp.value, 10);
      if (isNaN(v) || v < (min || 1)) v = min || 1;
      if (v > (max || 180)) v = max || 180;
      inp.value = v;
      cfg()[key] = v;
      Store.commit(true);
      if (!running) { remaining = secondsFor(mode); paint(); }
    });
    return el("div", { class: "field" }, [el("label", { text: label }), inp]);
  }
  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  N.Focus = { render, todayStats };
})();


/* ===== assets/js/modules/nutrition.js ===== */
/* =====================================================================
   OCTANAJE · Módulo Alimentación
   Base de datos de alimentos + registro diario con gramos.
   Medidor radial de anillos (calorías/proteínas/carbohidratos vs metas)
   y exportación de resumen detallado a PDF (diario/semanal/mensual).
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;
  const { el, fmt, toast } = UI;
  const DateUtil = Store.DateUtil;

  const today = () => DateUtil.todayKey();
  const DEFAULT_GOALS = { kcal: 2000, prot: 120, carb: 250 };

  // Configuración de los 3 macros (orden = anillo externo → interno)
  const MACROS = [
    { key: "kcal", label: "Calorías", unit: "kcal", color: "--warn" },
    { key: "prot", label: "Proteínas", unit: "g", color: "--good" },
    { key: "carb", label: "Carbohidratos", unit: "g", color: "--accent" }
  ];

  function nut() {
    const s = Store.get();
    if (!s.nutrition || typeof s.nutrition !== "object") s.nutrition = {};
    if (!Array.isArray(s.nutrition.log)) s.nutrition.log = [];
    if (!s.nutrition.goals) s.nutrition.goals = Object.assign({}, DEFAULT_GOALS);
    if (!Array.isArray(s.nutrition.customFoods)) s.nutrition.customFoods = [];
    if (!Array.isArray(s.nutrition.favorites)) s.nutrition.favorites = [];
    return s.nutrition;
  }
  function log() { return nut().log; }
  function goals() { return nut().goals; }
  const r1 = (x) => Math.round(x * 10) / 10;

  // ---------------- Alimentos personalizados (guardados por el usuario) ----------------
  function customFoods() { return nut().customFoods; }
  // catálogo completo = base de datos incluida + los que el usuario agregó
  function allFoods() { return N.FOODS.concat(customFoods()); }

  function addCustomFood(data) {
    const food = {
      id: Store.uid(), custom: true,
      name: data.name.trim(), cat: data.cat || "Platillos mexicanos",
      kcal: Math.max(0, Number(data.kcal) || 0),
      prot: Math.max(0, Number(data.prot) || 0),
      carb: Math.max(0, Number(data.carb) || 0)
    };
    if (data.portionGrams && Number(data.portionGrams) > 0) {
      food.portion = { grams: Number(data.portionGrams), label: (data.portionLabel && data.portionLabel.trim()) || (Number(data.portionGrams) + " g aprox.") };
    }
    customFoods().push(food);
    Store.commit();
    return food;
  }
  function updateCustomFood(food, data) {
    food.name = data.name.trim(); food.cat = data.cat || food.cat;
    food.kcal = Math.max(0, Number(data.kcal) || 0);
    food.prot = Math.max(0, Number(data.prot) || 0);
    food.carb = Math.max(0, Number(data.carb) || 0);
    if (data.portionGrams && Number(data.portionGrams) > 0) {
      food.portion = { grams: Number(data.portionGrams), label: (data.portionLabel && data.portionLabel.trim()) || (Number(data.portionGrams) + " g aprox.") };
    } else {
      delete food.portion;
    }
    Store.commit();
  }
  function removeCustomFood(food) {
    const arr = customFoods(); const i = arr.indexOf(food);
    if (i >= 0) arr.splice(i, 1);
    // si estaba marcado como favorito, se limpia también
    const favs = nut().favorites; const fi = favs.indexOf(food.name);
    if (fi >= 0) favs.splice(fi, 1);
    Store.commit();
  }

  // ---------------- Favoritos ----------------
  const FAV_CAT = "⭐ Favoritos";
  function isFavorite(food) { return nut().favorites.includes(food.name); }
  function toggleFavorite(food) {
    const favs = nut().favorites;
    const i = favs.indexOf(food.name);
    if (i >= 0) { favs.splice(i, 1); } else { favs.push(food.name); }
    Store.commit();
    Audio.play("tap");
    return i < 0; // true si quedó marcado como favorito
  }
  function favoriteFoods() {
    const set = new Set(nut().favorites);
    return allFoods().filter((f) => set.has(f.name)).sort((a, b) => a.name.localeCompare(b.name));
  }

  function addEntry(food, grams) {
    const f = grams / 100;
    log().push({
      id: Store.uid(), name: food.name, cat: food.cat, grams: Math.round(grams),
      kcal: Math.round(food.kcal * f), prot: r1(food.prot * f), carb: r1(food.carb * f),
      date: today(), xpEarned: 2
    });
    Store.commit();
    Gami.award(2, "Alimento registrado 🍽️");
  }

  function removeEntry(e) {
    const a = log(); a.splice(a.indexOf(e), 1);
    Audio.play("delete");
    if (e.xpEarned) Gami.remove(e.xpEarned); else Store.commit();
    render(document.getElementById("view-nutrition"));
    N.App && N.App.refreshTop();
  }

  // elimina un registro y refresca el detalle de ESE día (para el historial,
  // donde puede no ser el día de hoy) además del fondo de la vista principal
  function removeEntryFromDay(e, dateKey) {
    const a = log(); const i = a.indexOf(e); if (i >= 0) a.splice(i, 1);
    Audio.play("delete");
    if (e.xpEarned) Gami.remove(e.xpEarned); else Store.commit();
    const bg = document.getElementById("view-nutrition");
    if (bg) render(bg);
    N.App && N.App.refreshTop();
    openDayDetail(dateKey);
  }

  function dayTotals(key) {
    return log().filter((x) => x.date === key).reduce((t, x) => {
      t.kcal += x.kcal; t.prot += x.prot; t.carb += x.carb; return t;
    }, { kcal: 0, prot: 0, carb: 0 });
  }
  // lista de días (más reciente primero) que tienen al menos un alimento registrado
  function historyDays() {
    const set = new Set(log().map((x) => x.date));
    return Array.from(set).sort().reverse();
  }
  function weekSeries(macro) {
    const days = DateUtil.lastNDays(7);
    return {
      labels: days.map((d) => DateUtil.weekday(d)),
      values: days.map((d) => Math.round(log().filter((x) => x.date === d).reduce((s, x) => s + x[macro], 0)))
    };
  }

  // ---------------- Buscador de alimentos ----------------
  let browseCat = "Todos";
  let browseQuery = "";

  function openBrowser() {
    const search = el("input", { class: "input", placeholder: "🔍 Buscar alimento…", value: browseQuery });
    const listWrap = el("div", { style: "max-height:42vh;overflow-y:auto;margin-top:10px" });
    const addBtn = el("button", { class: "btn primary block", style: "margin-top:10px", html: "＋ Agregar alimento nuevo a la lista", onclick: () => openCustomFoodForm() });

    function renderList() {
      listWrap.innerHTML = "";
      const q = browseQuery.trim().toLowerCase();
      if (browseCat === FAV_CAT) {
        const favs = favoriteFoods().filter((f) => !q || f.name.toLowerCase().includes(q));
        if (!favs.length) { listWrap.appendChild(el("div", { class: "empty" }, [el("span", { class: "big", text: "⭐" }), el("div", { text: "Aún no tienes favoritos. Toca la ⭐ de un alimento para agregarlo." })])); return; }
        favs.forEach((f) => listWrap.appendChild(foodRow(f)));
        return;
      }
      let items = allFoods().filter((f) => (browseCat === "Todos" || f.cat === browseCat) && (!q || f.name.toLowerCase().includes(q)));
      items = items.slice().sort((a, b) => a.name.localeCompare(b.name));
      if (!items.length) { listWrap.appendChild(el("div", { class: "empty", text: "Sin resultados." })); return; }
      if (browseCat === "Todos") {
        const groups = {};
        items.forEach((f) => { (groups[f.cat] = groups[f.cat] || []).push(f); });
        N.FOOD_CATS.forEach((cat) => {
          if (!groups[cat]) return;
          listWrap.appendChild(el("div", { class: "card-title", style: "margin:12px 0 6px", text: cat }));
          groups[cat].forEach((f) => listWrap.appendChild(foodRow(f)));
        });
      } else {
        items.forEach((f) => listWrap.appendChild(foodRow(f)));
      }
    }

    search.addEventListener("input", () => { browseQuery = search.value; renderList(); });

    const chips = el("div", { class: "flex gap-8", style: "flex-wrap:wrap;margin-top:10px" });
    [FAV_CAT, "Todos"].concat(N.FOOD_CATS).forEach((cat) => {
      const c = el("button", { class: "chip" + (cat === browseCat ? " accent" : ""), text: cat, style: "cursor:pointer" });
      c.addEventListener("click", () => { browseCat = cat; Audio.play("tap"); openBrowser(); });
      chips.appendChild(c);
    });

    const body = el("div", {}, [search, chips, listWrap, addBtn]);
    UI.openModal("🍽️ Alimentos", body);
    renderList();
  }

  function foodRow(f) {
    const macroLbl = "P " + f.prot + "g · C " + f.carb + "g /100g";
    const fav = isFavorite(f);
    return el("div", { class: "item", style: "padding:10px 12px;cursor:pointer", onclick: () => openPortion(f) }, [
      el("button", {
        class: "icon-btn", title: fav ? "Quitar de favoritos" : "Agregar a favoritos",
        style: fav ? "color:var(--warn)" : "",
        onclick: (ev) => { ev.stopPropagation(); toggleFavorite(f); openBrowser(); },
        html: fav ? "⭐" : "☆"
      }),
      el("div", { class: "item-main" }, [
        el("div", { class: "item-title", style: "font-size:14px" }, [f.name, f.custom ? el("span", { class: "chip", style: "margin-left:6px;font-size:10px", text: "propio" }) : null]),
        el("div", { class: "item-meta" }, [
          el("span", { class: "chip", text: f.kcal + " kcal" }),
          el("span", { class: "text-faint fs-12", text: macroLbl }),
          f.portion ? el("span", { class: "chip accent", text: "🍽️ " + f.portion.label }) : null
        ])
      ]),
      f.custom ? el("button", { class: "icon-btn", title: "Editar", onclick: (ev) => { ev.stopPropagation(); openCustomFoodForm(f); }, html: "✏️" }) : null,
      f.custom ? el("button", { class: "icon-btn", title: "Eliminar de la lista", onclick: (ev) => {
        ev.stopPropagation();
        UI.confirmBox("Eliminar alimento", "¿Eliminar \"" + f.name + "\" de tu lista? (los registros ya guardados en tu historial no se borran)", () => {
          removeCustomFood(f); Audio.play("delete"); toast({ icon: "🗑️", msg: "Alimento eliminado de la lista" }); openBrowser();
        }, "Eliminar");
      }, html: "🗑️" }) : null,
      el("button", { class: "icon-btn", html: "＋", title: "Agregar", onclick: (ev) => { ev.stopPropagation(); openPortion(f); } })
    ]);
  }

  // ---------------- Crear / editar un alimento personalizado ----------------
  function openCustomFoodForm(existing) {
    const catOptions = N.FOOD_CATS.map((c) => ({ value: c, label: c }));
    const body = UI.form([
      { name: "name", label: "Nombre del alimento/platillo", value: existing ? existing.name : "", placeholder: "Ej. Torta de mi tía", required: true },
      { name: "cat", label: "Categoría", type: "select", value: existing ? existing.cat : "Platillos mexicanos", options: catOptions },
      { type: "row", fields: [
        { name: "kcal", label: "Calorías /100g", type: "number", min: 0, step: 1, value: existing ? existing.kcal : "", required: true },
        { name: "prot", label: "Proteínas /100g", type: "number", min: 0, step: 0.1, value: existing ? existing.prot : "" }
      ]},
      { name: "carb", label: "Carbohidratos /100g (g)", type: "number", min: 0, step: 0.1, value: existing ? existing.carb : "" },
      { type: "row", fields: [
        { name: "portionGrams", label: "Porción típica (gramos, opcional)", type: "number", min: 0, step: 1, value: existing && existing.portion ? existing.portion.grams : "" },
        { name: "portionLabel", label: "Descripción de la porción", value: existing && existing.portion ? existing.portion.label : "", placeholder: "Ej. 1 pieza (~200 g)" }
      ]}
    ], (data) => {
      if (!data.name || !data.name.trim()) { Audio.play("error"); toast({ icon: "⚠️", msg: "Ponle un nombre al alimento" }); return; }
      if (existing) {
        updateCustomFood(existing, data);
        toast({ icon: "✏️", title: "Alimento actualizado", msg: existing.name });
      } else {
        const f = addCustomFood(data);
        Audio.play("add");
        toast({ icon: "🍽️", title: "Alimento agregado a tu lista", msg: f.name + " · ahora aparece en el buscador" });
      }
      openBrowser();
    }, existing ? "Guardar cambios" : "Agregar a mi lista");
    UI.openModal(existing ? "Editar alimento" : "＋ Agregar alimento a la lista", body);
  }

  function openPortion(food) {
    const hasPortion = !!food.portion;
    // modo "porciones" (platillos: tacos, tortas, caldos, sushi...) vs modo "gramos" (ingredientes crudos)
    let mode = hasPortion ? "portion" : "grams";

    const gramsI = el("input", { class: "input", type: "number", min: 1, step: 1, value: 100 });
    const portionsI = el("input", { class: "input", type: "number", min: 0.5, step: 0.5, value: 1 });
    const portionLbl = hasPortion ? el("div", { class: "fs-12 text-faint mt-8", text: "1 porción ≈ " + food.portion.label }) : null;

    const gramsField = el("div", { class: "field" }, [el("label", { text: "Cantidad (gramos)" }), gramsI]);
    const portionField = hasPortion ? el("div", { class: "field" }, [el("label", { text: "Cantidad (porciones)" }), portionsI, portionLbl]) : null;

    const preview = el("div", { class: "grid cols-3", style: "margin-top:12px" });
    function currentGrams() {
      if (mode === "portion" && hasPortion) return (Number(portionsI.value) || 0) * food.portion.grams;
      return Number(gramsI.value) || 0;
    }
    function paint() {
      const g = currentGrams(); const f = g / 100;
      preview.innerHTML = "";
      preview.appendChild(macroBox("Calorías", Math.round(food.kcal * f), "kcal", "var(--warn)"));
      preview.appendChild(macroBox("Proteínas", r1(food.prot * f), "g", "var(--good)"));
      preview.appendChild(macroBox("Carbos", r1(food.carb * f), "g", "var(--accent)"));
    }
    gramsI.addEventListener("input", paint);
    portionsI.addEventListener("input", paint);

    const fieldsWrap = el("div", {});
    function paintFields() {
      fieldsWrap.innerHTML = "";
      if (mode === "portion" && hasPortion) fieldsWrap.appendChild(portionField);
      else fieldsWrap.appendChild(gramsField);
    }
    paintFields();

    const switchLink = hasPortion ? el("button", {
      class: "btn sm", style: "margin-top:8px",
      html: mode === "portion" ? "⚖️ Usar gramos en vez de porciones" : "🍽️ Usar porciones en vez de gramos",
      onclick: (ev) => {
        ev.preventDefault();
        mode = mode === "portion" ? "grams" : "portion";
        switchLink.innerHTML = mode === "portion" ? "⚖️ Usar gramos en vez de porciones" : "🍽️ Usar porciones en vez de gramos";
        paintFields(); paint();
      }
    }) : null;

    const subInfo = hasPortion
      ? food.kcal + " kcal por 100 g · porción típica: " + food.portion.label
      : food.kcal + " kcal por 100 g";

    const body = el("div", {}, [
      el("div", { class: "insight info", style: "margin-bottom:14px" }, [
        el("span", { class: "ico", text: "🍽️" }),
        el("div", { class: "txt", html: "<b>" + food.name + "</b><br><span style='color:var(--txt-faint)'>" + food.cat + " · " + subInfo + "</span>" })
      ]),
      fieldsWrap,
      switchLink,
      preview,
      el("button", { class: "btn primary block", style: "margin-top:16px", html: "＋ Agregar al día", onclick: () => {
        const g = currentGrams();
        if (g <= 0) { Audio.play("error"); toast({ icon: "⚠️", msg: "Indica una cantidad válida" }); return; }
        addEntry(food, g); Audio.play("coin");
        const qtyMsg = mode === "portion" && hasPortion
          ? (Number(portionsI.value) || 0) + " porción(es) · " + Math.round(g) + " g"
          : Math.round(g) + " g";
        toast({ icon: "🍽️", title: "Agregado", msg: food.name + " (" + qtyMsg + ")" });
        UI.closeModal();
        render(document.getElementById("view-nutrition"));
        N.App && N.App.refreshTop();
      } })
    ]);
    UI.openModal("Agregar " + food.name, body);
    paint();
  }

  function macroBox(label, val, unit, color) {
    return el("div", { class: "card", style: "padding:12px;text-align:center" }, [
      el("div", { class: "kpi-val", style: "font-size:22px;color:" + color, text: fmt.num(val) }),
      el("div", { class: "kpi-lbl", text: label + (unit ? " (" + unit + ")" : "") })
    ]);
  }

  // ---------------- Editar metas diarias ----------------
  function openGoals() {
    const g = goals();
    const body = UI.form([
      { name: "kcal", label: "Meta de calorías (kcal)", type: "number", min: 0, value: g.kcal, required: true },
      { type: "row", fields: [
        { name: "prot", label: "Proteínas (g)", type: "number", min: 0, value: g.prot },
        { name: "carb", label: "Carbohidratos (g)", type: "number", min: 0, value: g.carb }
      ]}
    ], (data) => {
      const gg = goals();
      gg.kcal = Math.max(0, Number(data.kcal) || 0);
      gg.prot = Math.max(0, Number(data.prot) || 0);
      gg.carb = Math.max(0, Number(data.carb) || 0);
      Store.commit();
      Audio.play("tap");
      toast({ icon: "🎯", title: "Metas guardadas", msg: gg.kcal + " kcal · P " + gg.prot + "g · C " + gg.carb + "g" });
      UI.closeModal();
      render(document.getElementById("view-nutrition"));
    }, "Guardar metas");
    UI.openModal("🎯 Metas diarias", body);
  }

  // ---------------- Historial: ver/revisar un día específico ----------------
  function openHistory() {
    const days = historyDays();
    const dateI = el("input", { class: "input", type: "date", value: today(), max: today() });
    const goBtn = el("button", { class: "btn primary block", style: "margin-top:8px", html: "🔍 Ver ese día", onclick: () => {
      if (!dateI.value) { Audio.play("error"); toast({ icon: "⚠️", msg: "Elige una fecha" }); return; }
      openDayDetail(dateI.value);
    } });

    const listWrap = el("div", { style: "margin-top:16px" });
    if (!days.length) {
      listWrap.appendChild(el("div", { class: "empty" }, [el("span", { class: "big", text: "📖" }), el("div", { text: "Aún no hay días registrados." })]));
    } else {
      listWrap.appendChild(el("div", { class: "card-title", style: "margin-bottom:8px", text: "Días con registro (" + days.length + ")" }));
      days.slice(0, 60).forEach((dk) => {
        const t = dayTotals(dk);
        const dLbl = DateUtil.parse(dk).toLocaleDateString("es-MX", { weekday: "short", day: "numeric", month: "short", year: "numeric" });
        listWrap.appendChild(el("div", { class: "item", style: "padding:10px 12px;cursor:pointer", onclick: () => openDayDetail(dk) }, [
          el("div", { class: "item-main" }, [
            el("div", { class: "item-title", style: "font-size:14px", text: dLbl + (dk === today() ? " · hoy" : "") }),
            el("div", { class: "item-meta" }, [
              el("span", { class: "chip warn", text: t.kcal + " kcal" }),
              el("span", { class: "text-faint fs-12", text: "P " + r1(t.prot) + "g · C " + r1(t.carb) + "g" })
            ])
          ]),
          el("span", { text: "›", style: "font-size:20px;color:var(--txt-faint)" })
        ]));
      });
    }

    const body = el("div", {}, [
      el("p", { class: "text-dim fs-13", style: "margin-bottom:10px", text: "Elige una fecha para ver exactamente lo que comiste ese día (no mezclado con otros días):" }),
      el("div", { class: "field" }, [el("label", { text: "Fecha" }), dateI]),
      goBtn,
      listWrap

    UI.openModal("📖 Historial de alimentación", body);

  // detalle de UN solo día: totales de ese día exclusivamente + lista de alimentos

      ]),
      el("div", { class: "grid cols-3 mb-16" }, [

        macroBox("Proteínas", r1(t.prot), "g", "var(--good)"),
        macroBox("Carbos", r1(t.carb), "g", "var(--accent)")
      ]),
      el("div", { class: "fs-12 text-faint mb-16", text: pctOf(t.kcal, g.kcal) + "% de tu meta de calorías (" + g.kcal + " kcal) ese día." })

      items.forEach((e) => {

          el("div", { class: "item-main" }, [

              el("span", { class: "chip warn", text: e.kcal + " kcal" }),

  // ---------------- Exportar resumen a PDF ----------------
  function openPdfModal() {
    const dateI = el("input", { class: "input", type: "date", value: today(), max: today() });
    const body = el("div", {}, [
      el("p", { class: "text-dim fs-13", style: "margin-bottom:16px", text: "Elige el periodo del resumen de consumo a descargar en PDF:" }),
      el("button", { class: "btn primary block", style: "margin-bottom:10px", html: "📅 Diario (hoy)", onclick: () => { UI.closeModal(); exportPDF("daily"); } }),
      el("button", { class: "btn block", style: "margin-bottom:10px", html: "🗓️ Semanal (últimos 7 días)", onclick: () => { UI.closeModal(); exportPDF("weekly"); } }),
      el("button", { class: "btn block", style: "margin-bottom:16px", html: "📆 Mensual (este mes)", onclick: () => { UI.closeModal(); exportPDF("monthly"); } }),
      el("div", { class: "card", style: "padding:12px" }, [
        el("div", { class: "fs-12 fw-700 mb-8", text: "🔎 Elegir un día específico (de hace tiempo)" }),
        dateI,
        el("button", { class: "btn primary block mt-8", html: "📄 PDF de ese día", onclick: () => {
          if (!dateI.value) { Audio.play("error"); toast({ icon: "⚠️", msg: "Elige una fecha" }); return; }
          UI.closeModal(); exportPDF("day", dateI.value);
        } })
      ]),
      el("p", { class: "fs-12 text-faint", style: "margin-top:16px", html: "Se abrirá la ventana de impresión: elige <b>\"Guardar como PDF\"</b> como destino." })
    ]);
    UI.openModal("📄 Descargar PDF de alimentación", body);
  }

  function rangeFor(period, dayKey) {
    const to = today();
    let from, label;
    if (period === "day") { from = dayKey || to; return { from: from, to: from, label: "Día específico" }; }
    if (period === "daily") { from = to; label = "Diario"; }
    else if (period === "weekly") { from = DateUtil.addDays(to, -6); label = "Semanal"; }
    else {
      const d = new Date(); from = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-01"; label = "Mensual";
    }
    return { from: from, to: to, label: label };
  }

  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function pctOf(v, g) { return g > 0 ? Math.round((v / g) * 100) : 0; }

  function exportPDF(period, dayKey) {
    const r = rangeFor(period, dayKey);
    const isSingleDay = r.from === r.to;
    const g = goals();
    const list = log().filter((x) => x.date >= r.from && x.date <= r.to)
      .sort((a, b) => a.date.localeCompare(b.date) || a.id.localeCompare(b.id));

    // agrupar por día
    const byDay = {};
    list.forEach((x) => { (byDay[x.date] = byDay[x.date] || []).push(x); });
    const dayKeys = Object.keys(byDay).sort();

    const grand = list.reduce((t, x) => { t.kcal += x.kcal; t.prot += x.prot; t.carb += x.carb; return t; }, { kcal: 0, prot: 0, carb: 0 });
    const nDays = dayKeys.length || 1;
    const avg = { kcal: Math.round(grand.kcal / nDays), prot: r1(grand.prot / nDays), carb: r1(grand.carb / nDays) };

    const fromLbl = DateUtil.parse(r.from).toLocaleDateString("es-MX", { day: "numeric", month: "long", year: "numeric" });
    const toLbl = DateUtil.parse(r.to).toLocaleDateString("es-MX", { day: "numeric", month: "long", year: "numeric" });

    let rows = "";
    if (!list.length) {
      rows = '<tr><td colspan="5" style="text-align:center;color:#888;padding:24px">Sin alimentos registrados en este periodo.</td></tr>';
    } else {
      dayKeys.forEach((dk) => {
        const items = byDay[dk];
        const dt = items.reduce((t, x) => { t.kcal += x.kcal; t.prot += x.prot; t.carb += x.carb; return t; }, { kcal: 0, prot: 0, carb: 0 });
        const dLbl = DateUtil.parse(dk).toLocaleDateString("es-MX", { weekday: "long", day: "numeric", month: "long" });
        rows += "<tr class='dh'><td colspan='5'>" + esc(dLbl) +
          " &nbsp;·&nbsp; <b>" + dt.kcal + " kcal</b> (" + pctOf(dt.kcal, g.kcal) + "% de meta) · P " + r1(dt.prot) + "g · C " + r1(dt.carb) + "g</td></tr>";
        items.forEach((x) => {
          rows += "<tr>" +
            "<td>" + esc(x.name) + "</td>" +
            "<td style='text-align:center'>" + x.grams + " g</td>" +
            "<td style='text-align:center'>" + x.kcal + "</td>" +
            "<td style='text-align:center'>" + r1(x.prot) + "</td>" +
            "<td style='text-align:center'>" + r1(x.carb) + "</td>" +
            "</tr>";
        });
      });
    }

    const html = "<!doctype html><html lang='es'><head><meta charset='utf-8'><title>OCTANAJE · Alimentación " + r.label + "</title>" +
      "<style>" +
      "*{box-sizing:border-box;font-family:'Segoe UI',system-ui,Arial,sans-serif}" +
      "body{margin:0;padding:32px;color:#1a1a2e;background:#fff}" +
      ".hd{display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #6a5cff;padding-bottom:14px;margin-bottom:20px}" +
      ".logo{font-size:22px;font-weight:800;letter-spacing:2px;color:#6a5cff}" +
      ".logo span{color:#00b3c4}" +
      ".sub{color:#666;font-size:13px}" +
      "h1{font-size:20px;margin:0 0 4px}" +
      ".kpis{display:flex;gap:12px;margin:18px 0;flex-wrap:wrap}" +
      ".kpi{flex:1;min-width:110px;border:1px solid #e3e3ee;border-radius:12px;padding:12px 14px}" +
      ".kpi .n{font-size:22px;font-weight:800;color:#6a5cff}" +
      ".kpi .l{font-size:11px;color:#777;text-transform:uppercase;letter-spacing:1px}" +
      ".types{background:#f4f4fb;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:18px}" +
      "table{width:100%;border-collapse:collapse;font-size:12.5px}" +
      "th{background:#6a5cff;color:#fff;text-align:left;padding:8px 10px;font-size:12px}" +
      "th.c{text-align:center}" +
      "td{padding:7px 10px;border-bottom:1px solid #ececf4;vertical-align:top}" +
      "tr.dh td{background:#eceafe;font-size:12px;color:#4a3fd0;border-top:2px solid #d8d3fb}" +
      ".ft{margin-top:24px;color:#999;font-size:11px;text-align:center;border-top:1px solid #eee;padding-top:12px}" +
      "@media print{body{padding:0}}" +
      "</style></head><body>" +
      "<div class='hd'><div><div class='logo'>▲ OCTAN<span>AJE</span></div><div class='sub'>Salud y Disciplina</div></div>" +
      "<div style='text-align:right'><h1>Resumen de alimentación</h1><div class='sub'>" + (isSingleDay ? fromLbl : r.label + " · " + fromLbl + " → " + toLbl) + "</div></div></div>" +
      (isSingleDay
        ? "<div class='kpis'>" +
          "<div class='kpi'><div class='n'>" + grand.kcal + "</div><div class='l'>Kcal de este día</div></div>" +
          "<div class='kpi'><div class='n'>" + r1(grand.prot) + "</div><div class='l'>Proteínas (g)</div></div>" +
          "<div class='kpi'><div class='n'>" + r1(grand.carb) + "</div><div class='l'>Carbohidratos (g)</div></div>" +
          "<div class='kpi'><div class='n'>" + pctOf(grand.kcal, g.kcal) + "%</div><div class='l'>De tu meta diaria</div></div>" +
          "</div>"
        : "<div class='kpis'>" +
          "<div class='kpi'><div class='n'>" + nDays + "</div><div class='l'>Días con registro</div></div>" +
          "<div class='kpi'><div class='n'>" + grand.kcal + "</div><div class='l'>Kcal totales del periodo</div></div>" +
          "<div class='kpi'><div class='n'>" + avg.kcal + "</div><div class='l'>Kcal / día (promedio)</div></div>" +
          "<div class='kpi'><div class='n'>" + r1(grand.prot) + "</div><div class='l'>Proteínas totales (g)</div></div>" +
          "<div class='kpi'><div class='n'>" + r1(grand.carb) + "</div><div class='l'>Carbohidratos totales (g)</div></div>" +
          "</div>"
      ) +
      "<div class='types'><b>Metas diarias:</b> " + g.kcal + " kcal &nbsp;·&nbsp; " + g.prot + " g proteína &nbsp;·&nbsp; " + g.carb + " g carbohidratos" +
      (isSingleDay ? "" : " &nbsp;·&nbsp; <b>Promedio del periodo:</b> P " + avg.prot + "g · C " + avg.carb + "g") + "</div>" +
      "<table><thead><tr><th>Alimento / platillo</th><th class='c'>Cantidad</th><th class='c'>Kcal</th><th class='c'>Prot (g)</th><th class='c'>Carb (g)</th></tr></thead><tbody>" + rows +
      (isSingleDay ? "" :
        "<tr class='dh'><td><b>TOTAL DEL PERIODO (" + nDays + " día" + (nDays === 1 ? "" : "s") + ", NO es un solo día)</b></td><td></td><td style='text-align:center'><b>" + grand.kcal + "</b></td><td style='text-align:center'><b>" + r1(grand.prot) + "</b></td><td style='text-align:center'><b>" + r1(grand.carb) + "</b></td></tr>"
      ) +
      "</tbody></table>" +
      "<div class='ft'>Generado por OCTANAJE · " + new Date().toLocaleString("es-MX") + "</div>" +
      "</body></html>";

    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;right:0;bottom:0;width:0;height:0;border:0;";
    document.body.appendChild(iframe);
    const doc = iframe.contentWindow.document;
    doc.open(); doc.write(html); doc.close();
    Audio.play("tap");
    toast({ icon: "📄", title: "Generando PDF…", msg: "Elige \"Guardar como PDF\"." });
    setTimeout(function () {
      try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch (e) {}
      setTimeout(function () { iframe.remove(); }, 1500);
    }, 500);
  }

  // ---------------- Render ----------------
  function render(container) {
    container.innerHTML = "";
    const t = dayTotals(today());
    const g = goals();

    container.appendChild(el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [N.Icons.node("plate"), "Alimentación"]),
        el("p", { class: "view-desc", text: "Registra lo que comes y controla tus calorías y macros del día." })
      ]),
      el("div", { class: "flex gap-8", style: "flex-wrap:wrap" }, [
        el("button", { class: "btn", onclick: openGoals, html: "🎯 Metas" }),
        el("button", { class: "btn", onclick: openHistory, html: "📖 Historial" }),
        el("button", { class: "btn", onclick: openPdfModal, html: "📄 PDF" }),
        el("button", { class: "btn primary", onclick: openBrowser, html: "＋ Agregar alimento" })
      ])
    ]));

    // KPIs de hoy
    container.appendChild(el("div", { class: "grid cols-4 mb-16" }, [
      kpi("Calorías hoy", fmt.num(t.kcal), "meta " + fmt.num(g.kcal) + " kcal", "warn"),
      kpi("Proteínas", fmt.num(r1(t.prot)) + " g", "meta " + g.prot + " g", "good"),
      kpi("Carbohidratos", fmt.num(r1(t.carb)) + " g", "meta " + g.carb + " g", "accent"),
      kpi("Alimentos", log().filter((x) => x.date === today()).length + "", "registrados hoy", "accent")
    ]));

    // Medidor radial de anillos + leyenda
    const ringCard = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head" }, [
        el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Progreso del día vs. metas"]),

    MACROS.forEach((m, i) => {
      const val = m.key === "kcal" ? t.kcal : r1(t[m.key]);

    });
    ringCard.appendChild(el("div", { class: "flex", style: "gap:22px;align-items:center;flex-wrap:wrap" }, [

    ]));
    container.appendChild(ringCard);
    setTimeout(() => {
      Charts.multiRing(cv, MACROS.map((m) => ({
        pct: g[m.key] > 0 ? (t[m.key] / g[m.key]) * 100 : 0,
        color: m.color
      })), { size: 230, centerLabel: fmt.num(t.kcal), centerSub: "kcal hoy" });
    }, 30);

    // Acceso rápido a favoritos (comidas más frecuentes)
    const favs = favoriteFoods();
    if (favs.length) {
      const favCard = el("div", { class: "card mb-16" }, [
        el("div", { class: "card-head" }, [
          el("div", { class: "card-title" }, [el("span", { class: "dot" }), "⭐ Favoritos"]),
          el("button", { class: "btn sm", html: "Ver todos", onclick: () => { browseCat = FAV_CAT; openBrowser(); } })
        ])
      ]);
      const chipsWrap = el("div", { class: "flex gap-8", style: "flex-wrap:wrap" });
      favs.slice(0, 10).forEach((f) => {
        chipsWrap.appendChild(el("button", {
          class: "chip accent", style: "cursor:pointer;padding:8px 14px", onclick: () => openPortion(f),
          html: "⭐ " + f.name + " · " + f.kcal + " kcal"
        }));
      });
      favCard.appendChild(chipsWrap);
      container.appendChild(favCard);
    }

    // Tendencia semanal de calorías
    const trend = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title", style: "font-size:13px" }, [el("span", { class: "dot" }), "Calorías · últimos 7 días"])])
    ]);
    const tcv = el("canvas");
    trend.appendChild(el("div", { class: "chart-box" }, [tcv]));
    container.appendChild(trend);
    setTimeout(() => Charts.bars(tcv, { labels: weekSeries("kcal").labels, series: [{ values: weekSeries("kcal").values, color: "--warn" }] }, { height: 160 }), 30);

    // Consumido hoy
    const listCard = el("div", { class: "card" }, [
      el("div", { class: "card-head" }, [
        el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Consumido hoy"]),
        el("button", { class: "btn sm", html: "🍽️ Ver alimentos", onclick: openBrowser })
      ])
    ]);
    const todayItems = log().filter((x) => x.date === today()).slice().reverse();
    if (!todayItems.length) {
      listCard.appendChild(el("div", { class: "empty" }, [el("span", { class: "big", text: "🍽️" }), el("div", { text: "Aún no registras alimentos hoy." })]));
    } else {
      todayItems.forEach((e) => {
        listCard.appendChild(el("div", { class: "item" }, [
          el("div", { class: "item-main" }, [
            el("div", { class: "item-title", text: e.name }),
