              el("span", { class: "chip", text: e.grams + " g" }),
              el("span", { class: "chip warn", text: e.kcal + " kcal" }),
              el("span", { class: "text-faint fs-12", text: "P " + e.prot + "g · C " + e.carb + "g" })
            ])
          ]),
          el("button", { class: "icon-btn", html: "🗑️", title: "Eliminar", onclick: () => removeEntry(e) })
        ]));
      });
    }
    container.appendChild(listCard);
  }

  // fila de la leyenda estilo infográfico (01 / macro / valor / %)
  function legendRow(idx, macro, val, goal) {
    const pct = goal > 0 ? Math.round((val / goal) * 100) : 0;
    const cvar = "var(" + macro.color + ")";
    return el("div", { class: "flex items-center gap-12", style: "padding:6px 0" }, [
      el("div", { style: "width:34px;height:34px;flex:none;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:13px;color:#04122b;background:" + cvar + ";box-shadow:0 0 12px " + cvar }, [
        el("span", { text: "0" + idx })
      ]),
      el("div", { class: "item-main" }, [
        el("div", { class: "item-title", style: "font-size:14px", text: macro.label }),
        el("div", { class: "text-faint fs-12", text: fmt.num(val) + " / " + fmt.num(goal) + " " + macro.unit })
      ]),
      el("div", { style: "font-size:20px;font-weight:800;color:" + cvar, text: pct + "%" })
    ]);
  }

  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  N.Nutrition = { render, dayTotals, exportPDF };
})();


/* ===== assets/js/notifications.js ===== */
/* =====================================================================
   OCTANAJE · Notifications — Notification API + recordatorios de pendientes
   Con degradación elegante a toasts si no hay permiso/soporte.
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI } = N;
  const DateUtil = Store.DateUtil;

  function supported() { return typeof window !== "undefined" && "Notification" in window; }
  function permission() { return supported() ? Notification.permission : "unsupported"; }
  function enabled() { return !!Store.get().settings.notifications; }

  // Pide permiso y activa las notificaciones
  function enable() {
    const fileProto = typeof location !== "undefined" && location.protocol === "file:";
    if (!supported()) {
      Store.get().settings.notifications = true; Store.commit(true);
      UI.toast({ icon: "🔔", title: "No disponible", msg: "Tu navegador no soporta notificaciones del sistema. Usaré avisos dentro de la app." });
      return Promise.resolve("in-app");
    }
    // ya bloqueadas antes: el navegador no volverá a preguntar
    if (Notification.permission === "denied") {
      Store.get().settings.notifications = true; Store.commit(true);
      UI.toast({ icon: "🔕", title: "Notificaciones bloqueadas", msg: "Reactívalas: toca el 🔒 junto a la dirección → Permisos → Notificaciones → Permitir, y recarga. (Solo en la versión web).", duration: 8000 });
      return Promise.resolve("denied");
    }
    if (fileProto) {
      UI.toast({ icon: "🌐", title: "Usa la versión web", msg: "Las notificaciones del sistema solo funcionan en https://dolarz1.github.io/OCTANAJE/, no abriendo el archivo local. Mientras, activo avisos dentro de la app.", duration: 8000 });
    }
    return Notification.requestPermission().then((perm) => {
      Store.get().settings.notifications = true; Store.commit(true);
      if (perm === "granted") {
        send("OCTANAJE activado 🔔", "Te avisaré de tus pendientes y sesiones de foco.");
        UI.toast({ icon: "🔔", title: "Notificaciones activadas", msg: "Recibirás recordatorios." });
      } else if (perm === "denied") {
        UI.toast({ icon: "🔕", title: "Permiso denegado", msg: "Puedes permitirlo desde el 🔒 junto a la dirección. Mientras, usaré avisos dentro de la app.", duration: 8000 });
      } else {
        UI.toast({ icon: "🔔", title: "Pendiente", msg: "Usaré avisos dentro de la app." });
      }
      return perm;
    }).catch(() => "error");
  }

  function disable() {
    Store.get().settings.notifications = false;
    Store.commit(true);
    UI.toast({ icon: "🔕", msg: "Notificaciones desactivadas" });
  }

  // Envía una notificación del sistema; si no se puede, cae a toast
  function send(title, body, opts) {
    opts = opts || {};
    if (enabled() && supported() && Notification.permission === "granted") {
      try {
        const n = new Notification(title, {
          body: body || "",
          icon: opts.icon,
          tag: opts.tag || "octanaje",
          silent: false
        });
        if (opts.onClick) n.onclick = () => { window.focus(); opts.onClick(); n.close(); };
        setTimeout(() => { try { n.close(); } catch (e) {} }, opts.timeout || 8000);
        return true;
      } catch (e) { /* cae a toast */ }
    }
    // fallback visual
    UI.toast({ icon: opts.emoji || "🔔", title: title, msg: body || "" });
    return false;
  }

  // Revisa pendientes del día y avisa una vez al día
  function checkReminders(force) {
    if (!enabled()) return;
    const s = Store.get();
    const today = DateUtil.todayKey();
    if (!force && s.notifyMeta.lastReminder === today) return;

    const hp = N.Habits ? N.Habits.todayProgress() : { done: 0, total: 0 };
    const ts = N.Tasks ? N.Tasks.stats() : { pending: 0, overdue: 0 };
    const pendingHabits = hp.total - hp.done;
    const parts = [];
    if (pendingHabits > 0) parts.push(`${pendingHabits} hábito${pendingHabits === 1 ? "" : "s"} por completar`);
    if (ts.overdue > 0) parts.push(`${ts.overdue} tarea${ts.overdue === 1 ? "" : "s"} vencida${ts.overdue === 1 ? "" : "s"}`);
    else if (ts.pending > 0) parts.push(`${ts.pending} tarea${ts.pending === 1 ? "" : "s"} pendiente${ts.pending === 1 ? "" : "s"}`);

    if (!parts.length) return;
    s.notifyMeta.lastReminder = today;
    Store.commit(true);
    send("Tu día en OCTANAJE 📋", "Tienes " + parts.join(" y ") + ".", { tag: "octanaje-daily" });
  }

  let interval = null;

  // ---------------------------------------------------------------
  //  RECORDATORIOS PERSONALIZADOS — hora + días + sonido de alarma
  //  {id, title, message, time:"HH:MM", days:[0..6] o [] = todos, sound, enabled, lastFired}
  // ---------------------------------------------------------------
  function reminders() { return Store.get().reminders; }

  function addReminder(data) {
    reminders().push({
      id: Store.uid(),
      title: data.title || "Recordatorio",
      message: data.message || "",
      time: data.time || "08:00",
      days: Array.isArray(data.days) && data.days.length ? data.days : [],
      sound: data.sound !== false,
      enabled: true,
      lastFired: ""
    });
    Store.commit();
  }
  function updateReminder(r, data) {
    r.title = data.title || r.title;
    r.message = data.message != null ? data.message : r.message;
    r.time = data.time || r.time;
    r.days = Array.isArray(data.days) ? data.days : r.days;
    r.sound = data.sound !== false;
    Store.commit();
  }
  function removeReminder(r) {
    const arr = reminders();
    const i = arr.indexOf(r);
    if (i >= 0) arr.splice(i, 1);
    Store.commit();
  }
  function toggleReminder(r) {
    r.enabled = !r.enabled;
    Store.commit();
  }

  // etiqueta legible de los días de un recordatorio
  function reminderDaysLabel(r) {
    const days = r.days || [];
    if (!days.length) return "Todos los días";
    const set = new Set(days);
    const isAll = [0, 1, 2, 3, 4, 5, 6].every((d) => set.has(d));
    if (isAll) return "Todos los días";
    const isWeekdays = [1, 2, 3, 4, 5].every((d) => set.has(d)) && !set.has(0) && !set.has(6);
    if (isWeekdays) return "Lunes a viernes";
    const isWeekend = set.has(0) && set.has(6) && days.length === 2;
    if (isWeekend) return "Fin de semana";
    const names = ["D", "L", "M", "M", "J", "V", "S"];
    return Array.from(set).sort().map((d) => names[d]).join(", ");
  }

  // revisa cada minuto si algún recordatorio personalizado coincide con
  // la hora actual y el día de la semana; dispara notificación + alarma
  function checkCustomReminders() {
    if (!enabled()) return; // el interruptor general manda
    const now = new Date();
    const hhmm = String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
    const todayKey = DateUtil.todayKey();
    const dow = now.getDay();
    reminders().forEach((r) => {
      if (!r.enabled) return;
      if (r.lastFired === todayKey + "_" + r.time) return; // ya disparado hoy a esa hora
      if (r.time !== hhmm) return;
      if (r.days && r.days.length && !r.days.includes(dow)) return;
      r.lastFired = todayKey + "_" + r.time;
      Store.commit(true);
      if (r.sound && N.Audio) N.Audio.preview("alarm");
      send("⏰ " + r.title, r.message || "Es hora de tu recordatorio.", { tag: "octanaje-reminder-" + r.id, emoji: "⏰" });
    });
  }

  function init() {
    // primer chequeo al abrir (poco después del arranque)
    setTimeout(() => checkReminders(), 4000);
    // y luego periódicamente
    if (interval) clearInterval(interval);
    interval = setInterval(() => checkReminders(), 30 * 60 * 1000); // cada 30 min

    // recordatorios personalizados: revisar cada minuto la hora exacta
    setTimeout(checkCustomReminders, 2000);
    setInterval(checkCustomReminders, 30 * 1000);
  }

  N.Notify = {
    supported, permission, enabled, enable, disable, send, checkReminders, init,
    reminders, addReminder, updateReminder, removeReminder, toggleReminder, reminderDaysLabel
  };
})();


/* ===== assets/js/calexport.js ===== */
/* =====================================================================
   OCTANAJE · CalExport — añadir eventos a Google Calendar o descargar .ics
   Sin login ni configuración: crea el evento en el calendario del usuario
   y deja que Google/su app se encargue de los recordatorios/alertas.
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { UI, Audio, Store } = N;
  const { el, toast } = UI;
  const DateUtil = Store.DateUtil;

  function ymd(key) { return key.replace(/-/g, ""); }               // "2026-07-09" -> "20260709"
  function nextDay(key) { return ymd(DateUtil.addDays(key, 1)); }   // fin exclusivo (evento de día completo)
  function stampUTC() { return new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d+/, ""); } // 20260709T101500Z
  function pad2(n) { return String(n).padStart(2, "0"); }

  // Regla de repetición según los días elegidos (0=Dom..6=Sáb). Vacío o
  // los 7 días = se repite diario. Si son días específicos, semanal por día.
  const DOW_ICS = ["SU", "MO", "TU", "WE", "TH", "FR", "SA"];
  function buildRecurRule(days) {
    if (!days || !days.length || days.length === 7) return "RRULE:FREQ=DAILY";
    const byday = days.slice().sort().map((d) => DOW_ICS[d]).join(",");
    return "RRULE:FREQ=WEEKLY;BYDAY=" + byday;
  }
  // "HH:MM" + minutos de duración -> [inicio "YYYYMMDDTHHMMSS", fin "…"] (hora local, sin Z)
  function timedRange(dateKey, time, durMin) {
    const parts = (time || "08:00").split(":");
    const hh = Number(parts[0]) || 0, mm = Number(parts[1]) || 0;
    const start = ymd(dateKey) + "T" + pad2(hh) + pad2(mm) + "00";
    let endMin = mm + (durMin || 15), endHH = hh;
    while (endMin >= 60) { endMin -= 60; endHH = (endHH + 1) % 24; }
    const end = ymd(dateKey) + "T" + pad2(endHH) + pad2(endMin) + "00";
    return [start, end];
  }

  // URL para crear el evento en Google Calendar (evento de día completo)
  function googleUrl(title, details, dateKey, recur) {
    const p = new URLSearchParams({
      action: "TEMPLATE",
      text: title || "Recordatorio",
      dates: ymd(dateKey) + "/" + nextDay(dateKey),
      details: (details || "") + "\n\nCreado desde OCTANAJE"
    });
    if (recur) p.set("recur", recur); // p.ej. RRULE:FREQ=DAILY
    return "https://calendar.google.com/calendar/render?" + p.toString();
  }

  function escICS(s) { return String(s || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n"); }

  // ---- URL de Google Calendar con hora exacta + repetición semanal/diaria ----
  function googleUrlTimed(title, details, dateKey, time, days) {
    const [start, end] = timedRange(dateKey, time, 15);
    const p = new URLSearchParams({
      action: "TEMPLATE",
      text: title || "Recordatorio",
      dates: start + "/" + end,
      details: (details || "") + "\n\nCreado desde OCTANAJE",
      ctz: Intl.DateTimeFormat().resolvedOptions().timeZone || "America/Mexico_City"
    });
    p.set("recur", buildRecurRule(days));
    return "https://calendar.google.com/calendar/render?" + p.toString();
  }

  // ---- .ics con hora exacta + repetición (para Apple/Outlook/Samsung) ----
  function downloadIcsTimed(title, details, dateKey, time, days) {
    const [start, end] = timedRange(dateKey, time, 15);
    const lines = [
      "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//OCTANAJE//ES", "CALSCALE:GREGORIAN",
      "BEGIN:VEVENT",
      "UID:" + Store.uid() + "@octanaje",
      "DTSTAMP:" + stampUTC(),
      "DTSTART:" + start,
      "DTEND:" + end,
      "SUMMARY:" + escICS(title),
      "DESCRIPTION:" + escICS((details || "") + " — OCTANAJE"),
      buildRecurRule(days),
      "BEGIN:VALARM", "ACTION:DISPLAY", "DESCRIPTION:" + escICS(title),
      "TRIGGER:PT0M",
      "END:VALARM",
      "END:VEVENT", "END:VCALENDAR"
    ];
    const ics = lines.join("\r\n");
    try {
      const blob = new Blob([ics], { type: "text/calendar" });
      const url = URL.createObjectURL(blob);
      const a = el("a", { href: url, download: (title || "recordatorio").replace(/[^\w\-]+/g, "_").slice(0, 40) + ".ics" });
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
      toast({ icon: "📆", title: "Archivo .ics descargado", msg: "Ábrelo para añadirlo a tu calendario del sistema." });
    } catch (e) {
      toast({ icon: "⚠️", msg: "No se pudo generar el .ics" });
    }
  }

  // ---- Modal específico para "recordatorio de sistema" (hora + días, se
  // usa desde Ajustes; funciona con OCTANAJE cerrado porque lo maneja tu
  // calendario, no la app) ----
  function openTimed(item) {
    const title = item.title || "Recordatorio OCTANAJE";
    const details = item.details || "";
    const time = item.time || "08:00";
    const days = item.days || [];
    const dateKey = item.dateKey || DateUtil.todayKey();
    const daysLbl = (!days.length || days.length === 7) ? "Todos los días"
      : days.slice().sort().map((d) => ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"][d]).join(", ");

    const body = el("div", {}, [
      el("div", { class: "insight info", style: "margin-bottom:14px" }, [
        el("span", { class: "ico", text: "📅" }),
        el("div", { class: "txt", html: "<b>" + title + "</b><br>⏰ " + time + " · " + daysLbl + "<br><span style='color:var(--txt-faint)'>Se repite y suena con la app cerrada: lo maneja tu calendario del sistema.</span>" })
      ]),
      el("button", {
        class: "btn primary block mb-16", html: "🗓️ Añadir a Google Calendar",
        onclick: () => {
          Audio.play("coin");
          window.open(googleUrlTimed(title, details, dateKey, time, days), "_blank", "noopener");
          UI.closeModal();
        }
      }),
      el("button", {
        class: "btn block", html: "📆 Descargar .ics (Apple, Outlook, Samsung…)",
        onclick: () => { Audio.play("tap"); downloadIcsTimed(title, details, dateKey, time, days); UI.closeModal(); }
      }),
      el("p", { class: "fs-12 text-faint mt-16", text: "Esto crea el evento en tu calendario real; la alarma sonará con el sistema operativo, incluso si cierras OCTANAJE." })
    ]);
    UI.openModal("Recordatorio en tu calendario", body);
  }

  // Genera y descarga un archivo .ics (Apple, Outlook, etc.) con alarma a las 9:00
  function downloadIcs(title, details, dateKey, recur) {
    const lines = [
      "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//OCTANAJE//ES", "CALSCALE:GREGORIAN",
      "BEGIN:VEVENT",
      "UID:" + Store.uid() + "@octanaje",
      "DTSTAMP:" + stampUTC(),
      "DTSTART;VALUE=DATE:" + ymd(dateKey),
      "DTEND;VALUE=DATE:" + nextDay(dateKey),
      "SUMMARY:" + escICS(title),
      "DESCRIPTION:" + escICS((details || "") + " — OCTANAJE")
    ];
    if (recur) lines.push(recur.replace(/^RRULE:/, "RRULE:")); // p.ej. "RRULE:FREQ=DAILY"
    lines.push(
      "BEGIN:VALARM", "ACTION:DISPLAY", "DESCRIPTION:" + escICS(title),
      "TRIGGER:PT9H",   // recordatorio a las 09:00 del día
      "END:VALARM",
      "END:VEVENT", "END:VCALENDAR"
    );
    const ics = lines.join("\r\n");
    try {
      const blob = new Blob([ics], { type: "text/calendar" });
      const url = URL.createObjectURL(blob);
      const a = el("a", { href: url, download: (title || "evento").replace(/[^\w\-]+/g, "_").slice(0, 40) + ".ics" });
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
      toast({ icon: "📆", title: "Archivo .ics descargado", msg: "Ábrelo para añadirlo a tu calendario." });
    } catch (e) {
      toast({ icon: "⚠️", msg: "No se pudo generar el .ics" });
    }
  }

  // Modal con las dos opciones (item.recur opcional, p.ej. "RRULE:FREQ=DAILY")
  function open(item) {
    const title = item.title || "Recordatorio";
    const details = item.details || "";
    const dateKey = item.dateKey;
    const recur = item.recur || null;
    if (!dateKey) { toast({ icon: "⚠️", msg: "Este elemento no tiene fecha." }); return; }
    const dLabel = DateUtil.parse(dateKey).toLocaleDateString("es-MX", { day: "numeric", month: "long", year: "numeric" });
    const when = recur ? ("🔁 Cada día, desde el " + dLabel) : DateUtil.parse(dateKey).toLocaleDateString("es-MX", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

    const body = el("div", {}, [
      el("div", { class: "insight info", style: "margin-bottom:14px" }, [
        el("span", { class: "ico", text: "📅" }),
        el("div", { class: "txt", html: "<b>" + title + "</b><br>" + when + "<br><span style='color:var(--txt-faint)'>Recordatorio " + (recur ? "diario" : "de día completo") + " (alarma 09:00).</span>" })
      ]),
      el("button", {
        class: "btn primary block mb-16", html: "🗓️ Añadir a Google Calendar",
        onclick: () => {
          Audio.play("coin");
          window.open(googleUrl(title, details, dateKey, recur), "_blank", "noopener");
          UI.closeModal();
        }
      }),
      el("button", {
        class: "btn block", html: "📆 Descargar .ics (Apple, Outlook, Samsung…)",
        onclick: () => { Audio.play("tap"); downloadIcs(title, details, dateKey, recur); UI.closeModal(); }
      }),
      el("p", { class: "fs-12 text-faint mt-16", text: "Tu app de calendario se encargará de la alerta, incluso con OCTANAJE cerrado." })
    ]);
    UI.openModal("Añadir recordatorio", body);
  }

  // Fila para insertar dentro de un formulario: lee el título y la fecha en vivo
  function formRow(titleInput, dateInput, detailText) {
    const run = (fn) => {
      const t = (titleInput && titleInput.value || "").trim();
      const d = dateInput && dateInput.value;
      if (!d) { toast({ icon: "⚠️", msg: "Primero elige una fecha arriba." }); return; }
      fn(t || "Recordatorio", detailText || "", d);
    };
    return el("div", { style: "margin:2px 0 8px;padding:12px;border:1px dashed var(--border-strong);border-radius:12px" }, [
      el("div", { class: "fs-12 text-dim", style: "margin-bottom:8px", text: "📅 Añadir recordatorio a tu calendario (usa la fecha de arriba):" }),
      el("div", { class: "row" }, [
        el("button", { type: "button", class: "btn sm", html: "🗓️ Google", onclick: () => run((t, de, d) => { Audio.play("coin"); window.open(googleUrl(t, de, d), "_blank", "noopener"); }) }),
        el("button", { type: "button", class: "btn sm", html: "📆 .ics", onclick: () => run((t, de, d) => { Audio.play("tap"); downloadIcs(t, de, d); }) })
      ])
    ]);
  }

  N.CalExport = { open, googleUrl, downloadIcs, formRow, openTimed, googleUrlTimed, downloadIcsTimed };
})();


/* ===== assets/js/settings.js ===== */
/* =====================================================================
   OCTANAJE · Settings — exportar/importar datos y notificaciones
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio } = N;
  const { el, toast } = UI;

  // monedas disponibles (código + locale para formato correcto)
  const CURRENCIES = [
    { code: "MXN", locale: "es-MX", label: "🇲🇽 Peso mexicano (MXN)" },
    { code: "USD", locale: "en-US", label: "🇺🇸 Dólar estadounidense (USD)" }
  ];

  // ---------- tema ----------
  function themeRow() {
    const cur = Store.get().settings.theme || "dark";
    const seg = el("div", { class: "seg", style: "flex-wrap:wrap" });
    [["light", "☀️ Claro"], ["gray", "◐ Gris"], ["dark", "🌙 Oscuro"], ["purple", "🟣 Morado"], ["neon", "🔴 Dark"]].forEach(([val, label]) => {
      const b = el("button", { text: label, onclick: () => { if (N.App) N.App.applyTheme(val); Audio.play("tap"); open(); } });
      if (val === cur) b.classList.add("on");
      seg.appendChild(b);
    });
    return el("div", { class: "set-row", style: "flex-direction:column;align-items:stretch;gap:10px" }, [
      el("div", {}, [
        el("div", { class: "set-title", text: "🎨 Tema" }),
        el("div", { class: "set-desc", text: "Elige entre claro, gris, oscuro, morado o dark (rojo neón)." })
      ]),
      seg
    ]);
  }

  // ---------- sonido ----------
  function soundRow() {
    const on = Audio.isEnabled();
    const toggle = el("button", { class: "switch" + (on ? " on" : ""), role: "switch", "aria-checked": on ? "true" : "false" }, [el("span", { class: "knob" })]);
    toggle.addEventListener("click", () => { Audio.toggle(); open(); });
    return el("div", { class: "set-row" }, [
      el("div", {}, [
        el("div", { class: "set-title", text: "🔊 Sonidos" }),
        el("div", { class: "set-desc", text: on ? "Activados" : "Silenciados" })
      ]),
      toggle
    ]);
  }

  function currencyRow() {
    const s = Store.get().settings;
    const sel = el("select", { class: "select", style: "max-width:230px" });
    CURRENCIES.forEach((c) => {
      const o = el("option", { value: c.code, text: c.label });
      if (c.code === (s.currency || "MXN")) o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener("change", () => {
      const c = CURRENCIES.find((x) => x.code === sel.value) || CURRENCIES[0];
      s.currency = c.code; s.locale = c.locale;
      Store.commit(true);
      Audio.play("coin");
      toast({ icon: "💱", title: "Moneda actualizada", msg: "Ahora en " + c.code });
      if (N.App) { N.App.refreshTop(); N.App.renderCurrent(); }
    });
    return el("div", { class: "set-row" }, [
      el("div", {}, [
        el("div", { class: "set-title", text: "💱 Moneda" }),
        el("div", { class: "set-desc", text: "Cambia y alterna la moneda de tus finanzas." })
      ]),
      sel
    ]);
  }

  // ---------- exportar ----------
  function exportData() {
    try {
      const data = Store.serialize();
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = el("a", { href: url, download: "octanaje-backup-" + Store.DateUtil.todayKey() + ".json" });
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
      Audio.play("money");
      toast({ icon: "💾", title: "Datos exportados", msg: "Se descargó tu copia de seguridad." });
    } catch (e) {
      Audio.play("error");
      toast({ icon: "⚠️", title: "Error al exportar", msg: String(e.message || e) });
    }
  }

  // ---------- importar ----------
  function importData(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        Store.import(obj);
        Audio.play("complete");
        toast({ icon: "📥", title: "Datos importados", msg: "Tu información se restauró correctamente." });
        UI.closeModal();
        if (N.App) { N.App.refreshTop(); N.App.renderCurrent(); }
      } catch (e) {
        Audio.play("error");
        toast({ icon: "⚠️", title: "Archivo no válido", msg: "No se pudo leer el respaldo." });
      }
    };
    reader.onerror = () => { Audio.play("error"); toast({ icon: "⚠️", msg: "No se pudo abrir el archivo" }); };
    reader.readAsText(file);
  }

  // ---------- notificaciones ----------
  function notifRow() {
    const Notify = N.Notify;
    const on = Notify && Notify.enabled();
    const perm = Notify ? Notify.permission() : "unsupported";
    const status = !Notify || perm === "unsupported" ? "No soportadas por el navegador"
      : on && perm === "granted" ? "Activadas ✓"
      : on ? "Activadas (avisos dentro de la app)"
      : "Desactivadas";

    const toggle = el("button", { class: "switch" + (on ? " on" : "") , role: "switch", "aria-checked": on ? "true" : "false" }, [el("span", { class: "knob" })]);
    toggle.addEventListener("click", () => {
      if (Notify && Notify.enabled()) { Notify.disable(); }
      else if (Notify) { Notify.enable().then(() => open()); return; }
      open(); // re-render del modal
    });

    const rows = [
      el("div", { class: "set-row" }, [
        el("div", {}, [
          el("div", { class: "set-title", text: "🔔 Notificaciones y recordatorios" }),
          el("div", { class: "set-desc", text: status })
        ]),
        toggle
      ])
    ];
    if (on) {
      rows.push(el("div", { class: "set-row", style: "padding-top:0" }, [
        el("div", {}, [
          el("div", { class: "set-title fs-12", text: "Sonidos, horario y días" }),
          el("div", { class: "set-desc", text: (Notify.reminders().length) + " recordatorio(s) configurado(s)" })
        ]),
        el("button", { class: "btn sm", html: "⏰ Configurar recordatorios", onclick: openReminders })
      ]));
    }
    rows.push(el("div", { class: "set-row", style: "padding-top:0" }, [
      el("div", {}, [
        el("div", { class: "set-title fs-12", text: "🗓️ Recordatorio en tu calendario" }),
        el("div", { class: "set-desc", text: "Alarma real del sistema (Google Calendar/.ics), funciona con la app cerrada." })
      ]),
      el("button", { class: "btn sm", html: "🗓️ Configurar horario", onclick: openSystemReminder })
    ]));
    return el("div", {}, rows);
  }

  // ---------- recordatorio de calendario del sistema (Google Calendar / .ics) ----------
  function openSystemReminder() {
    const body = UI.form([
      { name: "title", label: "Título", value: "Recordatorio OCTANAJE", placeholder: "Ej. Revisar hábitos", required: true },
      { name: "message", label: "Mensaje (opcional)", type: "textarea", placeholder: "Detalle del recordatorio…" },
      { name: "time", label: "Hora de inicio", type: "time", value: "08:00", required: true },
      { name: "days", label: "¿Qué días se repite?", type: "weekdays", value: [0, 1, 2, 3, 4, 5, 6] }
    ], (data) => {
      const days = typeof data.days === "string" ? data.days.split(",").filter((x) => x !== "").map(Number) : (data.days || []);
      N.CalExport.openTimed({
        title: data.title, details: data.message, time: data.time, days,
        dateKey: Store.DateUtil.todayKey()
      });
    }, "Continuar");
    UI.openModal("🗓️ Configurar recordatorio de calendario", body);
  }

  // ---------- panel de recordatorios personalizados ----------
  function reminderRow(r) {
    const Notify = N.Notify;
    const toggle = el("button", { class: "switch sm" + (r.enabled ? " on" : ""), role: "switch", "aria-checked": r.enabled ? "true" : "false" }, [el("span", { class: "knob" })]);
    toggle.addEventListener("click", () => { Notify.toggleReminder(r); Audio.play("tap"); openReminders(); });

    return el("div", { class: "item", style: "padding:10px 12px" }, [
      el("div", { class: "item-main" }, [
        el("div", { class: "item-title", text: "⏰ " + r.title }),
        el("div", { class: "item-meta" }, [
          el("span", { class: "chip accent", text: r.time }),
          el("span", { class: "chip", text: Notify.reminderDaysLabel(r) }),
          r.sound ? el("span", { class: "chip warn", text: "🔊 alarma" }) : el("span", { class: "chip", text: "🔇 silencioso" })
        ])
      ]),
      toggle,
      el("button", { class: "icon-btn", title: "Editar", onclick: () => openReminderForm(r) , html: "✏️" }),
      el("button", { class: "icon-btn", title: "Eliminar", onclick: () => {
        UI.confirmBox("Eliminar recordatorio", "¿Eliminar \"" + r.title + "\"?", () => {
          Notify.removeReminder(r); Audio.play("delete"); toast({ icon: "🗑️", msg: "Recordatorio eliminado" }); openReminders();
        }, "Eliminar");
      }, html: "🗑️" })
    ]);
  }

  function openReminders() {
    const Notify = N.Notify;
    const list = Notify.reminders();
    const body = el("div", {}, [
      el("button", { class: "btn primary block mb-16", html: "＋ Nuevo recordatorio", onclick: () => openReminderForm() }),
      list.length
        ? el("div", {}, list.map(reminderRow))
        : el("div", { class: "empty" }, [el("span", { class: "big", text: "⏰" }), el("div", { text: "Aún no tienes recordatorios personalizados." })]),
      el("p", { class: "fs-12 text-faint mt-16", text: "Los recordatorios suenan mientras OCTANAJE esté abierto (en primer o segundo plano). Para alarmas que funcionen con la app cerrada, usa \"Añadir a Google Calendar\" en Hábitos/Tareas/Metas." })
    ]);
    UI.openModal("⏰ Recordatorios", body);
  }

  function openReminderForm(existing) {
    const Notify = N.Notify;
    const testBtn = el("button", { type: "button", class: "btn sm", html: "🔊 Probar sonido de alarma", onclick: () => Audio.preview("alarm") });
    const body = UI.form([
      { name: "title", label: "Título", value: existing ? existing.title : "", placeholder: "Ej. Revisar hábitos", required: true },
      { name: "message", label: "Mensaje (opcional)", type: "textarea", value: existing ? existing.message : "", placeholder: "Detalle del recordatorio…" },
      { name: "time", label: "Hora", type: "time", value: existing ? existing.time : "08:00", required: true },
      { name: "days", label: "¿Qué días?", type: "weekdays", value: (existing && existing.days && existing.days.length) ? existing.days : [0, 1, 2, 3, 4, 5, 6] },
      { name: "sound", label: "Sonido de alarma", type: "select", value: existing ? (existing.sound !== false ? "1" : "0") : "1", options: [
        { value: "1", label: "🔊 Con alarma" }, { value: "0", label: "🔇 Silencioso (solo notificación)" }
      ]}
    ], (data) => {
      const payload = {
        title: data.title, message: data.message, time: data.time,
        days: typeof data.days === "string" ? data.days.split(",").filter((x) => x !== "").map(Number) : (data.days || []),
        sound: data.sound === "1"
      };
      if (existing) { Notify.updateReminder(existing, payload); toast({ icon: "✏️", msg: "Recordatorio actualizado" }); }
      else { Notify.addReminder(payload); Audio.play("add"); toast({ icon: "⏰", title: "Recordatorio creado", msg: payload.title }); }
      openReminders();
    }, existing ? "Guardar cambios" : "Crear recordatorio", () => testBtn);
    UI.openModal(existing ? "Editar recordatorio" : "Nuevo recordatorio", body);
  }

  // ---------- modal principal ----------
  function open() {
    const body = el("div", {}, [
      // Apariencia
      themeRow(),
      // Sonido
      soundRow(),
      // Moneda
      currencyRow(),
      // Notificaciones
      notifRow(),

      // Exportar / importar
      el("div", { class: "set-row" }, [
        el("div", {}, [
          el("div", { class: "set-title", text: "💾 Copia de seguridad" }),
          el("div", { class: "set-desc", text: "Descarga o restaura todos tus datos (JSON)." })
        ])
      ]),
      el("div", { class: "row" }, [
        el("button", { class: "btn primary", html: "⬇ Exportar", onclick: exportData }),
        (function () {
          const label = el("label", { class: "btn", style: "cursor:pointer;justify-content:center", html: "⬆ Importar" });
          const inp = el("input", { type: "file", accept: "application/json,.json", style: "display:none" });
          inp.addEventListener("change", () => { if (inp.files && inp.files[0]) importData(inp.files[0]); });
          label.appendChild(inp);
          return label;
        })()
      ]),

      // Zona de peligro
      el("div", { class: "set-row", style: "margin-top:14px;border-top:1px solid var(--border);padding-top:16px" }, [
        el("div", {}, [
          el("div", { class: "set-title", text: "⚠️ Reiniciar datos" }),
          el("div", { class: "set-desc", text: "Borra todo de forma permanente." })
        ]),
        el("button", { class: "btn danger", html: "Borrar todo", onclick: () => {
          UI.confirmBox("Reiniciar datos", "Se borrarán TODOS tus datos. Esta acción no se puede deshacer.", () => {
            Store.reset(); Audio.play("delete");
            toast({ icon: "♻️", msg: "Datos reiniciados" });
            UI.closeModal();
            if (N.App) { N.App.refreshTop(); N.App.renderCurrent(); }
          }, "Borrar todo");
        } })
      ])
    ]);
    UI.openModal("Ajustes", body);
  }

  N.Settings = { open, exportData, importData };
})();


/* ===== assets/js/app.js ===== */
/* =====================================================================
   OCTANAJE · App — orquestador principal
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, Audio, UI, Gami } = N;
  const { $, $$ } = UI;

  const VIEWS = {
    dashboard: N.Dashboard,
    habits: N.Habits,
    finance: N.Finance,
    tasks: N.Tasks,
    workouts: N.Workouts,
    goals: N.Goals,
    focus: N.Focus,
    nutrition: N.Nutrition
  };
  let current = "dashboard";

  // ---------- Temas ----------
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    Store.get().settings.theme = theme;
    Store.commit(true);
  }

  // ---------- Barra superior ----------
  function refreshTop() {
    const s = Store.get();
    const lp = Gami.levelProgress();
    $("#level-badge").textContent = lp.level;
    $("#rank-name").textContent = Gami.rankName(lp.level);
    $("#xp-text").textContent = `${UI.fmt.num(lp.into)} / ${UI.fmt.num(lp.span)} XP`;
    $("#xp-fill").style.width = lp.pct + "%";
    const streak = Gami.globalStreak();
    $("#streak-days").textContent = streak;
    const medal = Gami.medalForStreak(streak);
    const badge = $("#medal-badge");
    if (badge) {
      badge.className = "medal-badge medal-" + medal.cls;
      badge.innerHTML = Gami.medalBadgeSvg(medal);
      badge.title = medal.name + " · racha " + streak + " día" + (streak === 1 ? "" : "s");
    }
  }

  // ---------- Router ----------
  function switchView(name, silent) {
    if (!VIEWS[name]) return;
    current = name;
    $$(".tab").forEach((t) => t.classList.toggle("is-active", t.dataset.view === name));
    $$(".view").forEach((v) => v.classList.toggle("is-active", v.id === "view-" + name));
    if (!silent) Audio.play("tab");
    renderCurrent();
  }

  function renderCurrent() {
    const container = document.getElementById("view-" + current);
    if (container && VIEWS[current]) VIEWS[current].render(container);
    refreshTop();
  }

  // ---------- Eventos ----------
  function bind() {
    // gesto inicial desbloquea audio
    document.body.addEventListener("pointerdown", () => Audio.unlock(), { once: true });

    $("#tabs").addEventListener("click", (e) => {
      const tab = e.target.closest(".tab");
      if (tab) switchView(tab.dataset.view);
    });

    const setBtn = $("#settings-btn");
    if (setBtn) setBtn.addEventListener("click", () => { Audio.play("tap"); if (N.Settings) N.Settings.open(); });

    $("#modal-close").addEventListener("click", UI.closeModal);
    $("#modal-overlay").addEventListener("click", (e) => { if (e.target.id === "modal-overlay") UI.closeModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") UI.closeModal(); });

    // redibujar gráficas al cambiar tamaño (pero no si es por el teclado
    // virtual del celular abriéndose/cerrándose mientras se escribe en un
    // campo, ni si el ancho no cambió — solo el alto, típico del teclado)
    let rt = null;
    let lastW = window.innerWidth;
    window.addEventListener("resize", () => {
      clearTimeout(rt);
      rt = setTimeout(() => {
        const widthChanged = window.innerWidth !== lastW;
        lastW = window.innerWidth;
        const typing = document.activeElement &&
          (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA");
        if (typing && !widthChanged) return; // probablemente el teclado virtual, no un cambio real de layout
        renderCurrent();
      }, 250);
    });
  }

  // ---------- Ahorro de batería ----------
  // Pausa todas las animaciones CSS (brillos, logo, medallas, fondo…)
  // cuando la app pasa a segundo plano o la pantalla se apaga, para no
  // seguir gastando batería sin que el usuario esté viendo nada.
  function bindPowerSaving() {
    const root = document.documentElement;
    if (!root || !root.classList) return; // entorno sin soporte (p.ej. pruebas)
    function apply() { root.classList.toggle("app-hidden", !!document.hidden); }
    document.addEventListener("visibilitychange", apply);
    apply();
  }

  // ---------- Init ----------
  function init() {
    const s = Store.get();
    applyTheme(s.settings.theme || "dark");
    bind();
    bindPowerSaving();
    Gami.checkAchievements();
    if (N.Notify) N.Notify.init();
    switchView("dashboard", true);

    // mostrar la app cuanto antes y ocultar el arranque
    $("#app").hidden = false;
    setTimeout(() => {
      const boot = $("#boot-screen");
      if (boot) {
        boot.classList.add("hide");
        setTimeout(() => boot.remove(), 350);
      }
    }, 450);
  }

  // ---------- Service Worker (PWA) ----------
  // Solo en http/https (no en file://). Habilita instalación y uso offline.
  // Además: fuerza la actualización automática cuando hay una versión nueva,
  // para que los usuarios no queden atascados en JS/CSS viejo en caché
  // (importante en la app instalada/APK, donde "actualizar" no siempre
  // basta para bajar el Service Worker nuevo).
  function registerSW() {
    try {
      if (typeof location !== "undefined" && /^https?:$/.test(location.protocol) &&
          typeof navigator !== "undefined" && "serviceWorker" in navigator) {
        let reloaded = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (reloaded) return;
          reloaded = true;
          location.reload();
        });
        navigator.serviceWorker.register("sw.js").then((reg) => {
          // revisa si hay una versión nueva en cuanto se registra
          reg.update().catch(() => {});
          // y cada vez que la app vuelve a estar visible (se reabre la PWA/APK)
          document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") reg.update().catch(() => {});
          });
        }).catch(function () {});
      }
    } catch (e) {}
  }

  N.App = { refreshTop, switchView, renderCurrent, applyTheme };

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
  registerSW();
})();

  </script>
