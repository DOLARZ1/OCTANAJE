      Charts.line(cvXp, { labels: days14.map((d) => DateUtil.label(d)), values: days14.map((d) => s.xpLog[d] || 0) }, { height: 180, color: "--accent" });

      const h7 = N.Habits.weeklySeries();
      const t7 = N.Tasks.completed7();
      Charts.bars(cvAct, { labels: h7.labels, series: [{ values: h7.values, color: "--accent" }, { values: t7.values, color: "--good" }] }, { height: 180 });
    }, 40);
  }

  // ---------- Frase motivacional ----------
  let quoteOverride = null; // índice fijo tras presionar "otra frase"

  function buildQuoteCard(container) {
    const todayKey = DateUtil.todayKey();
    const q = N.pickQuote(todayKey, quoteOverride);
    const card = el("div", { class: "card quote-card mb-16" }, [
      el("div", { class: "quote-ico", text: "💬" }),
      el("div", { class: "quote-body" }, [
        el("div", { class: "quote-text", text: "“" + q.text + "”" }),
        el("div", { class: "quote-author", text: "— " + q.author })
      ]),
      el("button", {
        class: "icon-btn quote-refresh", title: "Otra frase",
        onclick: () => {
          const n = N.QUOTES.length;
          let idx;
          do { idx = Math.floor(Math.random() * n); } while (n > 1 && N.QUOTES[idx].text === q.text);
          quoteOverride = idx;
          N.Audio.play("tap");
          render(container);
        },
        html: "🔄"
      })
    ]);
    return card;
  }

  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  // ---------- Ingresos y gastos (medidor radial) ----------
  let ieDashPeriod = "monthly"; // "daily" | "weekly" | "biweekly" | "monthly"

  function ieLegendRow(idx, label, val, maxV, colorVar) {
    const pct = maxV > 0 ? Math.round((val / maxV) * 100) : 0;
    const cvar = "var(" + colorVar + ")";
    return el("div", { class: "flex items-center gap-12", style: "padding:6px 0" }, [
      el("div", { style: "width:34px;height:34px;flex:none;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:13px;color:#04122b;background:" + cvar + ";box-shadow:0 0 12px " + cvar }, [
        el("span", { text: "0" + idx })
      ]),
      el("div", { class: "item-main" }, [
        el("div", { class: "item-title", style: "font-size:14px", text: label }),
        el("div", { class: "text-faint fs-12", text: fmt.money(val) })
      ]),
      el("div", { style: "font-size:20px;font-weight:800;color:" + cvar, text: pct + "%" })
    ]);
  }

  function incomeExpenseCard(container) {
    const t = N.Finance.periodTotals(ieDashPeriod);
    const maxV = Math.max(t.income, t.expense, 1);
    const bal = t.income - t.expense;

    function segBtn(mode, label) {
      const b = el("button", { text: label, onclick: () => { ieDashPeriod = mode; N.Audio.play("tab"); render(container); } });
      if (ieDashPeriod === mode) b.classList.add("on");
      return b;
    }

    const card = el("div", { class: "card" }, [
      el("div", { class: "card-head", style: "flex-wrap:wrap;gap:8px" }, [
        el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Ingresos y gastos · " + t.label]),
        el("div", { class: "seg" }, [
          segBtn("daily", "Diario"), segBtn("weekly", "Semanal"), segBtn("biweekly", "Quincenal"), segBtn("monthly", "Mensual")
        ])
      ])
    ]);
    const cv = el("canvas");
    const legend = el("div", { style: "flex:1;min-width:180px;display:flex;flex-direction:column;gap:8px;justify-content:center" }, [
      ieLegendRow(1, "Ingresos", t.income, maxV, "--good"),
      ieLegendRow(2, "Gastos", t.expense, maxV, "--bad")
    ]);
    card.appendChild(el("div", { class: "flex", style: "gap:18px;align-items:center;flex-wrap:wrap" }, [
      el("div", { style: "flex:1;min-width:170px;display:flex;justify-content:center" }, [cv]),
      legend
    ]));
    setTimeout(() => {
      Charts.multiRing(cv, [
        { pct: (t.income / maxV) * 100, color: "--good" },
        { pct: (t.expense / maxV) * 100, color: "--bad" }
      ], { size: 180, centerLabel: fmt.money(bal), centerSub: "balance" });
    }, 30);
    return card;
  }

  // ---------- Escalera de medallas por racha ----------
  function buildMedalLadderCard(streak) {
    const cur = Gami.medalForStreak(streak);
    const next = Gami.nextMedal(streak);
    const card = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head", style: "flex-wrap:wrap;gap:8px" }, [
        el("div", { class: "card-title" }, [el("span", { class: "dot" }), "🎖️ Medallas por racha"]),
        el("span", { class: "chip accent", text: "🔥 " + streak + " día" + (streak === 1 ? "" : "s") })
      ]),
      el("div", { class: "flex items-center gap-12", style: "margin-bottom:14px" }, [
        el("div", { class: "medal-badge medal-" + cur.cls, html: Gami.medalBadgeSvg(cur) }),
        el("div", {}, [
          el("div", { class: "fw-700", style: "font-size:16px", text: cur.name }),
          el("div", { class: "fs-12 text-faint", text: next ? ("Faltan " + (next.minStreak - streak) + " día" + ((next.minStreak - streak) === 1 ? "" : "s") + " para " + next.name) : "¡Rango máximo alcanzado!" })
        ])
      ])
    ]);
    const strip = el("div", { class: "medal-strip" });
    Gami.allMedals().forEach((m) => {
      const reached = streak >= m.minStreak;
      strip.appendChild(el("div", { class: "medal-mini medal-" + m.cls + (reached ? " on" : " off") + (m.id === cur.id ? " active" : ""), title: m.name + " · racha " + m.minStreak + "+", html: Gami.medalBadgeSvg(m) }));
    });
    card.appendChild(strip);
    return card;
  }

  // ---------- Calendario de actividad ----------
  function isActive(s, key) {
    return !!s.activity[key] || (s.xpLog[key] || 0) > 0;
  }

  function buildCalendarCard(s) {
    const now = new Date();
    const y = now.getFullYear(), mo = now.getMonth();
    const monthLabel = now.toLocaleDateString("es-MX", { month: "long", year: "numeric" });
    const daysInMonth = new Date(y, mo + 1, 0).getDate();
    const startCol = (new Date(y, mo, 1).getDay() + 6) % 7; // lunes primero
    const todayKey = DateUtil.todayKey();

    // contar días activos del mes
    let activos = 0, transcurridos = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const key = DateUtil.key(new Date(y, mo, d));
      if (key <= todayKey) { transcurridos++; if (isActive(s, key)) activos++; }
    }

    const grid = el("div", { class: "cal" });
    ["L", "M", "M", "J", "V", "S", "D"].forEach((h) => grid.appendChild(el("div", { class: "cal-h", text: h })));
    for (let i = 0; i < startCol; i++) grid.appendChild(el("div", { class: "cal-day empty" }));
    for (let d = 1; d <= daysInMonth; d++) {
      const key = DateUtil.key(new Date(y, mo, d));
      let cls = "cal-day";
      const label = DateUtil.parse(key).toLocaleDateString("es-MX", { weekday: "long", day: "numeric", month: "short" });
      let tip = label;
      if (key > todayKey) { cls += " future"; }
      else if (isActive(s, key)) { cls += " done"; tip += " · ✓ con actividad (+" + (s.xpLog[key] || 0) + " XP)"; }
      else { cls += " miss"; tip += " · sin actividad"; }
      if (key === todayKey) cls += " today";
      grid.appendChild(el("div", { class: cls + " clickable", title: tip + " · toca para ver detalle", text: String(d), onclick: () => showDayDetail(key) }));
    }

    return el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head", style: "flex-wrap:wrap;gap:8px" }, [
        el("div", { class: "card-title", style: "text-transform:capitalize" }, [el("span", { class: "dot" }), "Calendario · " + monthLabel]),
        el("div", { class: "flex gap-8 fs-12" }, [
          el("span", { class: "chip good", text: "● Activo" }),
          el("span", { class: "chip bad", text: "● Sin actividad" })
        ])
      ]),
      grid,
      el("div", { class: "fs-12 text-dim mt-8", text: `${activos} de ${transcurridos} días con actividad este mes` })
    ]);
  }

  // estado de un hábito en un día concreto
  function habitDayStatus(h, key) {
    const target = Math.max(1, parseInt(h.count, 10) || 1);
    const v = h.history[key];
    const cur = v === true ? target : (typeof v === "number" ? v : 0);
    return { done: cur >= target, cur, target };
  }

  // fila con palomita (✓) o tache (✗)
  function statusRow(label, done, extra) {
    return el("div", { class: "item", style: "padding:10px 12px" }, [
      el("span", { style: "font-size:18px;flex:none;color:" + (done ? "var(--good)" : "var(--bad)"), text: done ? "✓" : "✗" }),
      el("div", { class: "item-main" }, [el("div", { class: "item-title", style: "font-size:14px", text: label })]),
      extra ? el("span", { class: "chip " + (done ? "good" : "bad"), text: extra }) : null
    ]);
  }
  function infoRow(icon, label, valueText, cls) {
    return el("div", { class: "item", style: "padding:10px 12px" }, [
      el("span", { style: "font-size:18px;flex:none", text: icon }),
      el("div", { class: "item-main" }, [el("div", { class: "item-title", style: "font-size:14px", text: label })]),
      el("span", { class: "fw-700 " + (cls || ""), text: valueText })
    ]);
  }
  function section(title) {
    return el("div", { style: "margin-bottom:16px" }, [
      el("div", { class: "card-title", style: "margin-bottom:8px", text: title })
    ]);
  }

  // Detalle del día al tocar en el calendario
  function showDayDetail(key) {
    const s = Store.get();
    const isFuture = key > DateUtil.todayKey();
    const dLabel = DateUtil.parse(key).toLocaleDateString("es-MX", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    const body = el("div", {});

    // Hábitos (solo los programados ese día; los de descanso no cuentan como pendientes)
    const dayHabits = s.habits.filter((h) => N.Habits.activeOn(h, key));
    if (dayHabits.length) {
      const sec = section("✦ Hábitos");
      dayHabits.forEach((h) => {
        const st = habitDayStatus(h, key);
        sec.appendChild(statusRow(h.icon + " " + h.name, st.done, st.target > 1 ? (st.cur + "/" + st.target) : (st.done ? "hecho" : "pendiente")));
      });
      body.appendChild(sec);
    }
    const restHabits = s.habits.filter((h) => !N.Habits.activeOn(h, key));
    if (restHabits.length) {
      const sec = section("💤 Descanso hoy");
      restHabits.forEach((h) => sec.appendChild(statusRow(h.icon + " " + h.name, true, "descanso (" + N.Habits.daysLabel(h) + ")")));
      body.appendChild(sec);
    }

    // Tareas (vencen ese día o se completaron ese día)
    const dayTasks = s.tasks.filter((t) => t.due === key || t.doneAt === key);
    if (dayTasks.length) {
      const sec = section("✓ Tareas");
      dayTasks.forEach((t) => sec.appendChild(statusRow(t.title, !!t.done, t.done ? "completada" : "pendiente")));
      body.appendChild(sec);
    }

    // Entrenamientos
    const ws = s.workouts.filter((w) => w.date === key);
    if (ws.length) {
      const sec = section("⚡ Entrenamientos");
      ws.forEach((w) => sec.appendChild(statusRow(w.name, true, w.duration + " min")));
      body.appendChild(sec);
    }

    // Finanzas
    const tx = s.finance.transactions.filter((t) => t.date === key);
    if (tx.length) {
      const sec = section("◈ Finanzas");
      tx.forEach((t) => sec.appendChild(infoRow(t.type === "income" ? "💰" : "💸", t.note || t.category,
        (t.type === "income" ? "+" : "−") + fmt.money(t.amount), t.type === "income" ? "text-good" : "text-bad")));
      body.appendChild(sec);
    }

    // Foco
    const fSes = (s.focus.sessionsLog && s.focus.sessionsLog[key]) || 0;
    if (fSes) {
      const sec = section("💡 Enfoque");
      sec.appendChild(statusRow("Sesiones de enfoque", true, fSes + " · " + ((s.focus.focusLog && s.focus.focusLog[key]) || 0) + " min"));
      body.appendChild(sec);
    }

    if (!body.children.length) {
      body.appendChild(el("div", { class: "empty" }, [
        el("span", { class: "big", text: isFuture ? "🔮" : "🌙" }),
        el("div", { text: isFuture ? "Día futuro: aún sin nada planeado." : "Sin actividad registrada este día." })
      ]));
    }

    UI.openModal("Detalle · " + dLabel, body);
  }

  N.Dashboard = { render };
})();


/* ===== assets/js/modules/habits.js ===== */
/* =====================================================================
   OCTANAJE · Módulo Hábitos
   Soporta hábitos simples (1 check) y hábitos con META DIARIA de N veces
   (se rellenan N cuadritos; el hábito se completa solo al llenarlos todos).
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;
  const { el, fmt, toast } = UI;
  const DateUtil = Store.DateUtil;

  const ICONS = [
    // generales
    "✦", "✅", "⭐", "🌟", "🔥", "⚡", "❤️", "☀️", "🌙", "⏰",
    // salud / ejercicio
    "💪", "🏃", "🚴", "🏋️", "🧘", "🚶", "🥗", "💧", "😴", "💊", "🩺", "🦷", "🚿", "🚭",
    // mente / estudio
    "📚", "🧠", "📝", "🎓", "💡", "✍️", "🙏",
    // trading / dinero
    "📈", "📉", "📊", "💹", "🕯️", "💲", "💰", "💵", "💸", "🪙", "🏦", "💳", "🤑", "💱",
    // metas
    "🎯", "🏆", "🥇", "🏁", "🚀",
    // vacaciones / viajes
    "🏖️", "🏝️", "🌴", "✈️", "⛱️", "🧳", "🗺️", "🏔️", "🏕️", "🚗",
    // calaveras
    "💀", "☠️",
    // hobbies / vida
    "🎨", "🎮", "📷", "🍳", "☕", "🧹", "🌱", "🌍", "🛌", "🧴",
    // comida
    "🍎", "🍌", "🫐", "🥑", "🥦", "🥕", "🍗", "🍚", "🍞", "🍳", "🥗", "🍕", "🍔", "🍫", "🍩", "🥤", "🥛", "🍺",
    // mascotas
    "🐶", "🐱", "🐰", "🐹", "🐦", "🐠", "🐢", "🐾",
    // trabajo / oficina
    "💼", "💻", "🖥️", "⌨️", "🖱️", "📅", "📎", "🖊️", "📞", "📧", "🗂️", "📌", "📁",
    // música / instrumentos
    "🎵", "🎧", "🎸", "🎹", "🥁", "🎺", "🎷", "🎻", "🎤", "🎼"
  ];
  const MAX_BOXES = 50;
  // prioridad visual del hábito (color de borde/etiqueta, no afecta XP)
  const HPRIO = {
    high: { label: "Alta", chip: "bad", color: "var(--bad)" },
    medium: { label: "Media", chip: "warn", color: "var(--warn)" },
    low: { label: "Baja", chip: "accent", color: "var(--accent)" }
  };
  function prioOf(h) { return HPRIO[h.priority] ? h.priority : "medium"; }

  function habits() { return Store.get().habits; }
  const today = () => DateUtil.todayKey();

  // orden visual guardado por el usuario (arriba = primero). Si no existe
  // aún en hábitos viejos, se asigna al vuelo según su posición actual.
  function sortedHabits() {
    const arr = habits();
    arr.forEach((h, i) => { if (h.order == null) h.order = i; });
    return arr.slice().sort((a, b) => (a.order - b.order));
  }
  function moveHabit(h, dir) {
    const arr = sortedHabits();
    const i = arr.indexOf(h);
    const j = i + dir;
    if (j < 0 || j >= arr.length) return;
    // intercambia el "order" con el vecino para moverlo una posición
    const tmp = arr[j].order; arr[j].order = h.order; h.order = tmp;
    Audio.play("tap");
    Store.commit();
    render(document.getElementById("view-habits"));
  }

  // meta diaria (nº de veces). 1 = hábito simple
  function tgt(h) { return Math.max(1, Math.min(MAX_BOXES, parseInt(h.count, 10) || 1)); }
  // cantidad hecha en un día (compatible con formato antiguo: true = completo)
  function dayVal(h, key) {
    const v = h.history[key];
    if (v === true) return tgt(h);
    if (typeof v === "number") return v;
    return 0;
  }
  function doneOn(h, key) { return dayVal(h, key) >= tgt(h); }
  function doneToday(h) { return doneOn(h, today()); }
  function pctToday(h) { return Math.round((dayVal(h, today()) / tgt(h)) * 100); }

  // ---------- programación de días activos (0=Dom..6=Sáb) ----------
  const ALL_DAYS = [0, 1, 2, 3, 4, 5, 6];
  function activeDays(h) { return (Array.isArray(h.days) && h.days.length) ? h.days : ALL_DAYS; }
  function activeSet(h) { return new Set(activeDays(h)); }
  function activeOn(h, key) { return activeSet(h).has(DateUtil.parse(key).getDay()); }
  function activeToday(h) { return activeOn(h, today()); }
  function daysLabel(h) {
    const s = activeSet(h);
    if (s.size >= 7) return "Todos los días";
    if (s.size === 5 && [1, 2, 3, 4, 5].every((d) => s.has(d))) return "Lun a Vie";
    if (s.size === 2 && s.has(0) && s.has(6)) return "Fin de semana";
    return [[1, "L"], [2, "M"], [3, "M"], [4, "J"], [5, "V"], [6, "S"], [0, "D"]].filter((x) => s.has(x[0])).map((x) => x[1]).join(" ");
  }

  // racha (días activos consecutivos completados; se saltan los días de descanso)
  function streak(h) {
    const set = activeSet(h);
    let s = 0, day = today();
    if (set.has(DateUtil.parse(day).getDay()) && !doneOn(h, day)) day = DateUtil.addDays(day, -1);
    for (let i = 0; i < 400; i++) {
      const wd = DateUtil.parse(day).getDay();
      if (set.has(wd)) { if (doneOn(h, day)) s++; else break; }
      day = DateUtil.addDays(day, -1);
    }
    return s;
  }
  function bestStreak(h) {
    const set = activeSet(h);
    const done = Object.keys(h.history).filter((k) => doneOn(h, k)).sort();
    if (!done.length) return 0;
    let day = done[0]; const end = today(); let cur = 0, best = 0;
    for (let i = 0; i < 4000 && day <= end; i++) {
      const wd = DateUtil.parse(day).getDay();
      if (set.has(wd)) { if (doneOn(h, day)) { cur++; if (cur > best) best = cur; } else cur = 0; }
      day = DateUtil.addDays(day, 1);
    }
    return best;
  }
  function completion30(h) {
    const set = activeSet(h);
    const active = DateUtil.lastNDays(30).filter((d) => set.has(DateUtil.parse(d).getDay()));
    if (!active.length) return 0;
    const done = active.filter((d) => doneOn(h, d)).length;
    return Math.round((done / active.length) * 100);
  }

  // fija la cantidad de hoy y gestiona XP según se complete o no el día
  function applyDay(h, n) {
    const key = today();
    const target = tgt(h);
    n = Math.max(0, Math.min(target, n));
    const was = doneToday(h);
    if (target === 1) { if (n >= 1) h.history[key] = true; else delete h.history[key]; }
    else { if (n > 0) h.history[key] = n; else delete h.history[key]; }
    const now = doneToday(h);

    if (now && !was) {
      Audio.play("complete");
      const bonus = streak(h) >= 7 ? 6 : 0;
      const gain = 12 + bonus;
      h.xpEarned = (h.xpEarned || 0) + gain;
      Gami.award(gain, bonus ? "Hábito + racha 🔥" : "Hábito completado");
    } else if (!now && was) {
      Audio.play("tap");
      h.xpEarned = Math.max(0, (h.xpEarned || 0) - 12);
      Gami.remove(12);
      Store.commit();
    } else {
      Audio.play(n > 0 ? "coin" : "tap");
      Store.commit();
    }
    render(document.getElementById("view-habits"));
    N.App && N.App.refreshTop();
  }

  function toggleCheck(h) { applyDay(h, doneToday(h) ? 0 : tgt(h)); }
  function setBox(h, i) {
    const cur = dayVal(h, today());
    applyDay(h, (i + 1 <= cur) ? i : i + 1); // clic en lleno = quitar desde ahí; en vacío = llenar hasta ahí
  }

  function addOrEdit(existing) {
    const formEl = UI.form([
      { name: "name", label: "Nombre del hábito", value: existing ? existing.name : "", placeholder: "Beber agua", required: true },
      { name: "icon", label: "Ícono", type: "select", value: existing ? existing.icon : "✦", options: ICONS },
      { type: "row", fields: [
        { name: "count", label: "Meta diaria (nº de veces)", type: "number", min: 1, step: 1, value: existing ? tgt(existing) : 1 },
        { name: "unit", label: "Unidad (opcional)", value: existing ? existing.unit || "" : "", placeholder: "vasos, páginas…" }
      ]},
      { name: "priority", label: "Prioridad (color)", type: "select", value: existing ? prioOf(existing) : "medium", options: [
        { value: "high", label: "🔴 Alta" }, { value: "medium", label: "🟡 Media" }, { value: "low", label: "🔵 Baja" }
      ]},
      { name: "days", label: "Días activos", type: "weekdays", value: existing ? activeDays(existing) : ALL_DAYS }
    ], (data) => {
      const cnt = Math.max(1, Math.min(MAX_BOXES, parseInt(data.count, 10) || 1));
      let days = typeof data.days === "string" ? data.days.split(",").filter((x) => x !== "").map(Number) : (Array.isArray(data.days) ? data.days : []);
      if (!days.length) days = ALL_DAYS.slice();
      if (existing) {
        existing.name = data.name; existing.icon = data.icon; existing.count = cnt; existing.unit = data.unit; existing.days = days; existing.priority = data.priority;
        delete existing.target;
        toast({ icon: "✏️", msg: "Hábito actualizado" });
      } else {
        const maxOrder = habits().reduce((m, h) => Math.max(m, h.order || 0), -1);
        habits().push({ id: Store.uid(), name: data.name, icon: data.icon, count: cnt, unit: data.unit, days: days, priority: data.priority, order: maxOrder + 1, history: {}, created: today(), xpEarned: 5 });
        Audio.play("add");
        toast({ icon: "✦", title: "Nuevo hábito", msg: data.name });
        Gami.award(5, "Nuevo hábito creado");
      }
      Store.commit();
      UI.closeModal();
      render(document.getElementById("view-habits"));
      N.App && N.App.refreshTop();
    }, existing ? "Guardar cambios" : "Crear hábito");

    const wrap = el("div", {}, [
      el("div", { class: "insight info", style: "margin-bottom:14px" }, [
        el("span", { class: "ico", text: "🔢" }),
        el("div", { class: "txt", html: "Si la <b>meta diaria</b> es mayor que 1, aparecerán esos cuadritos para rellenar durante el día (p. ej. 8 vasos = 8 cuadritos). El hábito solo se completa al llenarlos <b>todos</b>." })
      ]),
      formEl
    ]);
    UI.openModal(existing ? "Editar hábito" : "Nuevo hábito", wrap);
  }

  function remove(h) {
    UI.confirmBox("Eliminar hábito", `¿Eliminar "${h.name}"? Se perderá su historial.`, () => {
      const arr = habits();
      arr.splice(arr.indexOf(h), 1);
      Audio.play("delete");
      if (h.xpEarned) Gami.remove(h.xpEarned); else Store.commit(); // devolver la XP ganada
      render(document.getElementById("view-habits"));
      N.App && N.App.refreshTop();
    }, "Eliminar");
  }

  function addToCalendar(h) {
    N.CalExport.open({
      title: h.name,
      details: "Hábito diario en OCTANAJE" + (tgt(h) > 1 ? " · meta " + tgt(h) + " " + (h.unit || "veces") : ""),
      dateKey: today(),
      recur: "RRULE:FREQ=DAILY"
    });
  }

  // ---------- stats para dashboard ----------
  function todayProgress() {
    const arr = habits().filter(activeToday); // solo los programados para hoy
    if (!arr.length) return { done: 0, total: 0, pct: 0 };
    const done = arr.filter(doneToday).length;
    return { done, total: arr.length, pct: Math.round((done / arr.length) * 100) };
  }
  function weeklySeries() {
    const days = DateUtil.lastNDays(7);
    return {
      labels: days.map((d) => DateUtil.weekday(d)),
      values: days.map((d) => habits().filter((h) => doneOn(h, d)).length)
    };
  }

  function render(container) {
    const arr = habits();
    const prog = todayProgress();
    container.innerHTML = "";

    const head = el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [N.Icons.node("clock"), "Hábitos"]),
        el("p", { class: "view-desc", text: "Marca tus cuadritos, mantén tu racha y suma XP cada día." })
      ]),
      el("button", { class: "btn primary", onclick: () => addOrEdit(null) }, [el("span", { text: "＋" }), "Nuevo hábito"])
    ]);
    container.appendChild(head);

    const summary = el("div", { class: "grid cols-3 mb-16" }, [
      statCard("Hoy", `${prog.done}/${prog.total}`, "completados", "accent"),
      statCard("Cumplimiento", fmt.pct(prog.pct), "del día", prog.pct >= 100 ? "good" : "warn"),
      statCard("Hábitos activos", arr.length + "", "en seguimiento", "accent")
    ]);
    container.appendChild(summary);

    const chartCard = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Hábitos completados · últimos 7 días"])])
    ]);
    const cv = el("canvas");
    chartCard.appendChild(el("div", { class: "chart-box" }, [cv]));
    container.appendChild(chartCard);
    setTimeout(() => Charts.bars(cv, { labels: weeklySeries().labels, series: [{ values: weeklySeries().values, color: "--accent" }] }, { height: 170 }), 30);

    if (!arr.length) {
      container.appendChild(el("div", { class: "card" }, [
        el("div", { class: "empty" }, [el("span", { class: "big", text: "✦" }), el("div", { text: "Aún no tienes hábitos. ¡Crea el primero!" })])
      ]));
      return;
    }

    const ordered = sortedHabits();
    const list = el("div", { class: "grid cols-2" });
    ordered.forEach((h, i) => list.appendChild(habitCard(h, i, ordered.length)));
    container.appendChild(list);
  }

  function statCard(label, val, sub, cls) {
    return el("div", { class: "card" }, [
      el("div", { class: "kpi" }, [
        el("div", { class: "kpi-lbl", text: label }),
        el("div", { class: "kpi-val " + (cls || ""), text: val }),
        el("div", { class: "kpi-sub", text: sub })
      ])
    ]);
  }

  function habitCard(h, idx, total) {
    const st = streak(h);
    const done = doneToday(h);
    const comp = completion30(h);
    const target = tgt(h);
    const cur = dayVal(h, today());
    const active = activeToday(h);
    const pr = HPRIO[prioOf(h)];

    // heatmap 35 días (completo = brillante, parcial = tenue)
    const heat = el("div", { class: "heat mt-8" });
    DateUtil.lastNDays(35).forEach((d) => {
      const cell = el("i", { title: DateUtil.label(d) });
      if (doneOn(h, d)) cell.classList.add("l3");
      else if (dayVal(h, d) > 0) cell.classList.add("l1");
      heat.appendChild(cell);
    });

    const card = el("div", {
      class: "card habit-prio" + (active ? "" : " habit-off"),
      style: "--prio-color:" + pr.color
    }, [
      el("div", { class: "flex items-center gap-12" }, [
        el("div", { class: "flex", style: "flex-direction:column;gap:2px;flex:none" }, [
          el("button", { class: "icon-btn sm", title: "Subir", disabled: idx === 0, style: idx === 0 ? "opacity:.3;cursor:default" : "", onclick: () => idx > 0 && moveHabit(h, -1), html: "▲" }),
          el("button", { class: "icon-btn sm", title: "Bajar", disabled: idx === total - 1, style: idx === total - 1 ? "opacity:.3;cursor:default" : "", onclick: () => idx < total - 1 && moveHabit(h, 1), html: "▼" })
        ]),
        el("button", {
          class: "check" + (done ? " on" : "") + (active ? "" : " check-off"),
          title: !active ? "Hoy descansa" : (done ? "Marcar como no hecho" : "Completar hoy"),
          onclick: () => { if (!active) { Audio.play("tap"); toast({ icon: "💤", msg: "Hoy este hábito descansa (" + daysLabel(h) + ")" }); return; } toggleCheck(h); },
          html: !active ? "💤" : (done ? "✓" : (target > 1 ? String(cur) : ""))
        }),
        el("div", { class: "item-main" }, [
          el("div", { class: "item-title" }, [el("span", { text: h.icon + " " }), h.name]),
          el("div", { class: "item-meta" }, [
            el("span", { class: "chip " + pr.chip, html: "● " + pr.label }),
            el("span", { class: "chip warn", html: "🔥 " + st + " día" + (st === 1 ? "" : "s") }),
            el("span", { class: "chip", html: "📆 " + daysLabel(h) }),
            !active ? el("span", { class: "chip", text: "💤 hoy descansa" }) : null,
            target > 1 ? el("span", { class: "chip accent", text: "🎯 " + target + " " + (h.unit || "/día") }) : null
          ])
        ]),
        el("div", { class: "flex gap-8" }, [
          el("button", { class: "icon-btn", title: "Recordatorio diario en Google Calendar", onclick: () => addToCalendar(h), html: "📅" }),
          el("button", { class: "icon-btn", title: "Editar", onclick: () => addOrEdit(h), html: "✏️" }),
          el("button", { class: "icon-btn", title: "Eliminar", onclick: () => remove(h), html: "🗑️" })
        ])
      ])
    ]);

    // cuadritos de meta diaria (solo si hoy está activo)
    if (target > 1 && active) {
      const boxes = el("div", { class: "hboxes mt-16" });
      for (let i = 0; i < target; i++) {
        boxes.appendChild(el("button", {
          class: "hbox" + (i < cur ? " on" : ""),
          title: (i + 1) + " de " + target,
          onclick: () => setBox(h, i)
        }));
      }
      card.appendChild(boxes);
      card.appendChild(el("div", { class: "flex items-center justify-between fs-12 mt-8" }, [
        el("span", { class: "text-dim", text: `${cur}/${target} ${h.unit || ""}`.trim() }),
        el("span", { class: "fw-700 " + (cur >= target ? "text-good" : "text-warn"), text: pctToday(h) + "%" })
      ]));
    }

    // cumplimiento 30 días
    card.appendChild(el("div", { class: "flex items-center justify-between mt-16", style: "margin-bottom:6px" }, [
      el("span", { class: "fs-12 text-dim", text: "Cumplimiento 30 días" }),
      el("span", { class: "fs-12 fw-700 text-accent", text: fmt.pct(comp) })
    ]));
    card.appendChild(el("div", { class: "progress" + (comp >= 70 ? " good" : "") }, [el("span", { style: `width:${comp}%` })]));
    card.appendChild(heat);

    return card;
  }

  N.Habits = { render, todayProgress, weeklySeries, streak, activeOn, daysLabel };
})();


/* ===== assets/js/modules/finance.js ===== */
/* =====================================================================
   OCTANAJE · Módulo Finanzas con IA
   Motor de análisis por reglas: detecta patrones, sobregasto, tasa de
   ahorro, proyecciones y genera recomendaciones personalizadas.
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;
  const { el, fmt, toast } = UI;
  const DateUtil = Store.DateUtil;

  const EXPENSE_CATS = [
    "Comida", "Restaurantes", "Supermercado", "Transporte", "Combustible", "Vivienda",
    "Servicios", "Internet/Teléfono", "Ocio", "Viajes", "Salud", "Deporte", "Compras",
    "Ropa", "Tecnología", "Hogar", "Educación", "Suscripciones", "Mascotas", "Hijos",
    "Belleza", "Regalos", "Impuestos", "Seguros", "Deudas", "Ahorro/Inversión", "Donaciones", "Comisiones", "Otros"
  ];
  const INCOME_CATS = [
    "Salario", "Freelance", "Negocio", "Inversiones", "Dividendos", "Alquiler",
    "Intereses", "Bonos", "Reembolso", "Beca", "Pensión", "Regalo", "Ventas", "Otros"
  ];
  const CAT_ICON = {
    // gastos
    Comida: "🍔", Restaurantes: "🍽️", Supermercado: "🛒", Transporte: "🚗", Combustible: "⛽",
    Vivienda: "🏠", Servicios: "💡", "Internet/Teléfono": "📶", Ocio: "🎮", Viajes: "✈️",
    Salud: "🩺", Deporte: "🏋️", Compras: "🛍️", Ropa: "👕", Tecnología: "💻", Hogar: "🛋️",
    Educación: "📖", Suscripciones: "📺", Mascotas: "🐾", Hijos: "🧸", Belleza: "💅",
    Regalos: "🎁", Impuestos: "🧾", Seguros: "🛡️", Deudas: "💳", "Ahorro/Inversión": "🏦",
    Donaciones: "🤝", Comisiones: "🏷️",
    // ingresos
    Salario: "💼", Freelance: "🧑‍💻", Negocio: "🏢", Inversiones: "📈", Dividendos: "💹",
    Alquiler: "🔑", Intereses: "🪙", Bonos: "🎯", Reembolso: "↩️", Beca: "🎓", Pensión: "👴",
    Regalo: "🎁", Ventas: "🏷️",
    Otros: "•"
  };

  function fin() { return Store.get().finance; }
  function txs() { return fin().transactions; }

  function inMonth(t, mk) { return t.date.slice(0, 7) === (mk || DateUtil.monthKey()); }
  function sum(list) { return list.reduce((s, t) => s + t.amount, 0); }

  function monthIncome(mk) { return sum(txs().filter((t) => t.type === "income" && inMonth(t, mk))); }
  function monthExpense(mk) { return sum(txs().filter((t) => t.type === "expense" && inMonth(t, mk))); }
  function monthBalance(mk) { return monthIncome(mk) - monthExpense(mk); }

  function expenseByCategory(mk) {
    const map = {};
    txs().filter((t) => t.type === "expense" && inMonth(t, mk)).forEach((t) => { map[t.category] = (map[t.category] || 0) + t.amount; });
    return Object.keys(map).map((k) => ({ label: k, value: map[k] })).sort((a, b) => b.value - a.value);
  }

  function last6Months() {
    const out = [];
    const now = new Date();
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const mk = DateUtil.monthKey(d);
      out.push({ mk, label: d.toLocaleDateString("es-MX", { month: "short" }), income: monthIncome(mk), expense: monthExpense(mk) });
    }
    return out;
  }

  // gastos e ingresos por día de un mes (offset 0 = mes actual, -1 = anterior…)
  function dailyForMonth(offset) {
    const base = new Date();
    const y = base.getFullYear(), mo = base.getMonth() + (offset || 0);
    const first = new Date(y, mo, 1);
    const yy = first.getFullYear(), mm = first.getMonth();
    const days = new Date(yy, mm + 1, 0).getDate();
    const labels = [], income = [], expense = [];
    for (let d = 1; d <= days; d++) {
      const key = DateUtil.key(new Date(yy, mm, d));
      labels.push(String(d));
      income.push(sum(txs().filter((t) => t.type === "income" && t.date === key)));
      expense.push(sum(txs().filter((t) => t.type === "expense" && t.date === key)));
    }
    return { labels, income, expense };
  }

  // fecha legible con día de la semana: "mié, 9 jul"
  function niceDate(key) {
    const d = DateUtil.parse(key);
    const now = new Date();
    const opts = d.getFullYear() === now.getFullYear()
      ? { weekday: "short", day: "numeric", month: "short" }
      : { day: "numeric", month: "short", year: "numeric" };
    return d.toLocaleDateString("es-MX", opts);
  }

  // vista de la gráfica de tendencia: "days" | "months"
  let trendMode = "days";
  let dayMonthOffset = 0;   // 0 = mes actual, -1 = mes anterior, …
  function trendSegBtn(mode, label, container) {
    const b = el("button", { text: label, onclick: () => { trendMode = mode; Audio.play("tab"); render(container); } });
    if (trendMode === mode) b.classList.add("on");
    return b;
  }

  // ---------------------------------------------------------------
  //  INGRESOS Y GASTOS — medidor radial combinado (reemplaza el
  //  antiguo "gastos por categoría"), con temporalidad seleccionable.
  // ---------------------------------------------------------------
  let iePeriod = "monthly"; // "daily" | "weekly" | "biweekly" | "monthly"

  function periodRange(period) {
    const to = DateUtil.todayKey();
    let from, label;
    if (period === "daily") { from = to; label = "hoy"; }
    else if (period === "weekly") { from = DateUtil.addDays(to, -6); label = "últimos 7 días"; }
    else if (period === "biweekly") { from = DateUtil.addDays(to, -14); label = "últimos 15 días"; }
    else { from = DateUtil.monthKey() + "-01"; label = "este mes"; }
    return { from, to, label };
  }

  function periodTotals(period) {
    const r = periodRange(period);
    const list = txs().filter((t) => t.date >= r.from && t.date <= r.to);
    return {
      income: sum(list.filter((t) => t.type === "income")),
      expense: sum(list.filter((t) => t.type === "expense")),
      label: r.label
    };
  }

  function ieLegendRow(idx, label, val, maxV, colorVar) {
    const pct = maxV > 0 ? Math.round((val / maxV) * 100) : 0;
    const cvar = "var(" + colorVar + ")";
    return el("div", { class: "flex items-center gap-12", style: "padding:6px 0" }, [
      el("div", { style: "width:34px;height:34px;flex:none;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:13px;color:#04122b;background:" + cvar + ";box-shadow:0 0 12px " + cvar }, [
        el("span", { text: "0" + idx })
      ]),
      el("div", { class: "item-main" }, [
        el("div", { class: "item-title", style: "font-size:14px", text: label }),
        el("div", { class: "text-faint fs-12", text: fmt.money(val) })
      ]),
      el("div", { style: "font-size:20px;font-weight:800;color:" + cvar, text: pct + "%" })
    ]);
  }

  function incomeExpenseCard(rerender) {
    const t = periodTotals(iePeriod);
    const maxV = Math.max(t.income, t.expense, 1);
    const bal = t.income - t.expense;

    function segBtn(mode, label) {
      const b = el("button", { text: label, onclick: () => { iePeriod = mode; Audio.play("tab"); rerender(); } });
      if (iePeriod === mode) b.classList.add("on");
      return b;
    }

    const card = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head", style: "flex-wrap:wrap;gap:8px" }, [
        el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Ingresos y gastos · " + t.label]),
        el("div", { class: "seg" }, [
          segBtn("daily", "Diario"), segBtn("weekly", "Semanal"), segBtn("biweekly", "Quincenal"), segBtn("monthly", "Mensual")
        ])
      ])
    ]);
    const cv = el("canvas");
    const legend = el("div", { style: "flex:1;min-width:200px;display:flex;flex-direction:column;gap:10px;justify-content:center" }, [
      ieLegendRow(1, "Ingresos", t.income, maxV, "--good"),
      ieLegendRow(2, "Gastos", t.expense, maxV, "--bad")
    ]);
    card.appendChild(el("div", { class: "flex", style: "gap:22px;align-items:center;flex-wrap:wrap" }, [
      el("div", { style: "flex:1;min-width:200px;display:flex;justify-content:center" }, [cv]),
      legend
    ]));
    card.appendChild(el("div", { class: "fs-12 text-faint mt-8", text: (bal >= 0 ? "Balance positivo de " : "Déficit de ") + fmt.money(Math.abs(bal)) + " en el periodo." }));
    setTimeout(() => {
      Charts.multiRing(cv, [
        { pct: (t.income / maxV) * 100, color: "--good" },
        { pct: (t.expense / maxV) * 100, color: "--bad" }
      ], { size: 210, centerLabel: fmt.money(bal), centerSub: "balance" });
    }, 30);
    return card;
  }

  // ---------------------------------------------------------------
  //  MOTOR DE IA — genera insights a partir de los datos
  // ---------------------------------------------------------------
  function analyze() {
    const insights = [];
    const inc = monthIncome(), exp = monthExpense(), bal = inc - exp;
    const f = fin();
    const cats = expenseByCategory();
    const months = last6Months();
    const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
    const today = new Date().getDate();

    if (inc === 0 && exp === 0) {
      insights.push({ type: "info", icon: "🤖", txt: "Registra tus ingresos y gastos y analizaré tus finanzas al instante: tasa de ahorro, sobregastos, proyecciones y recomendaciones." });
      return { insights, score: null };
    }

    // 1) Tasa de ahorro
    if (inc > 0) {
      const rate = (bal / inc) * 100;
      if (rate >= 20) insights.push({ type: "good", icon: "💎", txt: `Excelente: ahorras el <b>${Math.round(rate)}%</b> de tus ingresos este mes. Estás por encima de la regla del 20%.` });
      else if (rate >= 0) insights.push({ type: "warn", icon: "📊", txt: `Tu tasa de ahorro es del <b>${Math.round(rate)}%</b>. Apunta al 20% (regla 50/30/20): recorta gastos no esenciales unos ${fmt.money(inc * 0.2 - bal)}.` });
      else insights.push({ type: "bad", icon: "🚨", txt: `Alerta: gastas <b>${fmt.money(-bal)}</b> más de lo que ingresas. Revisa las categorías más altas para equilibrar tu mes.` });
    }

    // 2) Categoría dominante
    if (cats.length && exp > 0) {
      const top = cats[0];
      const share = (top.value / exp) * 100;
      if (share > 40) insights.push({ type: "warn", icon: CAT_ICON[top.label] || "⚠️", txt: `<b>${top.label}</b> concentra el <b>${Math.round(share)}%</b> de tus gastos (${fmt.money(top.value)}). Es tu mayor oportunidad de ahorro.` });
      else insights.push({ type: "info", icon: CAT_ICON[top.label] || "📌", txt: `Tu mayor gasto es <b>${top.label}</b> con ${fmt.money(top.value)} (${Math.round(share)}%). Gasto bien distribuido.` });
    }

    // 3) Proyección fin de mes (ritmo de gasto)
    if (exp > 0 && today > 2) {
      const dailyRate = exp / today;
      const projected = dailyRate * daysInMonth;
      if (f.budget > 0) {
        if (projected > f.budget) insights.push({ type: "bad", icon: "📈", txt: `A este ritmo gastarás ~<b>${fmt.money(projected)}</b> este mes, superando tu presupuesto de ${fmt.money(f.budget)} en ${fmt.money(projected - f.budget)}.` });
        else insights.push({ type: "good", icon: "✅", txt: `Vas bien: proyección de ~<b>${fmt.money(projected)}</b>, dentro de tu presupuesto de ${fmt.money(f.budget)}.` });
      } else {
        insights.push({ type: "info", icon: "🔮", txt: `Según tu ritmo, cerrarás el mes con ~<b>${fmt.money(projected)}</b> en gastos. Define un presupuesto para recibir alertas.` });
      }
    }

    // 4) Tendencia vs mes anterior
    if (months.length >= 2) {
      const prev = months[months.length - 2], cur = months[months.length - 1];
      if (prev.expense > 0) {
        const chg = ((cur.expense - prev.expense) / prev.expense) * 100;
        if (chg > 15) insights.push({ type: "warn", icon: "⬆️", txt: `Tus gastos subieron un <b>${Math.round(chg)}%</b> respecto al mes pasado. Vigila el ritmo.` });
        else if (chg < -10) insights.push({ type: "good", icon: "⬇️", txt: `¡Bien! Redujiste tus gastos un <b>${Math.round(-chg)}%</b> frente al mes anterior.` });
      }
    }

    // 5) Suscripciones
    const subs = cats.find((c) => c.label === "Suscripciones");
    if (subs && subs.value > 0 && inc > 0 && subs.value / inc > 0.1) {
      insights.push({ type: "warn", icon: "📺", txt: `Gastas ${fmt.money(subs.value)} en suscripciones (${Math.round((subs.value / inc) * 100)}% de tus ingresos). Cancela las que no uses.` });
    }

    // 6) Meta de ahorro
    if (f.savingGoal > 0) {
      if (bal >= f.savingGoal) insights.push({ type: "good", icon: "🎯", txt: `¡Meta de ahorro cumplida! Guardaste ${fmt.money(bal)} de los ${fmt.money(f.savingGoal)} objetivo.` });
      else insights.push({ type: "info", icon: "🎯", txt: `Te faltan <b>${fmt.money(f.savingGoal - bal)}</b> para tu meta de ahorro mensual de ${fmt.money(f.savingGoal)}.` });
    }

    // 7) Fondo de emergencia (consejo educativo)
    if (bal > 0) {
      insights.push({ type: "info", icon: "🛡️", txt: `Consejo: destina parte de tus ${fmt.money(bal)} de balance a un fondo de emergencia (meta: 3-6 meses de gastos).` });
    }

    // ---- Salud financiera (score 0-100) ----
    let score = 50;
    if (inc > 0) {
      const rate = (bal / inc) * 100;
      score = 50 + Math.max(-40, Math.min(40, rate));            // ahorro
      if (cats.length && (cats[0].value / (exp || 1)) > 0.45) score -= 8; // concentración
      if (f.budget > 0 && exp <= f.budget) score += 8;
    }
    score = Math.round(Math.max(0, Math.min(100, score)));

    return { insights, score };
  }

  function addTx(type) {
    const cats = type === "income" ? INCOME_CATS : EXPENSE_CATS;
    const body = UI.form([
      { type: "row", fields: [
        { name: "amount", label: "Monto", type: "number", min: 0, step: "0.01", placeholder: "0.00", required: true },
        { name: "category", label: "Categoría", type: "select", options: cats, value: cats[0] }
      ]},
      { name: "note", label: "Nota (opcional)", placeholder: type === "income" ? "Pago de nómina" : "Supermercado" },
      { name: "date", label: "Fecha", type: "date", value: DateUtil.todayKey(), required: true }
    ], (data) => {
      if (!data.amount || data.amount <= 0) { Audio.play("error"); toast({ icon: "⚠️", msg: "Ingresa un monto válido" }); return; }
      const xp = type === "income" ? 8 : 5;
      txs().push({ id: Store.uid(), type, amount: Number(data.amount), category: data.category, note: data.note, date: data.date, xpEarned: xp });
      Store.commit();
      Audio.play(type === "income" ? "money" : "coin");
      Gami.award(xp, type === "income" ? "Ingreso registrado" : "Gasto registrado");
      UI.closeModal();
      render(document.getElementById("view-finance"));
      N.App && N.App.refreshTop();
    }, type === "income" ? "Registrar ingreso" : "Registrar gasto");
    UI.openModal(type === "income" ? "＋ Nuevo ingreso" : "－ Nuevo gasto", body);
  }

  function removeTx(t) {
    UI.confirmBox("Eliminar movimiento", `¿Eliminar este ${t.type === "income" ? "ingreso" : "gasto"} de ${fmt.money(t.amount)}?`, () => {
      const arr = txs();

  // ---------------------------------------------------------------
  //  AHORRO (alcancía)
  // ---------------------------------------------------------------
  function savings() { const f = fin(); if (!Array.isArray(f.savings)) f.savings = []; return f.savings; }
  function savingsBalance() { return savings().reduce((s, e) => s + e.amount, 0); }
  function savingsToday() { const k = DateUtil.todayKey(); return savings().filter((e) => e.date === k).reduce((s, e) => s + e.amount, 0); }
  function savingsMonth(mk) { mk = mk || DateUtil.monthKey(); return savings().filter((e) => e.date.slice(0, 7) === mk).reduce((s, e) => s + e.amount, 0); }
  function savingsTargetVal() { return Number(fin().savingsTarget) || 0; }
  function savingsPct() { const t = savingsTargetVal(); return t > 0 ? Math.min(100, Math.round((savingsBalance() / t) * 100)) : 0; }

  function resetSavings() {
    UI.confirmBox("Reiniciar conteo de ahorro", "Tu ahorro volverá a $0 y se borrará el historial de movimientos. La meta se conserva. ¿Continuar?", () => {
      const xp = savings().reduce((s, e) => s + (e.xpEarned || 0), 0);
      fin().savings = [];
      Audio.play("delete");
      if (xp) Gami.remove(xp); else Store.commit();
      toast({ icon: "🔄", msg: "Conteo de ahorro reiniciado" });
      openSavings();
      render(document.getElementById("view-finance"));
      N.App && N.App.refreshTop();
    }, "Reiniciar");
  }

  function removeSaving(e) {
    const arr = savings(); arr.splice(arr.indexOf(e), 1);
    Audio.play("delete");
    if (e.xpEarned) Gami.remove(e.xpEarned); else Store.commit();
    openSavings();
    render(document.getElementById("view-finance"));
    N.App && N.App.refreshTop();
  }

  function openSavings() {
    const amountI = el("input", { class: "input", type: "number", min: 0, step: "0.01", placeholder: "0.00" });
    const noteI = el("input", { class: "input", placeholder: "Nota (opcional)" });
    const metaI = el("input", { class: "input", type: "number", min: 0, placeholder: "0", value: savingsTargetVal() || "" });
    function apply(sign) {
      const amt = Number(amountI.value) || 0;
      if (amt <= 0) { Audio.play("error"); toast({ icon: "⚠️", msg: "Ingresa un monto válido" }); return; }
      const entry = { id: Store.uid(), amount: sign * amt, date: DateUtil.todayKey(), note: noteI.value };
      if (sign > 0) entry.xpEarned = 4;
      savings().push(entry);
      Store.commit();
      Audio.play(sign > 0 ? "money" : "coin");
      if (sign > 0) Gami.award(4, "Ahorro registrado 🐷");
      toast({ icon: "🐷", title: sign > 0 ? "Ahorro agregado" : "Retiro de ahorro", msg: fmt.money(amt) });
      openSavings();
      render(document.getElementById("view-finance"));
      N.App && N.App.refreshTop();
    }
    function saveMeta() {
      fin().savingsTarget = Number(metaI.value) || 0;
      Store.commit();
      Audio.play("coin");
      toast({ icon: "🎯", msg: "Meta de ahorro actualizada" });
      openSavings();
      render(document.getElementById("view-finance"));
    }
    const target = savingsTargetVal(), pct = savingsPct(), bal = savingsBalance();
    const balanceCard = el("div", { class: "card", style: "text-align:center;margin-bottom:14px" }, [
      el("div", { class: "kpi-lbl", text: "Ahorro actual" }),
      el("div", { class: "kpi-val", style: "color:#22c3ff;font-size:34px", text: fmt.money(bal) }),
      el("div", { class: "kpi-sub", text: "Hoy " + fmt.money(savingsToday()) })

    if (target > 0) {
      balanceCard.appendChild(el("div", { class: "flex items-center justify-between fs-12", style: "margin:12px 0 6px" }, [
        el("span", { class: "text-dim", text: "Meta" }),
        el("span", { class: "fw-700", text: fmt.money(bal) + " / " + fmt.money(target) + " (" + pct + "%)" })
      ]));
      balanceCard.appendChild(el("div", { class: "progress good" }, [el("span", { style: "width:" + pct + "%" })]));
    }
    const body = el("div", {}, [
      balanceCard,
      el("div", { class: "field" }, [el("label", { text: "Monto" }), amountI]),
      el("div", { class: "field" }, [el("label", { text: "Nota (opcional)" }), noteI]),
      el("div", { class: "row" }, [
        el("button", { class: "btn income", type: "button", html: "＋ Agregar", onclick: () => apply(1) }),
        el("button", { class: "btn expense", type: "button", html: "－ Quitar", onclick: () => apply(-1) })

      el("div", { class: "field", style: "margin-top:14px" }, [
        el("label", { text: "🎯 Meta de ahorro" }),

    ]);
    const hist = savings().slice().sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id)).slice(0, 12);
    if (hist.length) {
      body.appendChild(el("div", { class: "card-title", style: "margin:16px 0 8px" }, [el("span", { class: "dot" }), "Movimientos de ahorro"]));
      hist.forEach((s) => body.appendChild(el("div", { class: "item", style: "padding:10px 12px" }, [

        ]),

        el("button", { class: "icon-btn", html: "🗑️", title: "Eliminar", onclick: () => removeSaving(s) })
      ])));

      ]));
      card.appendChild(el("div", { class: "progress good" }, [el("span", { style: "width:" + pct + "%" })]));
    }
    const cv = el("canvas");
    card.appendChild(el("div", { class: "chart-box mt-16" }, [cv]));
    card.appendChild(el("div", { class: "fs-12 text-faint mt-8", text: "Ahorro acumulado día a día (se reinicia manualmente)." }));
    setTimeout(() => {
      const now = new Date(), y = now.getFullYear(), mo = now.getMonth();
      const days = new Date(y, mo + 1, 0).getDate();
      const labels = [], vals = []; let cum = 0;
      for (let d = 1; d <= days; d++) {
        const key = DateUtil.key(new Date(y, mo, d));
        cum += savings().filter((s) => s.date === key).reduce((a, s) => a + s.amount, 0);
        labels.push(String(d)); vals.push(Math.max(0, cum));
      }
      Charts.line(cv, { labels: labels, values: vals }, { height: 160, color: "--accent" });
    }, 40);
    return card;
  }

  function paintQuotes(rates) {
    if (!mktCache) mktCache = {};
    const set = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; mktCache[id] = val; };
    const usdmxn = rates.MXN, eurmxn = rates.MXN / rates.EUR;
    set("q-usdmxn", "$" + usdmxn.toFixed(3));
    set("q-eurmxn", "$" + eurmxn.toFixed(3));

/* =====================================================================
   OCTANAJE · Módulo Tareas
   ===================================================================== */
(function () {
  "use strict";
  const N = window.NEXUS;
  const { Store, UI, Audio, Gami, Charts } = N;
  const { el, fmt, toast } = UI;
  const DateUtil = Store.DateUtil;

  const PRIO = { high: { label: "Alta", chip: "bad", xp: 15 }, medium: { label: "Media", chip: "warn", xp: 10 }, low: { label: "Baja", chip: "accent", xp: 6 } };

  function tasks() { return Store.get().tasks; }
  let filter = "active";

  function completeTask(t) {
    t.done = !t.done;
    if (t.done) {
      t.doneAt = DateUtil.todayKey();
      t.xpEarned = (t.xpEarned || 0) + PRIO[t.priority].xp;
      Audio.play("complete");
      Gami.award(PRIO[t.priority].xp, "Tarea completada");
    } else {
      Audio.play("tap");
      t.xpEarned = Math.max(0, (t.xpEarned || 0) - PRIO[t.priority].xp);
      Gami.remove(PRIO[t.priority].xp);
      Store.commit();
    }
    render(document.getElementById("view-tasks"));
    N.App && N.App.refreshTop();
  }

  function toggleSub(t, sub) {
    sub.done = !sub.done;
    Audio.play(sub.done ? "coin" : "tap");
    // completar automáticamente si todas las subtareas están hechas
    if (t.subtasks.length && t.subtasks.every((s) => s.done) && !t.done) { completeTask(t); return; }
    Store.commit();
    render(document.getElementById("view-tasks"));
  }

  function addOrEdit(existing) {
    const body = UI.form([
      { name: "title", label: "Tarea", value: existing ? existing.title : "", placeholder: "Terminar informe mensual", required: true },
      { type: "row", fields: [
        { name: "priority", label: "Prioridad", type: "select", value: existing ? existing.priority : "medium", options: [
          { value: "high", label: "🔴 Alta" }, { value: "medium", label: "🟡 Media" }, { value: "low", label: "🔵 Baja" }
        ]},
        { name: "due", label: "Fecha límite", type: "date", value: existing ? existing.due || "" : "" }
      ]},
      { name: "subtasks", label: "Subtareas (una por línea)", type: "textarea", value: existing ? existing.subtasks.map((s) => s.t).join("\n") : "", placeholder: "Investigar\nRedactar\nRevisar" }
    ], (data) => {
      const subs = (data.subtasks || "").split("\n").map((s) => s.trim()).filter(Boolean).map((t) => ({ t, done: false }));
      if (existing) {
        existing.title = data.title; existing.priority = data.priority; existing.due = data.due;
        // preservar estado de subtareas existentes por texto
        existing.subtasks = subs.map((ns) => { const prev = existing.subtasks.find((os) => os.t === ns.t); return prev || ns; });
        toast({ icon: "✏️", msg: "Tarea actualizada" });
      } else {
        tasks().push({ id: Store.uid(), title: data.title, priority: data.priority, due: data.due, done: false, subtasks: subs, created: DateUtil.todayKey() });
        Audio.play("add");
        toast({ icon: "✓", title: "Nueva tarea", msg: data.title });
      }
      Store.commit();
      UI.closeModal();
      render(document.getElementById("view-tasks"));
    }, existing ? "Guardar" : "Crear tarea",
      (inputs) => N.CalExport.formRow(inputs.title, inputs.due, "Tarea en OCTANAJE"));
    UI.openModal(existing ? "Editar tarea" : "Nueva tarea", body);
  }

  function remove(t) {
    UI.confirmBox("Eliminar tarea", `¿Eliminar "${t.title}"?`, () => {
      const arr = tasks(); arr.splice(arr.indexOf(t), 1);
      Audio.play("delete");
      if (t.xpEarned) Gami.remove(t.xpEarned); else Store.commit(); // devolver la XP ganada
      render(document.getElementById("view-tasks"));
      N.App && N.App.refreshTop();
    }, "Eliminar");
  }

  // ---------- stats ----------
  function stats() {
    const arr = tasks();
    const done = arr.filter((t) => t.done).length;
    const pending = arr.length - done;
    const overdue = arr.filter((t) => !t.done && t.due && t.due < DateUtil.todayKey()).length;
    return { total: arr.length, done, pending, overdue, pct: arr.length ? Math.round((done / arr.length) * 100) : 0 };
  }
  function completed7() {
    const days = DateUtil.lastNDays(7);
    return { labels: days.map((d) => DateUtil.weekday(d)), values: days.map((d) => tasks().filter((t) => t.done && t.doneAt === d).length) };
  }

  function dueLabel(t) {
    if (!t.due) return null;
    const diff = DateUtil.diffDays(t.due, DateUtil.todayKey());
    if (diff < 0) return { text: "Vencida", cls: "bad" };
    if (diff === 0) return { text: "Hoy", cls: "warn" };
    if (diff === 1) return { text: "Mañana", cls: "warn" };
    return { text: DateUtil.label(t.due), cls: "" };
  }

  function render(container) {
    container.innerHTML = "";
    const st = stats();

    const head = el("div", { class: "view-head" }, [
      el("div", {}, [
        el("h1", { class: "view-title" }, [N.Icons.node("tasks"), "Tareas"]),
        el("p", { class: "view-desc", text: "Organiza tu día por prioridad y completa con subtareas." })
      ]),
      el("button", { class: "btn primary", onclick: () => addOrEdit(null), html: "＋ Nueva tarea" })
    ]);
    container.appendChild(head);

    container.appendChild(el("div", { class: "grid cols-4 mb-16" }, [
      kpi("Pendientes", st.pending + "", "por hacer", "accent"),
      kpi("Completadas", st.done + "", "en total", "good"),
      kpi("Vencidas", st.overdue + "", "atrasadas", st.overdue ? "bad" : ""),
      kpi("Progreso", fmt.pct(st.pct), "completado", st.pct >= 70 ? "good" : "warn")
    ]));

    // gráfica
    const chartCard = el("div", { class: "card mb-16" }, [
      el("div", { class: "card-head" }, [el("div", { class: "card-title" }, [el("span", { class: "dot" }), "Tareas completadas · últimos 7 días"])])
    ]);
    const cv = el("canvas");
    chartCard.appendChild(el("div", { class: "chart-box" }, [cv]));
    container.appendChild(chartCard);
    setTimeout(() => Charts.line(cv, completed7(), { height: 160, color: "--good" }), 30);

    // filtros
    const seg = el("div", { class: "seg mb-16" });
    [["active", "Activas"], ["all", "Todas"], ["done", "Hechas"]].forEach(([k, lb]) => {
      seg.appendChild(el("button", { class: filter === k ? "on" : "", text: lb, onclick: () => { filter = k; Audio.play("tab"); render(container); } }));
    });
    container.appendChild(seg);

    // lista
    let arr = tasks().slice();
    if (filter === "active") arr = arr.filter((t) => !t.done);
    if (filter === "done") arr = arr.filter((t) => t.done);
    const order = { high: 0, medium: 1, low: 2 };
    arr.sort((a, b) => (a.done - b.done) || (order[a.priority] - order[b.priority]) || ((a.due || "9999") .localeCompare(b.due || "9999")));

    const listCard = el("div", { class: "card" });
    if (!arr.length) {
      listCard.appendChild(el("div", { class: "empty" }, [el("span", { class: "big", text: "✓" }), el("div", { text: filter === "done" ? "Aún no completas tareas." : "Sin tareas. ¡Añade una!" })]));
    } else {
      arr.forEach((t) => listCard.appendChild(taskItem(t)));
    }
    container.appendChild(listCard);
  }

  function taskItem(t) {
    const p = PRIO[t.priority];
    const due = dueLabel(t);
    const subDone = t.subtasks.filter((s) => s.done).length;

    const overdue = !t.done && t.due && t.due < DateUtil.todayKey();
    const item = el("div", { class: "item" + (t.done ? " done" : "") + (overdue ? " overdue" : ""), style: "flex-direction:column;align-items:stretch" });
    const topRow = el("div", { class: "flex items-center gap-12" }, [
      el("button", { class: "check" + (t.done ? " on" : ""), html: t.done ? "✓" : "", onclick: () => completeTask(t) }),
      el("div", { class: "item-main" }, [
        el("div", { class: "item-title", text: t.title }),
        el("div", { class: "item-meta" }, [
          el("span", { class: "chip " + p.chip, text: p.label }),
          due ? el("span", { class: "chip " + due.cls, text: "📅 " + due.text }) : null,
          t.subtasks.length ? el("span", { class: "text-faint fs-12", text: `${subDone}/${t.subtasks.length} subtareas` }) : null
        ])
      ]),
      el("div", { class: "flex gap-8" }, [
        t.due ? el("button", { class: "icon-btn", html: "📅", title: "Añadir a Google Calendar", onclick: () => N.CalExport.open({ title: t.title, details: "Tarea (prioridad " + p.label + ")", dateKey: t.due }) }) : null,
        el("button", { class: "icon-btn", html: "✏️", title: "Editar", onclick: () => addOrEdit(t) }),
        el("button", { class: "icon-btn", html: "🗑️", title: "Eliminar", onclick: () => remove(t) })
      ])
    ]);
    item.appendChild(topRow);

    if (t.subtasks.length) {
      const subWrap = el("div", { style: "margin:10px 0 2px 42px;display:flex;flex-direction:column;gap:6px" });
      t.subtasks.forEach((s) => {
        subWrap.appendChild(el("div", { class: "flex items-center gap-8", style: "cursor:pointer", onclick: () => toggleSub(t, s) }, [
          el("span", { style: "font-size:14px;color:" + (s.done ? "var(--good)" : "var(--txt-faint)"), text: s.done ? "☑" : "☐" }),
          el("span", { class: "fs-13", style: s.done ? "text-decoration:line-through;color:var(--txt-faint)" : "", text: s.t })
        ]));
      });
      item.appendChild(subWrap);
      const pct = Math.round((subDone / t.subtasks.length) * 100);
      item.appendChild(el("div", { class: "progress", style: "margin-left:42px;width:calc(100% - 42px)" }, [el("span", { style: `width:${pct}%` })]));
    }
    return item;
  }

  function kpi(label, val, sub, cls) {
    return el("div", { class: "card" }, [el("div", { class: "kpi" }, [
      el("div", { class: "kpi-lbl", text: label }), el("div", { class: "kpi-val " + (cls || ""), text: val }), el("div", { class: "kpi-sub", text: sub })
    ])]);
  }

  N.Tasks = { render, stats, completed7 };
})();

  function typeName(v) { const t = TYPES.find((x) => x.value === v); return t ? t.name : (v || "Otro"); }
  function typeEmoji(v) { const t = TYPES.find((x) => x.value === v); return t ? t.icon : "💪"; }

  // ---------- Exportar resumen a PDF (vía impresión del navegador) ----------
  function openPdfModal() {
    const body = el("div", {}, [

      el("button", { class: "btn primary block", style: "margin-bottom:10px", html: "📅 Diario (hoy)", onclick: () => { UI.closeModal(); exportPDF("daily"); } }),
      el("button", { class: "btn block", style: "margin-bottom:10px", html: "🗓️ Semanal (últimos 7 días)", onclick: () => { UI.closeModal(); exportPDF("weekly"); } }),

    ]);
    UI.openModal("📄 Descargar PDF de entrenamiento", body);
  }

  function rangeFor(period) {
    const to = DateUtil.todayKey();
    let from, label;
    if (period === "daily") { from = to; label = "Diario"; }
    else if (period === "weekly") { from = DateUtil.addDays(to, -6); label = "Semanal"; }
    else {
      const d = new Date(); from = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-01"; label = "Mensual";
    }
    return { from: from, to: to, label: label };
  }

  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  function exportPDF(period) {
    const r = rangeFor(period);
    const list = workouts().filter((w) => w.date >= r.from && w.date <= r.to)
      .sort((a, b) => a.date.localeCompare(b.date) || a.id.localeCompare(b.id));

    const totalMin = list.reduce((s, w) => s + (w.duration || 0), 0);
    const totalKcal = list.reduce((s, w) => s + (w.calories || 0), 0);
    const byType = {};
    list.forEach((w) => { byType[w.type] = (byType[w.type] || 0) + 1; });

    const fromLbl = DateUtil.parse(r.from).toLocaleDateString("es-MX", { day: "numeric", month: "long", year: "numeric" });
    const toLbl = DateUtil.parse(r.to).toLocaleDateString("es-MX", { day: "numeric", month: "long", year: "numeric" });

    let rows = "";

      rows = '<tr><td colspan="6" style="text-align:center;color:#888;padding:24px">Sin entrenamientos en este periodo.</td></tr>';

          "<td><b>" + esc(w.name) + "</b></td>" +
          "<td>" + typeEmoji(w.type) + " " + esc(typeName(w.type)) + "</td>" +
          "<td style='text-align:center'>" + (w.duration || 0) + " min</td>" +

    const typeChips = Object.keys(byType).map((k) => typeEmoji(k) + " " + esc(typeName(k)) + ": " + byType[k]).join(" &nbsp;·&nbsp; ") || "—";

    const html = "<!doctype html><html lang='es'><head><meta charset='utf-8'><title>OCTANAJE · Resumen " + r.label + "</title>" +

      ".kpi .n{font-size:24px;font-weight:800;color:#6a5cff}" +
      ".kpi .l{font-size:12px;color:#777;text-transform:uppercase;letter-spacing:1px}" +

      "table{width:100%;border-collapse:collapse;font-size:12.5px}" +
