<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="OCTANAJE - Sistema futurista de productividad personal: hábitos, finanzas con IA, tareas, entrenamientos y metas." />
  <title>OCTANAJE · Productividad Futurista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" />
  <style>
/* =====================================================================
   OCTANAJE · Hoja de estilos futurista
   Temas: dark (oscuro), light (claro), gray (gris)
   ===================================================================== */

/* ------------------- Reset ------------------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* El atributo hidden debe prevalecer sobre cualquier display de autor
   (evita que el modal/overlay o #app queden visibles al cargar). */
[hidden] { display: none !important; }
html, body { height: 100%; }
body {
  font-family: "Segoe UI", "SF Pro Display", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--txt);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  transition: background .5s ease, color .4s ease;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }

/* =====================================================================
   AHORRO DE BATERÍA
   - Cuando la app está en segundo plano (pantalla apagada, cambiaste de
     app, minimizaste el navegador) se pausan TODAS las animaciones CSS
     (brillos, logo, medallas, fondo animado, etc.) para no seguir
     gastando batería sin que nadie esté viendo la pantalla.
   - Si el usuario tiene activado "reducir movimiento" en su sistema
     (accesibilidad / ahorro de batería del propio celular), se respeta
     también y se desactivan las animaciones decorativas por completo.
   ===================================================================== */
html.app-hidden * { animation-play-state: paused !important; }
@media (prefers-reduced-motion: reduce) {
  .bg-grid, .boot-logo, .brand-hex, .brand-name, .boot-title,
  .medal-badge, .medal-mini, .ach-legendary.ach-on, .overdue .chip.bad {
    animation: none !important;
  }
}

/* =====================================================================
   TEMAS
   ===================================================================== */
:root, [data-theme="dark"] {
  --bg: #060814;
  --bg-2: #0b1024;
  --panel: rgba(20, 27, 54, .55);
  --panel-solid: #121a38;
  --panel-2: rgba(28, 37, 71, .6);
  --txt: #e8ecff;
  --txt-dim: #93a0cc;
  --txt-faint: #5e6a94;
  --border: rgba(120, 140, 220, .10);
  --border-strong: rgba(120, 140, 220, .22);
  --accent: #00e5ff;
  --accent-2: #7c5cff;
  --accent-3: #ff2fb0;
  --good: #21e6a4;
  --warn: #ffb020;
  --bad: #ff5470;
  --glow: 0 0 22px rgba(0, 229, 255, .35);
  --shadow: 0 18px 50px rgba(0, 0, 0, .55);
  --grid-line: rgba(90, 120, 220, .09);
  --blur: 16px;
}

/* Claro — tonos suaves con verde pastel, brillo reducido al mínimo para
   que las tarjetas, textos y bordes se distingan con claridad (nada de
   resplandores fuertes ni sombras marcadas). */
[data-theme="light"] {
  --bg: #eef4ee;
  --bg-2: #e3ece2;
  --panel: rgba(255, 255, 255, .82);
  --panel-solid: #ffffff;
  --panel-2: rgba(233, 242, 232, .85);
  --txt: #223226;
  --txt-dim: #5a6e5c;
  --txt-faint: #8a9c8c;
  --border: rgba(70, 120, 80, .16);
  --border-strong: rgba(70, 120, 80, .30);
  --accent: #7fb88a;
  --accent-2: #5fa88f;
  --accent-3: #a3c9a8;
  --good: #4f9d68;
  --warn: #c98a3a;
  --bad: #d1636f;
  --glow: 0 0 6px rgba(95, 168, 143, .18);
  --shadow: 0 8px 20px rgba(80, 110, 90, .10);
  --grid-line: rgba(70, 120, 80, .05);
  --blur: 10px;
}

[data-theme="gray"] {
  --bg: #1c1e22;
  --bg-2: #24272c;
  --panel: rgba(48, 52, 59, .6);
  --panel-solid: #2b2f35;
  --panel-2: rgba(58, 63, 71, .6);
  --txt: #e9ebef;
  --txt-dim: #a7adba;
  --txt-faint: #71767f;
  --border: rgba(180, 190, 205, .08);
  --border-strong: rgba(180, 190, 205, .18);
  --accent: #63d2ff;
  --accent-2: #b39bff;
  --accent-3: #ff8fc4;
  --good: #4fd6a8;
  --warn: #ffbe4d;
  --bad: #ff7a90;
  --glow: 0 0 18px rgba(99, 210, 255, .22);
  --shadow: 0 16px 42px rgba(0, 0, 0, .4);
  --grid-line: rgba(180, 190, 205, .06);
  --blur: 14px;
}

[data-theme="purple"] {
  --bg: #0c0320;
  --bg-2: #17092f;
  --panel: rgba(45, 20, 78, .55);
  --panel-solid: #1c0d38;
  --panel-2: rgba(62, 30, 102, .6);
  --txt: #f2ecff;
  --txt-dim: #c0a9ec;
  --txt-faint: #826bb4;
  --border: rgba(170, 110, 255, .13);
  --border-strong: rgba(170, 110, 255, .26);
  --accent: #b14bff;
  --accent-2: #ff45e0;
  --accent-3: #6a5cff;
  --good: #29e6bd;
  --warn: #ffb648;
  --bad: #ff4d8d;
  --glow: 0 0 24px rgba(177, 75, 255, .45);
  --shadow: 0 18px 52px rgba(18, 0, 40, .62);
  --grid-line: rgba(170, 110, 255, .11);
  --blur: 16px;
}

/* Dark — variante muy oscura dominada por neón rojo brillante e intenso:
   fondo casi negro con matiz rojizo + acentos rojo/naranja muy saturados
   y brillo ampliado en todos los componentes (cards, botones, barras). */
[data-theme="neon"] {
  --bg: #050002;
  --bg-2: #0a0004;
  --panel: rgba(32, 4, 10, .55);
  --panel-solid: #170308;
  --panel-2: rgba(46, 8, 16, .62);
  --txt: #fff1ee;
  --txt-dim: #e3a7a7;
  --txt-faint: #9a5c5c;
  --border: rgba(255, 40, 40, .18);
  --border-strong: rgba(255, 40, 40, .36);
  --accent: #ff0033;
  --accent-2: #ff5500;
  --accent-3: #ff2f6b;
  --good: #00ff9d;
  --warn: #ffae00;
  --bad: #ff0044;
  --glow: 0 0 32px rgba(255, 0, 51, .65);
  --shadow: 0 20px 60px rgba(0, 0, 0, .75);
  --grid-line: rgba(255, 40, 40, .16);
  --blur: 18px;
}

/* =====================================================================
   FONDO
   ===================================================================== */
/* Panal hexagonal electrónico (SVG), muy sutil para no interferir con la lectura */
.bg-grid {
  position: fixed; inset: 0; z-index: -2;
  background-color: var(--bg);
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='56' height='96' viewBox='0 0 56 96'><g fill='none' stroke='%237b8bd0' stroke-width='0.8' stroke-linejoin='round' stroke-linecap='round'><path d='M28 4 L52 18 V50 L28 64 L4 50 V18 Z'/><path d='M0 66 L4 64 M52 50 L56 52 M56 46 L52 48 M4 48 L0 50'/><path d='M28 64 V96'/></g></svg>");
  background-size: 56px 96px;
  opacity: .10;
  mask-image: radial-gradient(ellipse 95% 80% at 50% 30%, #000 55%, transparent 100%);
  animation: gridpan 60s linear infinite;
}
@keyframes gridpan { from { background-position: 0 0; } to { background-position: 56px 96px; } }
[data-theme="light"] .bg-grid { opacity: .08; }
.bg-glow {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background:
    radial-gradient(600px circle at 12% 6%, color-mix(in srgb, var(--accent) 16%, transparent), transparent 60%),
    radial-gradient(700px circle at 92% 12%, color-mix(in srgb, var(--accent-2) 16%, transparent), transparent 62%),
    radial-gradient(600px circle at 60% 100%, color-mix(in srgb, var(--accent-3) 10%, transparent), transparent 60%);
}

/* =====================================================================
   BOOT
   ===================================================================== */
.boot-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  background: var(--bg);
  transition: opacity .35s ease;
}
.boot-screen.hide { opacity: 0; pointer-events: none; }
.boot-logo {
  color: #ffd700;
  filter: drop-shadow(0 0 10px #ff1a1a) drop-shadow(0 0 30px #ffd700);
  animation: spin 3s ease-in-out infinite, logoPulse 1.6s ease-in-out infinite;
}
.boot-logo svg { display: block; }
@keyframes spin { 0%,100% { transform: rotate(0) scale(1);} 50% { transform: rotate(180deg) scale(1.1);} }
@keyframes logoPulse {
  0%, 100% { filter: drop-shadow(0 0 10px #ff1a1a) drop-shadow(0 0 30px #ffd700); }
  50% { filter: drop-shadow(0 0 18px #ff1a1a) drop-shadow(0 0 50px #ffd700); }
}
.boot-title {
  font-family: "Orbitron", "Segoe UI", system-ui, sans-serif;
  font-size: 40px; font-weight: 800; letter-spacing: 10px;
  background: linear-gradient(100deg,
    #ffd700 0%, #ffd700 42%,
    #ffffff 49%, #ffffff 51%,
    #ff1a1a 58%, #ff1a1a 100%);
  background-size: 250% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  filter: drop-shadow(0 0 8px rgba(255, 26, 26, .7));
  animation: nexusShine 6s linear infinite;
}
.boot-sub { color: var(--txt-dim); letter-spacing: 3px; font-size: 12px; text-transform: uppercase; }
.boot-bar { width: 220px; height: 4px; border-radius: 4px; background: var(--border); overflow: hidden; }
.boot-bar span { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2)); animation: load .5s ease forwards; }
@keyframes load { to { width: 100%; } }

/* =====================================================================
   APP LAYOUT
   ===================================================================== */
.app { max-width: 1180px; margin: 0 auto; padding: 18px clamp(12px, 3vw, 26px) 40px; }

/* ---------- Topbar ---------- */
.topbar {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  padding: 12px 16px; border-radius: 18px;
  background: var(--panel); backdrop-filter: blur(var(--blur));
  border: 1px solid var(--border); box-shadow: var(--shadow);
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-hex {
  display: inline-grid; place-items: center; color: #ffd700;
  filter: drop-shadow(0 0 6px #ff1a1a) drop-shadow(0 0 16px #ffd700);
  animation: brandHexGlow 2.2s ease-in-out infinite;
}
.brand-hex svg { display: block; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.6;} }
@keyframes brandHexGlow {
  0%, 100% { filter: drop-shadow(0 0 6px #ff1a1a) drop-shadow(0 0 16px #ffd700); }
  50% { filter: drop-shadow(0 0 10px #ff1a1a) drop-shadow(0 0 24px #ffd700); }
}
.brand-text { display: flex; flex-direction: column; line-height: 1; }
.brand-name {
  font-family: "Orbitron", "Segoe UI", system-ui, sans-serif;
  font-weight: 800; letter-spacing: 3px; font-size: 19px;
  /* dorado + rojo neón con banda blanca (haz de luz) que barre lento de izq. a der. */
  background: linear-gradient(100deg,
    #ffd700 0%, #ffd700 42%,
    #ffffff 49%, #ffffff 51%,
    #ff1a1a 58%, #ff1a1a 100%);
  background-size: 250% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  filter: drop-shadow(0 0 6px #ff1a1a) drop-shadow(0 0 14px #ffd700);
  animation: nexusShine 6s linear infinite;
}
@keyframes nexusShine {
  0% { background-position: 125% 0; }
  100% { background-position: -25% 0; }
}
.brand-tag { font-size: 9px; letter-spacing: 1.6px; text-transform: uppercase; color: var(--txt-faint); white-space: nowrap; }

.topbar-center { flex: 1; display: flex; justify-content: center; }
.level-wrap { display: flex; align-items: center; gap: 12px; min-width: 260px; max-width: 340px; width: 100%; }
.level-badge {
  width: 42px; height: 42px; flex: none; border-radius: 12px;
  display: grid; place-items: center; font-weight: 800; font-size: 18px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #04122b;
  box-shadow: var(--glow);
}
.xp-block { flex: 1; }
.xp-meta { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
.xp-meta span:first-child { color: var(--accent); font-weight: 700; letter-spacing: 1px; }
.xp-meta span:last-child { color: var(--txt-dim); }
.xp-bar { height: 8px; border-radius: 8px; background: var(--border); overflow: hidden; }
.xp-fill { height: 100%; width: 0; border-radius: 8px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .6s cubic-bezier(.2,.9,.3,1); box-shadow: var(--glow); }

.topbar-actions { display: flex; align-items: center; gap: 10px; }
.streak-chip {
  display: flex; align-items: center; gap: 5px; padding: 7px 11px; border-radius: 12px;
  background: var(--panel-2); border: 1px solid var(--border); font-weight: 700; font-size: 14px;
}
.streak-chip .flame { filter: drop-shadow(0 0 6px var(--warn)); }
.theme-switch { display: flex; gap: 3px; padding: 4px; border-radius: 12px; background: var(--panel-2); border: 1px solid var(--border); }
.th-btn { width: 30px; height: 30px; border-radius: 9px; font-size: 15px; display: grid; place-items: center; transition: .2s; }
.th-btn:hover { background: var(--border); }
.th-btn.is-active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow: var(--glow); }
.icon-btn { width: 40px; height: 40px; border-radius: 12px; background: var(--panel-2); border: 1px solid var(--border); font-size: 17px; display: grid; place-items: center; transition: .2s; }
.icon-btn:hover { border-color: var(--border-strong); transform: translateY(-1px); }

/* ---------- Tabs ---------- */
.tabs { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
.tab {
  display: flex; align-items: center; gap: 8px; padding: 11px 18px; border-radius: 14px;
  background: var(--panel); border: 1px solid var(--border); color: var(--txt-dim);
  font-weight: 600; font-size: 14px; letter-spacing: .5px; transition: .22s; backdrop-filter: blur(var(--blur));
}
.tab .tab-ico {
  display: inline-grid; place-items: center; opacity: 1;
  color: #f2ff1a; /* amarillo neón */
  filter: drop-shadow(0 0 4px rgba(242, 255, 26, .9)) drop-shadow(0 0 9px rgba(242, 255, 26, .5));
}
.tab .tab-ico svg { width: 20px; height: 20px; display: block; }
.tab:hover { color: var(--txt); border-color: var(--border-strong); transform: translateY(-2px); }
.tab.is-active {
  color: #04122b; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-color: transparent; box-shadow: var(--glow); font-weight: 700;
}
.tab.is-active .tab-ico { opacity: 1; color: #f2ff1a; } /* se mantiene amarillo neón */

/* ---------- Views ---------- */
.view { display: none; animation: fadeUp .45s ease; }
.view.is-active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

/* =====================================================================
   COMPONENTES
   ===================================================================== */
.card {
  background: var(--panel); backdrop-filter: blur(var(--blur));
  border: 1px solid var(--border); border-radius: 18px; padding: 18px;
  box-shadow: var(--shadow); position: relative; overflow: hidden;
}
.card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: .4;
}
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
.card-title { font-size: 14px; font-weight: 700; letter-spacing: .5px; display: flex; align-items: center; gap: 8px; }
.card-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: var(--glow); }
.card-sub { font-size: 12px; color: var(--txt-faint); }

.grid { display: grid; gap: 16px; }
.grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 860px) { .grid.cols-3, .grid.cols-4 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .grid.cols-2, .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr; } }

.view-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
.view-title { font-size: 26px; font-weight: 800; letter-spacing: .5px; display: flex; align-items: center; gap: 12px; }
.view-title .ico {
  display: inline-grid; place-items: center;
  color: #f2ff1a; /* amarillo neón */
  filter: drop-shadow(0 0 5px rgba(242, 255, 26, .9)) drop-shadow(0 0 11px rgba(242, 255, 26, .5));
}
.view-title .ico svg { width: 26px; height: 26px; display: block; }
.view-desc { color: var(--txt-dim); font-size: 13px; margin-top: 4px; }

/* KPIs */
.kpi { display: flex; flex-direction: column; gap: 6px; }
.kpi-val { font-size: 30px; font-weight: 800; letter-spacing: .5px; }
.kpi-lbl { font-size: 12px; color: var(--txt-dim); text-transform: uppercase; letter-spacing: 1.5px; }
.kpi-sub { font-size: 11px; color: var(--txt-faint); }
.kpi-val.accent { color: var(--accent); }
.kpi-val.good { color: var(--good); }
.kpi-val.bad { color: var(--bad); }
.kpi-val.warn { color: var(--warn); }

/* Botones */
.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 12px;
  background: var(--panel-2); border: 1px solid var(--border-strong); color: var(--txt);
  font-weight: 600; font-size: 14px; transition: .2s;
}
.btn:hover { transform: translateY(-2px); border-color: var(--accent); }
.btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #04122b; border-color: transparent; box-shadow: var(--glow); }
.btn.ghost { background: transparent; }
.btn.danger { border-color: var(--bad); color: var(--bad); }
.btn.sm { padding: 6px 12px; font-size: 12px; border-radius: 10px; }
.btn.block { width: 100%; justify-content: center; }

/* Inputs */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 12px; color: var(--txt-dim); letter-spacing: .5px; }
.input, .select, .textarea {
  width: 100%; padding: 10px 12px; border-radius: 10px; background: var(--panel-2);
  border: 1px solid var(--border); color: var(--txt); font-size: 14px; transition: .18s;
}
.input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent); }
/* Select oscuro futurista (nada de estilo Windows) */
select.select {
  -webkit-appearance: none; appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--accent) 50%),
    linear-gradient(-45deg, transparent 50%, var(--accent) 50%);
  background-position: calc(100% - 16px) 55%, calc(100% - 11px) 55%;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
  padding-right: 34px; cursor: pointer;
}
select.select::-ms-expand { display: none; }
select.select option, select.select optgroup {
  background: var(--panel-solid); color: var(--txt);
  padding: 8px 12px;
}
.textarea { resize: vertical; min-height: 70px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; }
.row > * { flex: 1; min-width: 120px; }

/* Chips / tags */
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--panel-2); border: 1px solid var(--border); }
.chip.good { color: var(--good); border-color: color-mix(in srgb, var(--good) 40%, transparent); }
.chip.warn { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 40%, transparent); }
.chip.bad { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 40%, transparent); }
.chip.accent { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }

/* Listas de ítems */
.item {
  display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-radius: 14px;
  background: var(--panel-2); border: 1px solid var(--border); margin-bottom: 10px; transition: .2s;
}
.item:hover { border-color: var(--border-strong); transform: translateX(3px); }
.item .item-main { flex: 1; min-width: 0; }
.item .item-title { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.item .item-meta { font-size: 12px; color: var(--txt-dim); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
.item.done .item-title { text-decoration: line-through; color: var(--txt-faint); }

.check {
  width: 30px; height: 30px; flex: none; border-radius: 10px; border: 2px solid var(--border-strong);
  display: grid; place-items: center; font-size: 15px; transition: .2s; background: transparent;
}
.check:hover { border-color: var(--accent); }
.check.on { background: linear-gradient(135deg, var(--good), var(--accent)); border-color: transparent; color: #04122b; box-shadow: 0 0 14px color-mix(in srgb, var(--good) 50%, transparent); }

.empty { text-align: center; color: var(--txt-faint); padding: 30px 10px; font-size: 13px; }
.empty .big { font-size: 40px; display: block; margin-bottom: 8px; opacity: .5; }

/* ===== assets/js/store.js ===== */
/* =====================================================================
   OCTANAJE · Store — estado global + persistencia en localStorage
   ===================================================================== */
(function () {
  "use strict";

  const KEY = "nexus.state.v1";

  // ---------- utilidades de fecha ----------
  const DateUtil = {
    todayKey() { return this.key(new Date()); },
    key(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    },
    parse(key) { const [y, m, d] = key.split("-").map(Number); return new Date(y, m - 1, d); },
    addDays(key, n) { const d = this.parse(key); d.setDate(d.getDate() + n); return this.key(d); },
    diffDays(a, b) { return Math.round((this.parse(a) - this.parse(b)) / 86400000); },
    isYesterday(key) { return key === this.addDays(this.todayKey(), -1); },
    lastNDays(n) {
      const out = [];
      for (let i = n - 1; i >= 0; i--) out.push(this.addDays(this.todayKey(), -i));
      return out;
    },
    monthKey(d) { d = d || new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; },
    label(key) {
      const d = this.parse(key);
      return d.toLocaleDateString("es", { day: "2-digit", month: "short" });
    },
    weekday(key) {
      return this.parse(key).toLocaleDateString("es", { weekday: "short" });
    }
  };

  // ---------- estado por defecto ----------
  function defaultState() {
    return {
      profile: { xp: 0, level: 1, createdAt: DateUtil.todayKey() },
      settings: { theme: "dark", sound: true, notifications: false, currency: "MXN", locale: "es-MX" },
      notifyMeta: { lastReminder: "" },   // "YYYY-MM-DD" del último recordatorio enviado
      reminders: [],           // recordatorios personalizados: {id,title,message,time,days,sound,enabled,lastFired}
      activity: {},            // { "YYYY-MM-DD": true }  días con alguna acción
      xpLog: {},               // { "YYYY-MM-DD": xpGanado }
      achievements: [],        // ids de logros desbloqueados
      habits: [],              // {id,name,icon,color,history:{date:true},created}
      finance: {
        transactions: [],      // {id,type:'income'|'expense',amount,category,note,date}
        budget: 0,             // presupuesto mensual objetivo de gasto
        savingGoal: 0,         // meta de ahorro mensual
        savings: [],           // alcancía: {id,amount(+/-),date,note}
        savingsTarget: 0       // meta de la alcancía (progreso, reinicio manual)
      },
      tasks: [],               // {id,title,priority,due,done,subtasks:[{t,done}],created}
      workouts: [],            // {id,name,type,duration,calories,volume,date}
      goals: [],               // {id,title,target,current,unit,deadline,milestones:[{t,done}],created}
      focus: {                 // modo Foco / Pomodoro
        work: 25, break: 5, longBreak: 15, longEvery: 4,
        sessionsCompleted: 0,  // total histórico de sesiones de trabajo
        focusLog: {},          // { "YYYY-MM-DD": minutos enfocados }
        sessionsLog: {}        // { "YYYY-MM-DD": nº de sesiones de trabajo }
      },
      nutrition: { log: [] }   // registro de alimentos: {id,name,cat,grams,kcal,prot,carb,date}
    };
  }

  // ---------- carga / guardado ----------
  let state = load();
  const subscribers = [];

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return defaultState();
      const parsed = JSON.parse(raw);
      return deepMerge(defaultState(), parsed);
    } catch (e) {
      console.warn("No se pudo cargar el estado, usando por defecto", e);
      return defaultState();
    }
  }

  function deepMerge(base, override) {
    if (Array.isArray(base)) return Array.isArray(override) ? override : base;
    if (base && typeof base === "object") {
      const out = { ...base };
      for (const k in override) {
        out[k] = (k in base) ? deepMerge(base[k], override[k]) : override[k];
      }
      return out;
    }
    return override === undefined ? base : override;
  }

  let saveTimer = null;
  function save() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try { localStorage.setItem(KEY, JSON.stringify(state)); }
      catch (e) { console.error("Error al guardar", e); }
    }, 120);
  }

  function notify() { subscribers.forEach((fn) => { try { fn(state); } catch (e) { console.error(e); } }); }

  // ---------- API pública ----------
  const Store = {
    DateUtil,
    get() { return state; },
    subscribe(fn) { subscribers.push(fn); return () => { const i = subscribers.indexOf(fn); if (i >= 0) subscribers.splice(i, 1); }; },

    // guardar + notificar (usar tras mutar el estado)
    commit(silent) { save(); if (!silent) notify(); },

    // registra actividad del día (para racha global)
    markActive() {
      state.activity[DateUtil.todayKey()] = true;
    },

    reset() {
      state = defaultState();
      save(); notify();
    },

    // ---------- exportar / importar ----------
    serialize() {
      return JSON.stringify(Object.assign({ _app: "OCTANAJE", _version: 1, _exportedAt: new Date().toISOString() }, state), null, 2);
    },
    import(obj) {
      if (!obj || typeof obj !== "object") throw new Error("Formato no válido");
      // aceptar el objeto de estado directamente o uno con metadatos
      const src = obj.profile || obj.habits || obj.finance ? obj : obj;
      state = deepMerge(defaultState(), src);
      // limpiar metadatos de exportación si vinieron
      delete state._app; delete state._version; delete state._exportedAt;
      save(); notify();
      return true;
    },

    uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  };

  window.NEXUS = window.NEXUS || {};
  window.NEXUS.Store = Store;
})();


/* ===== assets/js/audio.js ===== */
/* =====================================================================
   OCTANAJE · Audio — sonidos sintetizados con Web Audio API (sin archivos)
   ===================================================================== */
(function () {
  "use strict";
  const Store = window.NEXUS.Store;

  let ctx = null;
  let master = null;
  let loud = null; // bus separado y más alto para alarmas críticas (fin de temporizador, recordatorios)
  let enabled = Store.get().settings.sound !== false;

  function ensure() {
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = 0.22;
      master.connect(ctx.destination);
      loud = ctx.createGain();
      loud.gain.value = 0.6; // ~3x más fuerte que los sonidos normales de la interfaz
      loud.connect(ctx.destination);
    }
    if (ctx.state === "suspended") ctx.resume();
    return true;
  }

  // Genera un tono con envolvente. bus: "master" (normal) | "loud" (alarmas)
  function tone(freq, start, dur, type, vol, bus) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type || "sine";
    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
    const t0 = ctx.currentTime + start;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol == null ? 1 : vol, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0008, t0 + dur);
    osc.connect(g); g.connect(bus === "loud" ? loud : master);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }

  function sweep(f1, f2, start, dur, type, vol, bus) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type || "sawtooth";
    const t0 = ctx.currentTime + start;
    osc.frequency.setValueAtTime(f1, t0);
    osc.frequency.exponentialRampToValueAtTime(f2, t0 + dur);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol == null ? 0.8 : vol, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0008, t0 + dur);
    osc.connect(g); g.connect(bus === "loud" ? loud : master);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }

  // Biblioteca de sonidos
  const sounds = {
    tap()      { tone(520, 0, 0.08, "sine", 0.5); },
    tab()      { tone(680, 0, 0.09, "triangle", 0.5); tone(880, 0.04, 0.09, "triangle", 0.35); },
    toggleOn() { tone(660, 0, 0.09, "square", 0.35); tone(990, 0.06, 0.12, "square", 0.3); },
    complete() { tone(587, 0, 0.1, "sine", 0.5); tone(784, 0.08, 0.12, "sine", 0.5); tone(1175, 0.16, 0.18, "sine", 0.4); },
    add()      { tone(440, 0, 0.09, "triangle", 0.45); tone(660, 0.06, 0.12, "triangle", 0.4); },
    coin()     { tone(988, 0, 0.06, "square", 0.3); tone(1319, 0.05, 0.14, "square", 0.28); },
    money()    { tone(784, 0, 0.08, "sine", 0.4); tone(1047, 0.07, 0.12, "sine", 0.4); tone(1319, 0.14, 0.16, "sine", 0.35); },
    delete()   { sweep(400, 120, 0, 0.22, "sawtooth", 0.35); },
    error()    { tone(200, 0, 0.16, "square", 0.4); tone(160, 0.1, 0.18, "square", 0.35); },
    levelup()  {
      const notes = [523, 659, 784, 1047, 1319];
      notes.forEach((f, i) => tone(f, i * 0.09, 0.28, "triangle", 0.42));
      sweep(300, 1400, 0.1, 0.6, "sine", 0.2);
    },
    achieve()  { tone(784, 0, 0.12, "sine", 0.4); tone(1047, 0.1, 0.14, "sine", 0.4); tone(1568, 0.22, 0.24, "sine", 0.35); },
    // alarma de recordatorio: patrón repetitivo tipo "beep-beep" para
    // distinguirse claramente de los demás sonidos de la interfaz
    alarm()    {
      for (let i = 0; i < 3; i++) {
        tone(880, i * 0.28, 0.14, "square", 0.5);
        tone(1108, i * 0.28 + 0.15, 0.12, "square", 0.42);
      }
    },
    // --- alarmas FUERTES (bus "loud", volumen alto) para eventos que no
    // se deben pasar por alto: fin de temporizador de Enfoque, recordatorios
    // críticos. Se pueden usar aunque tengas la pantalla apagada o el
    // celular guardado, siempre que el sistema no haya cerrado la app.
    alarmLoud() {
      for (let i = 0; i < 5; i++) {
        tone(1046, i * 0.32, 0.16, "square", 0.9, "loud");
        tone(1318, i * 0.32 + 0.16, 0.14, "square", 0.8, "loud");
      }
    },
    // sirena tipo campana de reloj (más grave y sostenida, buena para "se acabó el tiempo")
    bellLoud() {
      for (let i = 0; i < 4; i++) {
        tone(660, i * 0.55, 0.5, "sine", 0.85, "loud");
        tone(990, i * 0.55, 0.5, "sine", 0.5, "loud");
      }
    },
    // sirena ascendente/descendente estilo alarma de emergencia (la más notoria)
    sirenLoud() {
      for (let i = 0; i < 3; i++) {
        sweep(500, 1400, i * 0.7, 0.35, "sawtooth", 0.75, "loud");
        sweep(1400, 500, i * 0.7 + 0.35, 0.35, "sawtooth", 0.75, "loud");
      }
    }
  };

  const Audio = {
    play(name) {
      if (!enabled) return;
      if (!ensure()) return;
      const fn = sounds[name];
      if (fn) { try { fn(); } catch (e) {} }
    },
    isEnabled() { return enabled; },
    toggle() {
      enabled = !enabled;
      Store.get().settings.sound = enabled;
      Store.commit(true);
      if (enabled) { ensure(); this.play("toggleOn"); }
      return enabled;
    },
    // desbloquea el contexto tras el primer gesto del usuario
    unlock() { ensure(); },
    // reproduce un sonido aunque el interruptor general esté apagado
    // (para botones explícitos de "probar sonido")
    preview(name) {
      if (!ensure()) return;
      const fn = sounds[name];
      if (fn) { try { fn(); } catch (e) {} }
    }
  };

  window.NEXUS.Audio = Audio;
})();

/* =====================================================================
   OCTANAJE · Charts — motor de gráficas propio sobre Canvas (sin librerías)
   Soporta: line, area, bar, doughnut, sparkline, ring
   ===================================================================== */
(function () {
  "use strict";

  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || "#00e5ff";
  }

  // Prepara el canvas para pantallas retina
  function setup(canvas, height) {
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth || canvas.parentElement.clientWidth || 300;
    const h = height || canvas.clientHeight || 160;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.height = h + "px";
    const ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx, w, h };
  }

  function niceMax(v) {
    if (v <= 0) return 10;
    const mag = Math.pow(10, Math.floor(Math.log10(v)));
    const n = v / mag;
    let f;
    if (n <= 1) f = 1; else if (n <= 2) f = 2; else if (n <= 5) f = 5; else f = 10;
    return f * mag;
  }

  function animate(draw) {
    const start = performance.now();
    const dur = 650;
    function frame(now) {
      let t = Math.min(1, (now - start) / dur);
      t = 1 - Math.pow(1 - t, 3); // easeOutCubic
      draw(t);
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  const Charts = {
    // ---------- Línea / Área ----------
    line(canvas, data, opts) {
      opts = opts || {};
      const { ctx, w, h } = setup(canvas, opts.height || 180);
      const values = data.values || [];
      const labels = data.labels || [];
      const pad = { l: 34, r: 12, t: 14, b: 22 };
      const cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;
      const maxV = niceMax(Math.max(1, ...values));
      const color = opts.color ? cssVar(opts.color) : cssVar("--accent");
      const color2 = cssVar("--accent-2");
      const grid = cssVar("--border");
      const dim = cssVar("--txt-faint");
      const n = values.length;
      const x = (i) => pad.l + (n <= 1 ? cw / 2 : (cw * i) / (n - 1));
      const y = (v) => pad.t + ch - (v / maxV) * ch;

      animate((prog) => {
        ctx.clearRect(0, 0, w, h);
        // grid + etiquetas Y (líneas más finas y sutiles)
        ctx.strokeStyle = grid; ctx.fillStyle = dim; ctx.lineWidth = 0.5;
        ctx.setLineDash([2, 4]);
        ctx.font = "10px system-ui"; ctx.textAlign = "right"; ctx.textBaseline = "middle";
        for (let g = 0; g <= 4; g++) {
          const gy = pad.t + (ch * g) / 4;
          ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(w - pad.r, gy); ctx.stroke();
          ctx.fillText(Math.round(maxV - (maxV * g) / 4), pad.l - 6, gy);
        }
        ctx.setLineDash([]);
        // etiquetas X
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        const step = Math.ceil(n / 7);
        labels.forEach((lb, i) => { if (i % step === 0) ctx.fillText(lb, x(i), h - pad.b + 5); });

        if (n === 0) return;
        // área
        const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
        grad.addColorStop(0, color + "55"); grad.addColorStop(1, color + "00");
        ctx.beginPath(); ctx.moveTo(x(0), pad.t + ch);
        values.forEach((v, i) => ctx.lineTo(x(i), y(v * prog)));
        ctx.lineTo(x(n - 1), pad.t + ch); ctx.closePath();
        ctx.fillStyle = grad; ctx.fill();
        // línea
        const lg = ctx.createLinearGradient(pad.l, 0, w - pad.r, 0);
        lg.addColorStop(0, color); lg.addColorStop(1, color2);
        ctx.beginPath();
        values.forEach((v, i) => { const px = x(i), py = y(v * prog); i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); });
        ctx.strokeStyle = lg; ctx.lineWidth = 1.4; ctx.lineJoin = "round"; ctx.shadowColor = color; ctx.shadowBlur = 6; ctx.stroke();
        ctx.shadowBlur = 0;
        // puntos (más pequeños y finos)
        values.forEach((v, i) => {
          ctx.beginPath(); ctx.arc(x(i), y(v * prog), 1.8, 0, Math.PI * 2);
          ctx.fillStyle = color; ctx.fill();
        });
      });
    },

    // ---------- Barras (soporta apiladas ingreso/gasto) ----------
    bars(canvas, data, opts) {
      opts = opts || {};
      const { ctx, w, h } = setup(canvas, opts.height || 180);
      const labels = data.labels || [];
      const series = data.series || [{ values: data.values || [], color: "--accent" }];
      const pad = { l: 34, r: 12, t: 14, b: 22 };
      const cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;
      let maxV = 1;
      series.forEach((s) => s.values.forEach((v) => { if (v > maxV) maxV = v; }));
      maxV = niceMax(maxV);
      const grid = cssVar("--border"); const dim = cssVar("--txt-faint");
      const n = labels.length;
      const groupW = cw / Math.max(1, n);
      const barW = Math.min(20, (groupW * 0.5) / series.length);

      animate((prog) => {
        ctx.clearRect(0, 0, w, h);
        ctx.strokeStyle = grid; ctx.fillStyle = dim; ctx.lineWidth = 0.5;
        ctx.setLineDash([2, 4]);
        ctx.font = "10px system-ui"; ctx.textAlign = "right"; ctx.textBaseline = "middle";
        for (let g = 0; g <= 4; g++) {
          const gy = pad.t + (ch * g) / 4;
          ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(w - pad.r, gy); ctx.stroke();
          ctx.fillText(Math.round(maxV - (maxV * g) / 4), pad.l - 6, gy);
        }
        ctx.setLineDash([]);
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        for (let i = 0; i < n; i++) {
          const gx = pad.l + groupW * i + groupW / 2;
          const totalW = barW * series.length + (series.length - 1) * 3;
          series.forEach((s, si) => {
            const v = (s.values[i] || 0) * prog;
            const bh = (v / maxV) * ch;
            const bx = gx - totalW / 2 + si * (barW + 3);
            const by = pad.t + ch - bh;
            const col = cssVar(s.color || "--accent");
            const grad = ctx.createLinearGradient(0, by, 0, pad.t + ch);
            grad.addColorStop(0, col); grad.addColorStop(1, col + "66");
            ctx.fillStyle = grad;
            roundRect(ctx, bx, by, barW, bh, 2); ctx.fill();
          });
          if (i % Math.ceil(n / 8) === 0 || n <= 8) ctx.fillText(labels[i], gx, h - pad.b + 5);
        }
      });
    },

    // ---------- Doughnut ----------
    doughnut(canvas, data, opts) {
      opts = opts || {};
      const { ctx, w, h } = setup(canvas, opts.height || 190);
      const items = (data || []).filter((d) => d.value > 0);
      const total = items.reduce((s, d) => s + d.value, 0);
      const cx = w / 2, cy = h / 2;
      const r = Math.min(cx, cy) - 8, rin = r * 0.62;
      const palette = ["--accent", "--accent-2", "--accent-3", "--good", "--warn", "--bad"];

      animate((prog) => {
        ctx.clearRect(0, 0, w, h);
        if (total === 0) {
          ctx.strokeStyle = cssVar("--border"); ctx.lineWidth = r - rin;
          ctx.beginPath(); ctx.arc(cx, cy, (r + rin) / 2, 0, Math.PI * 2); ctx.stroke();
          ctx.fillStyle = cssVar("--txt-faint"); ctx.font = "12px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText("Sin datos", cx, cy);
          return;
        }
        let a = -Math.PI / 2;
        items.forEach((d, i) => {
          const slice = (d.value / total) * Math.PI * 2 * prog;
          const col = cssVar(d.color || palette[i % palette.length]);
          ctx.beginPath(); ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, a, a + slice); ctx.closePath();
          ctx.fillStyle = col; ctx.fill();
          a += slice;
        });
        // agujero central
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath(); ctx.arc(cx, cy, rin, 0, Math.PI * 2); ctx.fill();
        ctx.globalCompositeOperation = "source-over";
        // total al centro
        ctx.fillStyle = cssVar("--txt"); ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = "700 18px system-ui";
        ctx.fillText(opts.centerLabel || items.length + "", cx, cy - 6);
        ctx.font = "10px system-ui"; ctx.fillStyle = cssVar("--txt-faint");
        ctx.fillText(opts.centerSub || "categorías", cx, cy + 12);
      });
    },

    // ---------- Sparkline (mini línea sin ejes) ----------
    sparkline(canvas, values, opts) {
      opts = opts || {};
      const { ctx, w, h } = setup(canvas, opts.height || 40);
      if (!values.length) return;
      const max = Math.max(...values, 1), min = Math.min(...values, 0);
      const range = max - min || 1;
      const x = (i) => (w * i) / (values.length - 1 || 1);
      const y = (v) => h - 4 - ((v - min) / range) * (h - 8);
      const color = cssVar(opts.color || "--accent");
      ctx.clearRect(0, 0, w, h);
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, color + "44"); grad.addColorStop(1, color + "00");
      ctx.beginPath(); ctx.moveTo(0, h);
      values.forEach((v, i) => ctx.lineTo(x(i), y(v)));
      ctx.lineTo(w, h); ctx.closePath(); ctx.fillStyle = grad; ctx.fill();
      ctx.beginPath();
      values.forEach((v, i) => { i === 0 ? ctx.moveTo(x(i), y(v)) : ctx.lineTo(x(i), y(v)); });
      ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.lineJoin = "round"; ctx.stroke();
    },

    // ---------- Ring (anillo de progreso) ----------
    ring(canvas, pct, opts) {
      opts = opts || {};
      const size = opts.size || 90;
      canvas.style.width = size + "px";
      const { ctx, w, h } = setup(canvas, size);
      canvas.style.width = size + "px";
      const cx = w / 2, cy = h / 2, r = Math.min(cx, cy) - 6;
      const color = cssVar(opts.color || "--accent");
      const color2 = cssVar("--accent-2");
      pct = Math.max(0, Math.min(100, pct));
      animate((prog) => {
        ctx.clearRect(0, 0, w, h);
        ctx.lineWidth = opts.thickness || 5; ctx.lineCap = "round";
        ctx.strokeStyle = cssVar("--border");
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
        const grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, color); grad.addColorStop(1, color2);
        ctx.strokeStyle = grad; ctx.shadowColor = color; ctx.shadowBlur = 10;
        const end = -Math.PI / 2 + (Math.PI * 2 * pct / 100) * prog;
        ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI / 2, end); ctx.stroke();
        ctx.shadowBlur = 0;
      });
    },

    // ---------- Multi-ring radial (anillos concéntricos de progreso) ----------
    multiRing(canvas, rings, opts) {
      opts = opts || {};
      const size = opts.size || 230;
      canvas.style.width = "100%";
      canvas.style.maxWidth = size + "px";
      canvas.style.margin = "0 auto";
      canvas.style.display = "block";
      const { ctx, w, h } = setup(canvas, size);
      const cx = w / 2, cy = h / 2;
      const n = rings.length || 1;
      const outer = Math.min(cx, cy) - 8;
      const gap = opts.gap != null ? opts.gap : 8;
      const inner = opts.inner != null ? opts.inner : outer * 0.32;
      const thickness = opts.thickness || Math.max(6, ((outer - inner) - gap * (n - 1)) / n);
      const track = cssVar("--border");
      const startA = -Math.PI / 2;

      animate((prog) => {
        ctx.clearRect(0, 0, w, h);
        rings.forEach((rg, i) => {
          const r = outer - thickness / 2 - i * (thickness + gap);
          if (r < 4) return;
          const pct = Math.max(0, Math.min(100, rg.pct || 0));
          const col = cssVar(rg.color || "--accent");
          ctx.lineWidth = thickness; ctx.lineCap = "round";
          // pista de fondo
          ctx.globalAlpha = 0.45; ctx.strokeStyle = track; ctx.shadowBlur = 0;
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
          ctx.globalAlpha = 1;
          // arco de progreso con glow neón
          const end = startA + (Math.PI * 2) * (pct / 100) * prog;
          ctx.strokeStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 14;
          ctx.beginPath(); ctx.arc(cx, cy, r, startA, end); ctx.stroke();
          ctx.shadowBlur = 0;
        });
        // etiqueta central
        if (opts.centerLabel != null) {
          ctx.fillStyle = cssVar("--txt"); ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.font = "800 22px system-ui";
          ctx.fillText(String(opts.centerLabel), cx, cy - 6);
          if (opts.centerSub) {
            ctx.font = "10px system-ui"; ctx.fillStyle = cssVar("--txt-faint");
            ctx.fillText(String(opts.centerSub), cx, cy + 13);
          }
        }
      });
    }
  };

  function roundRect(ctx, x, y, w, h, r) {
    if (h < 0) { y += h; h = -h; }
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  window.NEXUS.Charts = Charts;
})();


/* ===== assets/js/ui.js ===== */
/* =====================================================================
   OCTANAJE · UI — helpers de DOM, toasts y modal
   ===================================================================== */
(function () {
  "use strict";
  const Audio = window.NEXUS.Audio;
  const Store = window.NEXUS.Store;

  // ---------- helpers DOM ----------
  function el(tag, attrs, children) {
    const node = document.createElement(tag);
    if (attrs) {
      for (const k in attrs) {
        if (k === "class") node.className = attrs[k];
        else if (k === "html") node.innerHTML = attrs[k];
        else if (k === "text") node.textContent = attrs[k];
        else if (k.startsWith("on") && typeof attrs[k] === "function") node.addEventListener(k.slice(2), attrs[k]);
        else if (k === "dataset") { for (const d in attrs[k]) node.dataset[d] = attrs[k][d]; }
        // atributos booleanos de HTML (disabled, checked, readonly, required…):
        // su sola presencia activa el comportamiento sin importar el valor,
        // así que "false" NO debe agregarse al elemento en absoluto.
        else if (attrs[k] === false) { /* omitir: no agregar el atributo */ }
        else if (attrs[k] === true) node.setAttribute(k, "");
        else if (attrs[k] != null) node.setAttribute(k, attrs[k]);
      }
    }
    if (children != null) {
      (Array.isArray(children) ? children : [children]).forEach((c) => {
        if (c == null) return;
        node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
      });
    }
    return node;
  }
  const $ = (sel, root) => (root || document).querySelector(sel);
  const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));

  // ---------- formato ----------
  const fmt = {
    money(n) {
      const s = (Store && Store.get().settings) || {};
      const cur = s.currency || "MXN";
      const loc = s.locale || "es-MX";
      const v = Number(n) || 0;
      try {
        return v.toLocaleString(loc, { style: "currency", currency: cur, maximumFractionDigits: v % 1 === 0 ? 0 : 2 });
      } catch (e) {
        return "$" + v.toLocaleString("es-MX");
      }
    },
    num(n) {
      const loc = (Store && Store.get().settings.locale) || "es-MX";
      return (Number(n) || 0).toLocaleString(loc);
    },
    pct(n) { return Math.round(Number(n) || 0) + "%"; }
  };

  // ---------- toasts ----------
  const stack = () => document.getElementById("toast-stack");
  function toast(opts) {
    opts = typeof opts === "string" ? { msg: opts } : opts;
    const icon = opts.icon || "✦";
    const node = el("div", { class: "toast" + (opts.level ? " level" : "") }, [
      el("span", { class: "t-ico", text: icon }),
      el("div", { class: "t-body" }, [
        opts.title ? el("div", { class: "t-title", text: opts.title }) : null,
        el("div", { class: "t-msg", text: opts.msg || "" })
      ])
    ]);
    stack().appendChild(node);
    setTimeout(() => {
      node.classList.add("out");
      setTimeout(() => node.remove(), 400);
    }, opts.duration || 3200);
  }

  // ---------- modal ----------
  const overlay = () => document.getElementById("modal-overlay");
  function openModal(title, bodyNode) {
    document.getElementById("modal-title").textContent = title;
    const body = document.getElementById("modal-body");
    body.innerHTML = "";
    body.appendChild(bodyNode);
    overlay().hidden = false;
    const firstInput = body.querySelector("input, textarea, select");
    if (firstInput) setTimeout(() => firstInput.focus(), 60);
  }
  function closeModal() { overlay().hidden = true; }

  // ---------- form builder ----------
  // fields: [{name,label,type,value,options,placeholder,required,min,step}]
  function form(fields, onSubmit, submitLabel, extrasFn) {
    const inputs = {};
    const wrap = el("form", { class: "nexus-form" });
    fields.forEach((f) => {
      if (f.type === "row" && f.fields) {
        const row = el("div", { class: "row" });
        f.fields.forEach((sf) => { const fld = buildField(sf, inputs); row.appendChild(fld); });
        wrap.appendChild(row);
        return;
      }
      wrap.appendChild(buildField(f, inputs));
    });
    // contenido extra opcional (recibe el mapa de inputs para leer valores en vivo)
    if (typeof extrasFn === "function") { try { const ex = extrasFn(inputs); if (ex) wrap.appendChild(ex); } catch (e) {} }
    const submit = el("button", { class: "btn primary block mt-8", type: "submit", text: submitLabel || "Guardar" });
    wrap.appendChild(submit);
    wrap.addEventListener("submit", (e) => {
      e.preventDefault();
      const data = {};
      let ok = true;
      for (const name in inputs) {
        const inp = inputs[name];
        let val = inp.value;
        if (inp.type === "number") val = val === "" ? "" : Number(val);
        if (inp.dataset.required === "1" && (val === "" || val == null)) { ok = false; inp.style.borderColor = "var(--bad)"; }
        data[name] = val;
      }
      if (!ok) { Audio.play("error"); toast({ icon: "⚠️", title: "Faltan datos", msg: "Completa los campos obligatorios." }); return; }
      onSubmit(data);
    });
    return wrap;
  }

  function buildField(f, inputs) {
    const field = el("div", { class: "field" });
    if (f.label) field.appendChild(el("label", { text: f.label + (f.required ? " *" : "") }));

    // Selector visual con íconos (emoji o SVG). Guarda el valor en un input oculto.
    if (f.type === "iconpick") {
      const hidden = el("input", { type: "hidden" });
      hidden.value = f.value != null ? f.value : (f.options && f.options[0] ? f.options[0].value : "");
      const grid = el("div", { class: "iconpick" });
      (f.options || []).forEach((o) => {
        const btn = el("button", { type: "button", class: "iconpick-btn" + (o.value === hidden.value ? " on" : ""), title: o.label });
        const ic = o.svg ? "<span class='ip-ic'>" + o.svg + "</span>" : "<span class='ip-ic ip-emoji'>" + (o.icon || "") + "</span>";
        btn.innerHTML = ic + "<span class='ip-lbl'>" + o.label + "</span>";
        btn.addEventListener("click", () => {
          hidden.value = o.value;
          grid.querySelectorAll(".iconpick-btn").forEach((b) => b.classList.remove("on"));
          btn.classList.add("on");
        });
        grid.appendChild(btn);
      });
      inputs[f.name] = hidden;
      field.appendChild(grid);
      field.appendChild(hidden);
      return field;
    }

    // Selector de días de la semana (para programar hábitos). Guarda CSV de 0..6.
    if (f.type === "weekdays") {
      const initial = Array.isArray(f.value) ? f.value.slice() : (typeof f.value === "string" && f.value ? f.value.split(",").map(Number) : [0, 1, 2, 3, 4, 5, 6]);
      const sel = new Set(initial);
      const hidden = el("input", { type: "hidden" });
      const sync = () => { hidden.value = Array.from(sel).sort().join(","); };
      sync();
      const order = [[1, "L"], [2, "M"], [3, "M"], [4, "J"], [5, "V"], [6, "S"], [0, "D"]];
      const btns = {};
      const grid = el("div", { class: "wdays" });
      order.forEach((o) => {
        const b = el("button", { type: "button", class: "wday" + (sel.has(o[0]) ? " on" : ""), text: o[1] });
        b.addEventListener("click", () => { if (sel.has(o[0])) sel.delete(o[0]); else sel.add(o[0]); b.classList.toggle("on"); sync(); });
        btns[o[0]] = b; grid.appendChild(b);
      });
      const setPreset = (arr) => { sel.clear(); arr.forEach((d) => sel.add(d)); order.forEach((o) => btns[o[0]].classList.toggle("on", sel.has(o[0]))); sync(); };
      const presets = el("div", { class: "flex gap-8", style: "margin-bottom:8px;flex-wrap:wrap" }, [
        el("button", { type: "button", class: "btn sm ghost", text: "Todos", onclick: () => setPreset([0, 1, 2, 3, 4, 5, 6]) }),
        el("button", { type: "button", class: "btn sm ghost", text: "Lun-Vie", onclick: () => setPreset([1, 2, 3, 4, 5]) }),
        el("button", { type: "button", class: "btn sm ghost", text: "Fin de semana", onclick: () => setPreset([0, 6]) })
      ]);
      inputs[f.name] = hidden;
      field.appendChild(presets);
      field.appendChild(grid);
      field.appendChild(hidden);
      return field;
    }

    let input;
    if (f.type === "select") {
      input = el("select", { class: "select" });
      (f.options || []).forEach((o) => {
        const opt = el("option", { value: o.value != null ? o.value : o, text: o.label != null ? o.label : o });
        if ((o.value != null ? o.value : o) == f.value) opt.selected = true;
        input.appendChild(opt);
      });
    } else if (f.type === "textarea") {
      input = el("textarea", { class: "textarea", placeholder: f.placeholder || "" });
      input.value = f.value || "";
    } else {
      input = el("input", { class: "input", type: f.type || "text", placeholder: f.placeholder || "" });
      if (f.value != null) input.value = f.value;
      if (f.min != null) input.min = f.min;
      if (f.step != null) input.step = f.step;
    }
    if (f.required) input.dataset.required = "1";
    inputs[f.name] = input;
    input.addEventListener("input", () => { input.style.borderColor = ""; });
    field.appendChild(input);
    return field;
  }

  // ---------- confirm ----------
  function confirmBox(title, msg, onYes, yesLabel) {
    const body = el("div", {}, [
      el("p", { class: "text-dim fs-13 mb-16", text: msg }),
      el("div", { class: "row" }, [
        el("button", { class: "btn ghost", text: "Cancelar", onclick: closeModal }),
        el("button", { class: "btn danger", text: yesLabel || "Confirmar", onclick: () => { closeModal(); onYes(); } })
      ])
    ]);
    openModal(title, body);
  }

  window.NEXUS.UI = { el, $, $$, fmt, toast, openModal, closeModal, form, confirmBox };
})();

(function () {
  "use strict";
  const N = window.NEXUS || (window.NEXUS = {});

  const A = 'viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"';

    const n = N.QUOTES.length;
    if (typeof forcedIdx === "number") return N.QUOTES[((forcedIdx % n) + n) % n];

    const str = String(dateKey || "");

    { id: "grandmaster", name: "Gran Maestro", cls: "grandmaster", minStreak: 100, colors: ["#fff6c8", "#a8760a"], shield: true, hasWings: true, wingScale: 1.55, blurStd: 3.6, hasCrown: true }
  ];

  // ---- contorno de escudo heráldico (Diamante / Heroico / Gran Maestro) ----
  function shieldPath(cx, cy, R) {
    const x0 = (cx - R).toFixed(1), x1 = (cx + R).toFixed(1);
    const yTop = (cy - R * 1.05).toFixed(1), ySh = (cy - R * 0.7).toFixed(1);
    const yWaist = (cy + R * 0.15).toFixed(1), yTip = (cy + R * 1.35).toFixed(1);
    const cxS = cx.toFixed(1);
    return "M" + x0 + "," + ySh +
      " Q" + (cx - R * 1.05).toFixed(1) + "," + yTop + " " + cxS + "," + yTop +
      " Q" + (cx + R * 1.05).toFixed(1) + "," + yTop + " " + x1 + "," + ySh +
      " C" + x1 + "," + yWaist + " " + (cx + R * 0.85).toFixed(1) + "," + (cy + R * 0.85).toFixed(1) + " " + cxS + "," + yTip +
      " C" + (cx - R * 0.85).toFixed(1) + "," + (cy + R * 0.85).toFixed(1) + " " + x0 + "," + yWaist + " " + x0 + "," + ySh + " Z";
  }

  // ---- un solo rayo eléctrico (lightning bolt), en abanico a lo largo del ángulo dado ----
  function boltPath(bx, by, angleDeg, len, halfW) {
    const rad = angleDeg * Math.PI / 180;
    const dx = Math.cos(rad), dy = Math.sin(rad);   // eje de longitud (hacia fuera)
    const px = -dy, py = dx;                        // eje perpendicular (ancho)
    // silueta local normalizada de un rayo: x=ancho[-1..1], y=longitud[0..1]
    const pts = [
      [0.30, 0.00], [0.85, 0.32], [0.20, 0.40], [0.65, 0.68],
      [-0.05, 1.00], [0.10, 0.58], [-0.50, 0.48], [0.10, 0.20], [-0.35, 0.06]
    ];
    const toWorld = (lx, ly) => {
      const wx = bx + px * lx * halfW + dx * ly * len;
      const wy = by + py * lx * halfW + dy * ly * len;
      return wx.toFixed(1) + "," + wy.toFixed(1);
    };
    let d = "M" + toWorld(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) d += " L" + toWorld(pts[i][0], pts[i][1]);
    return d + " Z";
  }
  // abanico de rayos dorados a un costado del escudo (mirror=true → lado izquierdo)
  // tres capas: dos borrosas (glow dorado intenso, más ancho) + una nítida encima con núcleo blanco.
  function boltWingSvg(cx, cy, mirror, gradId, blurId, scale) {
    scale = scale || 1;
    const angles = [-8, -30, -52, -74];
    const lens = [31 * scale, 35 * scale, 31 * scale, 23 * scale];
    const halfWs = [4.4 * scale, 4.8 * scale, 4.2 * scale, 3.3 * scale];
    let d = "";
    for (let i = 0; i < angles.length; i++) {
      const ang = mirror ? (180 - angles[i]) : angles[i];
      const bx = cx + (mirror ? -1 : 1) * (3 + i * 1.6 * scale);
      const by = cy - 3 + i * 0.8;
      d += boltPath(bx, by, ang, lens[i], halfWs[i]) + " ";
    }
    return '<path d="' + d + '" fill="#ffb300" filter="url(#' + blurId + ')" opacity=".95"/>' +
           '<path d="' + d + '" fill="#ffd23d" filter="url(#' + blurId + ')" opacity=".8"/>' +
           '<path d="' + d + '" fill="#fff6c8" filter="url(#' + blurId + ')" opacity=".5"/>' +
           '<path d="' + d + '" fill="url(#' + gradId + ')" stroke="#fffbe0" stroke-width=".8"/>';
  }

  // corona real (5 picos con perlas) para Gran Maestro, sobre el escudo
  function crownSvg(cx, topY, halfW, gradId) {
    const h = halfW * 1.05;
    const baseY = topY + h * 0.62;
    const pts = [
      [-halfW, baseY], [-halfW, topY + h * 0.18],
      [-halfW * 0.62, topY + h * 0.5], [-halfW * 0.34, topY],
      [0, topY + h * 0.38], [halfW * 0.34, topY],
      [halfW * 0.62, topY + h * 0.5], [halfW, topY + h * 0.18],
      [halfW, baseY]
    ];
    let d = "M" + (cx + pts[0][0]).toFixed(1) + "," + pts[0][1].toFixed(1);
    for (let i = 1; i < pts.length; i++) d += " L" + (cx + pts[i][0]).toFixed(1) + "," + pts[i][1].toFixed(1);
    d += " Z";
    const band = '<rect x="' + (cx - halfW).toFixed(1) + '" y="' + (baseY - h * 0.14).toFixed(1) + '" width="' + (halfW * 2).toFixed(1) + '" height="' + (h * 0.2).toFixed(1) + '" rx="' + (h * 0.06).toFixed(1) + '" fill="url(#' + gradId + ')" stroke="#fffbe0" stroke-width=".6"/>';
    const body = '<path d="' + d + '" fill="url(#' + gradId + ')" stroke="#fffbe0" stroke-width=".8"/>';
    const jewels = [-halfW * 0.34, 0, halfW * 0.34].map((jx) =>
      '<circle cx="' + (cx + jx).toFixed(1) + '" cy="' + (topY + h * 0.42).toFixed(1) + '" r="' + (h * 0.11).toFixed(1) + '" fill="#ff3b6e"/>'
    ).join("");
    const tips = [-halfW, -halfW * 0.34, 0, halfW * 0.34, halfW].map((jx, i) =>
      '<circle cx="' + (cx + jx).toFixed(1) + '" cy="' + (i % 2 === 0 ? baseY - h * 0.05 : topY).toFixed(1) + '" r="' + (h * 0.09).toFixed(1) + '" fill="#fffbe0"/>'
    ).join("");
    return body + band + jewels + tips;
  }

  // construye el SVG completo de la medalla: escudo/medallón + gema central + brillo (+ rayos si aplica)
  function medalBadgeSvg(medal) {
    const gid = "mg-" + medal.id;     // gradiente principal (metal/escudo)
    const bgid = "bg-" + medal.id;    // gradiente dorado de los rayos
    const hid = "hl-" + medal.id;     // brillo especular
    const rid = "rb-" + medal.id;     // listón inferior (solo medallón circular)
    const flid = "fl-" + medal.id;    // filtro de desenfoque (glow de los rayos)
    const light = medal.colors[0], deep = medal.colors[1];
    const isShield = !!medal.shield;
    const wings = !!medal.hasWings;
    const crown = !!medal.hasCrown;
    const wingScale = medal.wingScale || 1;
    const blurStd = medal.blurStd || 2.6;
    const topPad = (crown ? 22 : 0) + (wings ? 12 : 0);
    const vbW = wings ? Math.round(152 * Math.max(1, wingScale * 0.86)) : 56;
    const vbH = (isShield ? (wings ? 84 : 76) : 66) + topPad;
    const cx = wings ? vbW / 2 : 28, cy = (isShield ? 34 : 30) + topPad, R = 20;

    const defs = '<defs>' +
      '<radialGradient id="' + gid + '" cx="36%" cy="26%" r="80%">' +
        '<stop offset="0%" stop-color="' + light + '"/>' +
        '<stop offset="55%" stop-color="' + deep + '"/>' +
        '<stop offset="100%" stop-color="' + deep + '"/>' +
      '</radialGradient>' +
      '<linearGradient id="' + bgid + '" x1="0" y1="1" x2="0" y2="0">' +
        '<stop offset="0%" stop-color="#ff9d00"/>' +
        '<stop offset="55%" stop-color="#ffe066"/>' +
        '<stop offset="100%" stop-color="#fffbe0"/>' +
      '</linearGradient>' +
      '<linearGradient id="' + hid + '" x1="0" y1="0" x2="1" y2="1">' +
        '<stop offset="0%" stop-color="#ffffff" stop-opacity=".9"/>' +
        '<stop offset="42%" stop-color="#ffffff" stop-opacity="0"/>' +
      '</linearGradient>' +
      '<linearGradient id="' + rid + '" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0%" stop-color="' + light + '"/>' +
        '<stop offset="100%" stop-color="' + deep + '"/>' +
      '</linearGradient>' +
      '<filter id="' + flid + '" x="-120%" y="-120%" width="340%" height="340%">' +
        '<feGaussianBlur stdDeviation="' + blurStd + '"/>' +
      '</filter>' +
    '</defs>';

    let wingsMk = "";
    if (wings) { wingsMk = boltWingSvg(cx, cy, false, bgid, flid, wingScale) + boltWingSvg(cx, cy, true, bgid, flid, wingScale); }

    // listón/cinta inferior (solo medallón circular, look "medalla de pecho")
    let ribbon = "";
    if (!isShield) {
      ribbon = '<path d="M' + (cx - 8) + ',' + (cy + R - 4) + ' L' + (cx - 6) + ',' + (cy + R + 13) + ' L' + cx + ',' + (cy + R + 7) + ' L' + (cx + 6) + ',' + (cy + R + 13) + ' L' + (cx + 8) + ',' + (cy + R - 4) + ' Z" fill="url(#' + rid + ')" opacity=".92"/>';
    }

    let outerRing, body, innerRing;
    if (isShield) {
      outerRing = '<path d="' + shieldPath(cx, cy, R + 2.4) + '" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="1.4"/>';
      body = '<path d="' + shieldPath(cx, cy, R) + '" fill="url(#' + gid + ')" stroke="rgba(0,0,0,.3)" stroke-width="1"/>';
      innerRing = '<path d="' + shieldPath(cx, cy, R - 4) + '" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1"/>';
    } else {
      outerRing = '<circle cx="' + cx + '" cy="' + cy + '" r="' + (R + 2.4) + '" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.4"/>';
      body = '<circle cx="' + cx + '" cy="' + cy + '" r="' + R + '" fill="url(#' + gid + ')" stroke="rgba(0,0,0,.25)" stroke-width="1"/>';
      innerRing = '<circle cx="' + cx + '" cy="' + cy + '" r="' + (R - 4) + '" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1"/>';
    }
    // gema/estrella central (la "esfera") — misma pieza en medallón o escudo
    const gemCy = isShield ? cy - R * 0.12 : cy;
    const star = starPath(cx, gemCy, R - 8, R - 15, 5);
    const gem = '<path d="' + star + '" fill="rgba(255,255,255,.95)"/>';
    // brillo especular ovalado
    const glossCy = isShield ? cy - R * 0.5 : cy - R * 0.4;
    const gloss = '<ellipse cx="' + (cx - R * 0.32) + '" cy="' + glossCy + '" rx="' + (R * 0.55) + '" ry="' + (R * 0.34) + '" fill="url(#' + hid + ')" transform="rotate(-28 ' + (cx - R * 0.32) + ' ' + glossCy + ')"/>';
    // destellos (sparkles) — más notorios junto a los rayos
    let sparkles = "";
    if (wings) {
      const spScale = 1 + (wingScale - 1) * 0.6;
      sparkles = sparkle(cx - (R + 10) * spScale, cy - (R + 6) * spScale, 3.8 * spScale) +
        sparkle(cx + (R + 10) * spScale, cy - (R + 6) * spScale, 3.8 * spScale) +
        sparkle(cx, cy - (R + 15) * spScale, 3 * spScale);
    }
    // corona real sobre el escudo (Gran Maestro)
    let crownMk = "";
    if (crown) { crownMk = crownSvg(cx, cy - R * 1.28, R * 0.62, gid); }

    return '<svg viewBox="0 0 ' + vbW + ' ' + vbH + '">' + defs + wingsMk + ribbon + outerRing + body + innerRing + gem + gloss + sparkles + crownMk + '</svg>';
  }
  function starPath(cx, cy, rOuter, rInner, points) {
    let d = "";
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? rOuter : rInner;
      const a = (Math.PI / points) * i - Math.PI / 2;
      const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
      d += (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
    }
    return d + "Z";
  }
  function sparkle(x, y, s) {
    return '<path d="M' + x + ',' + (y - s * 2.2) + ' L' + (x + s * 0.5) + ',' + (y - s * 0.5) + ' L' + (x + s * 2.2) + ',' + y +
      ' L' + (x + s * 0.5) + ',' + (y + s * 0.5) + ' L' + x + ',' + (y + s * 2.2) + ' L' + (x - s * 0.5) + ',' + (y + s * 0.5) +
      ' L' + (x - s * 2.2) + ',' + y + ' L' + (x - s * 0.5) + ',' + (y - s * 0.5) + ' Z" fill="#fff" opacity=".9"/>';
  }

  function medalForStreak(streak) {
    let m = MEDALS[0];
    for (let i = 0; i < MEDALS.length; i++) { if (streak >= MEDALS[i].minStreak) m = MEDALS[i]; else break; }
    return m;
  }
  function nextMedal(streak) {
    for (let i = 0; i < MEDALS.length; i++) { if (streak < MEDALS[i].minStreak) return MEDALS[i]; }
    return null; // ya está en Gran Maestro
  }

  const Gami = {
    xpForLevel,
    allMedals() { return MEDALS; },
    medalForStreak,
    nextMedal,
    medalBadgeSvg,

    rankName(level) {
      let name = RANKS[0].name;
      RANKS.forEach((r) => { if (level >= r.min) name = r.name; });
      return name;
    },

    // progreso dentro del nivel actual
    levelProgress() {
      const s = Store.get();
      const L = s.profile.level;
      const prev = L <= 1 ? 0 : xpForLevel(L - 1);
      const next = xpForLevel(L);
      const into = s.profile.xp - prev;
      const span = next - prev;
      return { level: L, into: Math.max(0, into), span, next: next - prev, total: s.profile.xp, pct: Math.max(0, Math.min(100, (into / span) * 100)) };
    },

    // otorga XP + registra actividad + revisa nivel/logros
    award(amount, reason) {
      const s = Store.get();
      s.profile.xp += amount;
      const today = DateUtil.todayKey();
      s.xpLog[today] = (s.xpLog[today] || 0) + amount;
      Store.markActive();

      // subir de nivel (puede subir varios)
      let leveledTo = null;
      while (s.profile.xp >= xpForLevel(s.profile.level)) {
        s.profile.level++;
        leveledTo = s.profile.level;
      }
      Store.commit();

      if (leveledTo) {
        Audio.play("levelup");
        UI.toast({ level: true, icon: "🎉", title: "¡Nivel " + leveledTo + "!", msg: "Ahora eres " + this.rankName(leveledTo) + ". +" + amount + " XP" });
        this.burst();
      } else if (amount > 0) {
        UI.toast({ icon: "✦", title: "+" + amount + " XP", msg: reason || "¡Buen trabajo!" });
      }
      this.checkAchievements();
      return leveledTo;
    },

    // quitar XP (al deshacer acciones) sin bajar de nivel bruscamente
    remove(amount) {
      const s = Store.get();
      s.profile.xp = Math.max(0, s.profile.xp - amount);
      const today = DateUtil.todayKey();
      if (s.xpLog[today]) s.xpLog[today] = Math.max(0, s.xpLog[today] - amount);
      // recalcular nivel
      let L = 1;
      while (s.profile.xp >= xpForLevel(L)) L++;
      s.profile.level = L;
      Store.commit();
    },

    checkAchievements() {
      const s = Store.get();
      ACHIEVEMENTS.forEach((a) => {
        if (!s.achievements.includes(a.id)) {
          try {
            if (a.test(s)) {
              s.achievements.push(a.id);
              Store.commit(true);
              Audio.play("achieve");
              UI.toast({ icon: a.icon, title: "Logro: " + a.name, msg: a.desc });
            }
          } catch (e) {}
        }
      });
    },

    allAchievements() { return ACHIEVEMENTS; },

    // racha global de días con actividad
    globalStreak() {
      const s = Store.get();
      let streak = 0;
      let day = DateUtil.todayKey();
      // si hoy no hay actividad, empezamos desde ayer para no romper visualmente
      if (!s.activity[day]) day = DateUtil.addDays(day, -1);
      while (s.activity[day]) { streak++; day = DateUtil.addDays(day, -1); }
      return streak;
    },

    // efecto visual de partículas al subir de nivel
    burst() {
      const n = 26;
      const colors = ["#00e5ff", "#7c5cff", "#ff2fb0", "#21e6a4", "#ffb020"];
      for (let i = 0; i < n; i++) {
        const p = document.createElement("div");
        p.style.cssText = "position:fixed;left:50%;top:22%;width:9px;height:9px;border-radius:2px;z-index:300;pointer-events:none;";
        p.style.background = colors[i % colors.length];
        document.body.appendChild(p);
        const ang = Math.random() * Math.PI * 2;
        const dist = 120 + Math.random() * 180;
        const dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist + 120;
        p.animate([
          { transform: "translate(0,0) rotate(0) scale(1)", opacity: 1 },
          { transform: `translate(${dx}px,${dy}px) rotate(${Math.random() * 720}deg) scale(0)`, opacity: 0 }
        ], { duration: 900 + Math.random() * 500, easing: "cubic-bezier(.2,.7,.3,1)" }).onfinish = () => p.remove();
      }
    }
  };

  window.NEXUS.Gami = Gami;
})();
